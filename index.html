/* poll the queued row once after ~8 s so the sender sees SENT / FAILED */
function watchSmsStatus(range, to){
  const m = String(range || '').match(/![A-Z]+(\d+):/);
  if (!m) return;
  const rowN = m[1];
  setTimeout(async () => {
    try {
      const res = await api(`/values/${encodeURIComponent(`'${SMS_OUTBOX_SHEET}'!H${rowN}:K${rowN}`)}`);
      const v = (res.values && res.values[0]) || [];
      const st = String(v[0] || '').toUpperCase();
      if (st === 'SENT') toast('Text sent to ' + to, 'ok');
      else if (st === 'FAILED') toast('Text failed: ' + (v[3] || 'see SMS Outbox tab'), 'err');
      else if (st === 'SENDING') toast('Still sending to ' + to + ' \u2014 check the Texts tab in a moment');
      else if (st === 'REVIEW') toast('Send state unclear \u2014 see the SMS Outbox tab before retrying', 'err');
      else toast('Still queued \u2014 check the SMS Outbox tab / Apps Script trigger', 'err');
    } catch(e){}
  }, 8000);
}

/* ---- Texts tab: conversations threaded from SMS Outbox + SMS Inbox ---- */
const phoneKey = v => {
  let d = String(v || '').replace(/\D/g, '');
  if (d.length === 11 && d[0] === '1') d = d.slice(1);
  return d.length >= 10 ? d.slice(-10) : d;
};
const fmtPhone = k => k.length === 10 ? '(' + k.slice(0,3) + ') ' + k.slice(3,6) + '-' + k.slice(6) : k;
const fmtClock = d => {
  let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return h + ':' + m + ' ' + ap;
};
function shortWhen(ts, raw){
  if (!ts) return String(raw || '').split(',')[0];
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return fmtClock(d);
  return (d.getMonth() + 1) + '/' + d.getDate();
}
function phoneNameMap(){
  const map = {};
  const add = (ph, nm) => {
    const k = phoneKey(ph);
    if (k.length === 10 && nm && !map[k]) map[k] = String(nm).trim();
  };
  Object.entries(state.customers || {}).forEach(([nm, v]) =>
    add(v.phone, nm.replace(/\b\w/g, c => c.toUpperCase())));
  (state.data.quotes || []).forEach(r => add(r.cells[3], r.cells[1]));
  (state.qarchive || []).forEach(r => add(r.cells[3], r.cells[1]));
  return map;
}
function computeThreads(){
  const th = {};
  const touch = k => th[k] || (th[k] = { key:k, name:'', msgs:[], unread:0 });
  (state.smsOut || []).forEach(r => {
    const st = String(r.cells[7] || '').toUpperCase();
    if (st === 'PREVIEW' || st === 'SKIPPED' || st === 'EXCLUDED') return;   // reminder-queue rows live in the panel, not the thread
    const k = phoneKey(r.cells[2]);
    if (k.length < 10) return;
    const t = touch(k);
    if (!t.name && r.cells[3]) t.name = r.cells[3];
    t.msgs.push({
      dir:'out', ts: Date.parse(r.cells[0]) || 0, time:r.cells[0],
      body:r.cells[6], status:String(r.cells[7] || '').toUpperCase(),
      person:r.cells[1], type:r.cells[5], ref:r.cells[4]
    });
  });
  (state.smsIn || []).forEach(r => {
    const k = phoneKey(r.cells[1]);
    if (k.length < 10) return;
    const t = touch(k);
    if (!t.name && r.cells[2]) t.name = r.cells[2];
    const read = !!String(r.cells[5] || '').trim();
    if (!read) t.unread++;
    t.msgs.push({ dir:'in', ts: Date.parse(r.cells[0]) || 0, time:r.cells[0], body:r.cells[3], read, sheetRow:r.sheetRow });
  });
  const pn = phoneNameMap();
  return Object.values(th).filter(t => t.msgs.length).map(t => {
    t.msgs.sort((a, b) => a.ts - b.ts);
    t.last = t.msgs[t.msgs.length - 1];
    t.phone = fmtPhone(t.key);
    if (!t.name) t.name = pn[t.key] || '';
    const ds = state.threadDone[t.key];
    t.done = !!(ds && ds.done && t.last && t.last.ts <= ds.ts);   // any newer message reopens the thread automatically
    return t;
  }).sort((a, b) => (b.last ? b.last.ts : 0) - (a.last ? a.last.ts : 0));
}
function renderTexts(){
  const main = $('#main');
  main.innerHTML = '';
  let items = computeThreads();
  const tf = state.textsFilter || 'open';
  if (tf === 'unread') items = items.filter(t => t.unread > 0);
  else if (tf === 'open') items = items.filter(t => !t.done);
  else if (tf === 'done') items = items.filter(t => t.done);
  const q = state.search.trim().toLowerCase();
  if (q) items = items.filter(t =>
    (t.name + ' ' + t.phone + ' ' + t.msgs.map(m => m.body).join(' ')).toLowerCase().includes(q));
  const rq = renderReminderQueue();
  if (rq) main.appendChild(rq);
  const list = document.createElement('div');
  list.className = 'list';
  if (!items.length){
    list.innerHTML = `<div class="empty">${q ? 'No conversations match your search.' :
      'No text messages yet \u2014 send one from a quote, the drawer, or a renewal card. Client replies are pulled in automatically every 5 minutes.'}</div>`;
    main.appendChild(list);
    return;
  }
  items.forEach(t => {
    const row = document.createElement('div');
    row.className = 'row';
    row.setAttribute('role', 'button');
    row.tabIndex = 0;
    row.setAttribute('aria-label', `Conversation with ${t.name || t.phone}${t.unread ? ', ' + t.unread + ' unread' : ''}`);
    const lastTxt = t.last ? (t.last.dir === 'in' ? '\u21a9 ' : '\u2192 ') + t.last.body : '';
    row.innerHTML = `
      <div class="r-main">
        <div class="r-top">
          <span class="r-nm">${esc(t.name || t.phone)}</span>
          ${t.unread ? `<span class="badge b-red">${t.unread} new</span>` : ''}
          <span class="r-side"><span class="badge b-gray">${esc(t.last ? shortWhen(t.last.ts, t.last.time) : '')}</span></span>
        </div>
        <div class="r-ttl"${t.unread ? ' style="font-weight:600"' : ''}>${esc(lastTxt.slice(0, 120))}</div>
        <div class="r-meta">
          ${t.name ? `<span class="badge b-gray">${esc(t.phone)}</span>` : ''}
          <span class="badge b-gray">${t.msgs.length} message${t.msgs.length === 1 ? '' : 's'}</span>
          ${t.done ? '<span class="badge b-green">Done</span>' : ''}
          <button type="button" class="fu ${t.done ? '' : 'draft'}" data-act="tdone">${t.done ? '↺ Reopen' : '✓ Done'}</button>
        </div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>`;
    row.addEventListener('click', () => openThread(t.key));
    row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openThread(t.key); } });
    const db = row.querySelector('[data-act="tdone"]');
    if (db){
      db.addEventListener('click', e => { e.stopPropagation(); markThreadDone(t, !t.done, db); });
      db.addEventListener('keydown', e => e.stopPropagation());
    }
    list.appendChild(row);
  });
  main.appendChild(list);
}

/* ---- Open / Done per conversation (Thread Status tab) ----
   Done drops the thread out of the default Open list. Any NEWER message
   (usually a client reply) reopens it automatically — nothing to clean up. */
async function markThreadDone(t, done, btn){
  if (btn) btn.disabled = true;
  const who = autoSenderName();
  const when = done ? new Date().toLocaleString() : '';
  const rec = state.threadDone[t.key];
  try {
    if (rec && rec.row){
      await api('/values:batchUpdate', {
        method:'POST',
        body: JSON.stringify({ valueInputOption:'USER_ENTERED',
          data:[{ range:`'${CONFIG.THREAD_STATUS_SHEET}'!A${rec.row}:D${rec.row}`, values:[[t.key, done ? 'DONE' : '', when, who]] }] })
      });
      rec.done = done;
      rec.ts = done ? Date.now() : 0;
    } else {
      const res = await api(`/values/${encodeURIComponent(`'${CONFIG.THREAD_STATUS_SHEET}'!A:D`)}:append?valueInputOption=USER_ENTERED`, {
        method:'POST', body: JSON.stringify({ values:[[t.key, done ? 'DONE' : '', when, who]] })
      });
      const m = String(res.updates ? res.updates.updatedRange : '').match(/![A-Z]+(\d+):/);
      state.threadDone[t.key] = { done, ts: done ? Date.now() : 0, row: m ? +m[1] : 0 };
    }
    saveCache();
    toast(done ? 'Done — reopens automatically if they text back' : 'Reopened', 'ok');
  } catch(e){
    if (e.message !== 'auth') toast('Could not update — run installSmsTriggers() in Apps Script to create the Thread Status tab', 'err');
  } finally {
    renderAll();
  }
}

/* ---- Reminder Queue — who the next auto-reminder run will text ----
   Rows come straight from SMS Outbox (refreshed hourly by Apps Script):
   PREVIEW = will send (Skip available) · SKIPPED = held back until the
   appointment date passes · EXCLUDED = blocked by a contact preference. */
const fmtHour = h => { const x = h % 12 || 12; return x + ' ' + (h >= 12 ? 'PM' : 'AM'); };
function computeReminderQueue(){
  return (state.smsOut || []).filter(r =>
    String(r.cells[5]).trim() === 'appt_reminder' &&
    ['PREVIEW','SKIPPED','EXCLUDED'].includes(String(r.cells[7] || '').toUpperCase())
  ).map(r => ({
    sheetRow: r.sheetRow, name: r.cells[3] || '', to: r.cells[2] || '',
    body: r.cells[6] || '', status: String(r.cells[7] || '').toUpperCase(),
    reason: r.cells[10] || '', purpose: r.cells[11] || ''
  }));
}
function renderReminderQueue(){
  if (!state.smsMode || state.smsMode === 'OFF') return null;
  const rows = computeReminderQueue();
  const live = state.smsMode === 'LIVE';
  const box = document.createElement('div');
  box.className = 'list';
  box.style.marginBottom = '12px';
  const head = document.createElement('div');
  head.style.cssText = 'padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap';
  head.innerHTML = `<b style="font-family:'Barlow Condensed';font-size:16px;letter-spacing:.08em;text-transform:uppercase">🤖 Upcoming auto-reminders</b>
    <span class="badge ${live ? 'b-green' : 'b-amber'}">${live ? 'Live — sends around ' + fmtHour(state.smsHour) : 'Preview mode — nothing sends'}</span>
    <span class="badge b-gray">${rows.filter(x => x.status === 'PREVIEW').length} queued</span>`;
  box.appendChild(head);
  if (!rows.length){
    box.insertAdjacentHTML('beforeend',
      '<div class="empty" style="padding:14px 20px">Nothing queued for the next run — this list refreshes hourly from upcoming appointments.</div>');
    return box;
  }
  rows.forEach(x => {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.cursor = 'default';
    const badge = x.status === 'PREVIEW'
      ? `<span class="badge ${live ? 'b-green' : 'b-blue'}">Will send</span>`
      : x.status === 'SKIPPED'
        ? '<span class="badge b-gray">Skipped</span>'
        : `<span class="badge b-amber" title="${esc(x.reason)}">Excluded — ${esc(x.reason || 'contact preference')}</span>`;
    const btn = x.status === 'PREVIEW'
      ? '<button type="button" class="fu" data-act="rqskip">Skip this one</button>'
      : x.status === 'SKIPPED'
        ? '<button type="button" class="fu draft" data-act="rqunskip">↺ Restore</button>'
        : '';
    row.innerHTML = `
      <div class="r-main">
        <div class="r-top">
          <span class="r-nm">${esc(x.name || fmtPhone(phoneKey(x.to)))}</span>
          <span class="badge b-gray">${esc(fmtPhone(phoneKey(x.to)))}</span>
          <span class="r-side">${badge}</span>
        </div>
        <div class="r-ttl" style="white-space:normal">${esc(x.body)}</div>
        <div class="r-meta">${btn}</div>
      </div>`;
    row.querySelectorAll('[data-act]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        setReminderSkip(x, el.dataset.act === 'rqskip', el);
      });
    });
    box.appendChild(row);
  });
  return box;
}
async function setReminderSkip(x, skip, btn){
  if (btn) btn.disabled = true;
  try {
    /* verify the row hasn't shifted since load — the hourly refresh rewrites preview rows */
    const chk = await api(`/values/${encodeURIComponent(`'SMS Outbox'!A${x.sheetRow}:L${x.sheetRow}`)}`);
    const v = (chk.values && chk.values[0]) || [];
    const samePurpose = x.purpose && String(v[11] || '') === x.purpose;
    const sameTo = phoneKey(v[2]) === phoneKey(x.to) && String(v[5] || '').trim() === 'appt_reminder';
    if (!(samePurpose || sameTo)) throw new Error('The queue just refreshed — reloading');
    await api('/values:batchUpdate', {
      method:'POST',
      body: JSON.stringify({ valueInputOption:'USER_ENTERED',
        data:[{ range:`'SMS Outbox'!H${x.sheetRow}`, values:[[skip ? 'SKIPPED' : 'PREVIEW']] }] })
    });
    const local = (state.smsOut || []).find(r => r.sheetRow === x.sheetRow);
    if (local) local.cells[7] = skip ? 'SKIPPED' : 'PREVIEW';
    saveCache();
    toast(skip ? 'Skipped — this reminder will not send' : 'Restored to the queue', 'ok');
    renderContent();
  } catch(e){
    if (e.message !== 'auth'){ toast(e.message || 'Could not update', 'err'); loadAll(); }
  }
}

/* emails sent to this customer, matched via their email address
   (Email Log: A Time | B Person | C From | D To | E Quote # | F Type | G Subject) */
function emailsForCustomer(name){
  const nm = normName(name);
  if (!nm) return [];
  let em = (state.customers[nm] || {}).email || '';
  if (!em){
    const scan = rows => {
      for (const q of rows || []){
        if (normName(q.cells[1]) === nm && (q.cells[2] || '').includes('@')){ em = q.cells[2].trim(); break; }
      }
    };
    scan(state.data.quotes);
    if (!em) scan(state.qarchive);
  }
  if (!em) return [];
  const emL = em.toLowerCase();
  return (state.emailLog || [])
    .filter(r => String(r.cells[3] || '').trim().toLowerCase() === emL)
    .map(r => ({
      dir:'mail', ts: Date.parse(r.cells[0]) || 0, time:r.cells[0],
      person:r.cells[1], type:r.cells[5], subject:r.cells[6]
    }));
}

/* ---- conversation view ---- */
let threadKey = null, threadMeta = null;
function currentThread(){
  let t = computeThreads().find(x => x.key === threadKey);
  if (!t && threadKey){
    t = { key:threadKey, name:(threadMeta && threadMeta.name) || '', msgs:[], unread:0,
          phone: threadKey.length === 10 ? fmtPhone(threadKey) : ((threadMeta && threadMeta.phone) || '') };
  }
  if (!t && threadMeta) t = { key:'', name:threadMeta.name || '', msgs:[], unread:0, phone:threadMeta.phone || '' };
  return t;
}
function openThread(key, meta){
  threadMeta = meta || null;
  threadKey = key;
  renderThread();
  $('#threadWrap').classList.add('on');
  $('#threadWrap').setAttribute('aria-hidden', 'false');
  markThreadRead(key);
  $('#tReply').focus();
}
function closeThread(){
  $('#threadWrap').classList.remove('on');
  $('#threadWrap').setAttribute('aria-hidden', 'true');
  threadKey = null;
}
function renderThread(){
  const t = currentThread();
  if (!t) return;
  const blocked = !!(t.name && prefNoText(t.name));
  const can = !!threadKey && threadKey.length === 10 && !blocked;
  $('#tReply').disabled = !can;
  $('#tSend').disabled = !can;
  $('#tReply').placeholder = blocked ? 'Contact preference: no texts for this customer'
    : can ? 'Type a text message\u2026' : 'No mobile number on file \u2014 add one to the quote or Customers tab';
  $('#tName').textContent = t.name || t.phone;
  $('#tPhone').textContent = t.name ? t.phone : '';
  $('#tNameBtn').style.display = t.name ? 'none' : '';
  const tdb = $('#tDoneBtn');
  tdb.style.display = (threadKey && threadKey.length === 10) ? '' : 'none';
  tdb.textContent = t.done ? '↺ Reopen' : '✓ Done';
  tdb.disabled = false;
  tdb.onclick = () => { markThreadDone(t, !t.done, tdb).then(() => { tdb.disabled = false; if (threadKey) renderThread(); }); };
  const tb = $('#tBody');
  tb.innerHTML = '';
  let lastDay = '';
  const timeline = t.msgs.concat(emailsForCustomer(t.name)).sort((a, b) => a.ts - b.ts);
  timeline.forEach(m => {
    const d = m.ts ? new Date(m.ts) : null;
    const day = d ? (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear() : '';
    if (day && day !== lastDay){
      lastDay = day;
      tb.insertAdjacentHTML('beforeend', `<div class="t-day">${esc(day)}</div>`);
    }
    if (m.dir === 'mail'){
      tb.insertAdjacentHTML('beforeend',
        `<div class="bub mail">✉ Email — ${esc(m.subject || '(no subject)')}<span class="bt">${esc(d ? fmtClock(d) : m.time)}${m.person ? ' · ' + esc(m.person) : ''}${m.type ? ' · ' + esc(m.type) : ''}</span></div>`);
      return;
    }
    let cls = 'bub ' + m.dir, note = '';
    if (m.dir === 'out'){
      if (m.status === 'FAILED'){ cls += ' failed'; note = ' \u00b7 failed'; }
      else if (m.status === 'REVIEW'){ cls += ' failed'; note = ' \u00b7 needs review'; }
      else if (m.status === 'QUEUED' || m.status === 'SENDING'){ cls += ' pending'; note = ' \u00b7 sending\u2026'; }
      else if (m.status === 'PREVIEW'){ cls += ' pending'; note = ' \u00b7 preview \u2014 not sent'; }
    }
    tb.insertAdjacentHTML('beforeend',
      `<div class="${cls}">${esc(m.body)}<span class="bt">${esc(d ? fmtClock(d) : m.time)}${m.dir === 'out' && m.person ? ' \u00b7 ' + esc(m.person) : ''}${note}</span></div>`);
  });
  tb.scrollTop = tb.scrollHeight;
}
function markThreadRead(key){
  const rows = (state.smsIn || []).filter(r => phoneKey(r.cells[1]) === key && !String(r.cells[5] || '').trim());
  if (!rows.length) return;
  rows.forEach(r => { r.cells[5] = 'x'; });
  const data = rows.map(r => ({ range:`'SMS Inbox'!F${r.sheetRow}`, values:[['x']] }));
  api('/values:batchUpdate', {
    method:'POST',
    body: JSON.stringify({ valueInputOption:'USER_ENTERED', data })
  }).catch(() => {});
  renderAll();
}
$('#tNameBtn').addEventListener('click', async () => {
  const t = currentThread();
  if (!t) return;
  const name = (prompt('Client or business name for ' + (t.phone || 'this number') + ':') || '').trim();
  if (!name) return;
  const data = [];
  (state.smsIn || []).forEach(r => {
    if (phoneKey(r.cells[1]) === t.key && !String(r.cells[2] || '').trim()){
      r.cells[2] = name;
      data.push({ range:`'SMS Inbox'!C${r.sheetRow}`, values:[[name]] });

/* =====================================================================
   Change history & undo
   ===================================================================== */
function parseUndoData(a){
  try { const m = JSON.parse(a[6] || ''); return (m && m.c) ? m : null; }
  catch(e){ return null; }
}
function logItemNode(a, opts = {}){
  const div = document.createElement('div');
  div.className = 'log-item';
  const who = String(a[1] || '').split('@')[0];
  const key = String(a[4] ?? '').trim();
  const isUndo = low(a[2]).startsWith('undo');
  div.innerHTML = `
    <div class="lt">
      ${opts.showKey && key ? `<button type="button" class="h-key">#${esc(key)}</button>` : ''}
      <span>${esc(a[0] || '')}</span><span>${esc(who)}</span>
      ${a[3] ? `<span class="badge b-gray">${esc(a[3])}</span>` : ''}
      ${isUndo ? '<span class="badge b-amber">Undo</span>' : ''}
    </div>
    <div class="ld">${esc(a[5] || a[2] || '')}</div>`;
  if (opts.showKey && key){
    div.querySelector('.h-key').addEventListener('click', () => {
      const meta = parseUndoData(a);
      const tab = (meta && TABS.find(t => t.id === meta.t)) || TABS.find(t => t.sheet === a[3]) || activeTabDef();
      const r = rowByKey(tab.id, key);
      if (!r){ toast(`#${key} not in ${tab.label} right now`, 'err'); return; }
      closeHist();
      switchToRecord(tab.id, r.uid);
    });
  }
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'undo-btn';
  btn.textContent = '↩ Undo';
  const meta = parseUndoData(a);
  if (!meta){
    btn.disabled = true;
    btn.title = 'Logged before undo support was added';
  } else {
    btn.addEventListener('click', () => undoEntry(a, opts.after));
  }
  div.appendChild(btn);
  return div;
}
async function undoEntry(a, after){
  const meta = parseUndoData(a);
  if (!meta){ toast('This entry predates undo support', 'err'); return; }
  const tab = TABS.find(t => t.id === meta.t) || TABS.find(t => t.sheet === a[3]);
  if (!tab){ toast('Unknown sheet for this entry', 'err'); return; }
  const key = String(a[4] ?? '').trim();
  const r = rowByKey(tab.id, key);
  if (!r){ toast(`Quote ${key} not found in ${tab.label} — refresh and try again`, 'err'); return; }
  const hdr = state.headers[tab.id] || [];
  const changes = {}, lines = [], conflicts = [];
  Object.entries(meta.c).forEach(([c, ch]) => {
    changes[c] = ch.o;
    const name = hdr[+c] || colLetter(+c);
    lines.push(`${name}: back to "${(ch.o || '(empty)').slice(0, 50)}"`);
    if ((r.cells[+c] || '') !== (ch.n || '')) conflicts.push(name);
  });
  let msg = `Undo this change to #${key} (${tab.label})?\n\n${lines.join('\n')}`;
  if (conflicts.length) msg += `\n\n⚠ ${conflicts.join(', ')} changed again AFTER this edit — undoing will overwrite the newer value.`;
  if (!confirm(msg)) return;
  try {
    await commitEdits(tab, r, changes, 'Undo (Dashboard)');
    toast(`Undid change to #${key}`, 'ok');
    renderContent();
    renderSummary();
    if (after) after();
    if (state.drawerUid === r.uid && $('#drawer').classList.contains('on') && !$('#dSearch').value) renderDrawer();
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  }
}

  function setSession(s){
    TC.session = s || null;
    var email = s && s.user ? String(s.user.email || '').toLowerCase() : null;
    if (email === lastEmail){ return; }
    lastEmail = email;
    if (TC.session){ afterSignIn(); } else { TC.me = null; renderSection(); }
  }
  function afterSignIn(){
    loadRoster().then(function(){
      var email = String((TC.session.user || {}).email || '').toLowerCase();
      TC.me = null;
      TC.roster.forEach(function(m){ if (m.email === email) TC.me = m; });
      if (TC.me){ return loadRecent().then(function(){ subscribe(); }); }
    }).then(function(){ renderSection(); refreshBadges(); });
  }
  function mountGoogleButton(el){
    if (!(window.google && google.accounts && google.accounts.id)){
      el.innerHTML = '<div class="tc-note">Google sign-in is still loading — reopen this record in a moment.</div>';
      return;
    }
    var raw = crypto.randomUUID() + '-' + crypto.randomUUID();
    crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw)).then(function(buf){
      var hashed = Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      google.accounts.id.initialize({
        client_id: CONFIG.CLIENT_ID,
        nonce: hashed,
        callback: function(resp){
          sb.auth.signInWithIdToken({ provider:'google', token: resp.credential, nonce: raw })
            .then(function(res){ if (res.error) throw res.error; })
            .catch(function(e){ console.warn('TeamChat sign-in', e); notify('Chat sign-in failed: ' + (e.message || e), 'err'); });
        }
      });
      google.accounts.id.renderButton(el, { theme:'outline', size:'medium', text:'signin_with', shape:'pill' });
    });
  }

  /* ---------- data ---------- */
  function loadRoster(){
    return sb.from('team_members').select('email,display_name').eq('active', true).order('display_name')
      .then(function(res){ if (res.error) throw res.error; TC.roster = (res.data || []).map(function(m){ m.email = String(m.email || '').toLowerCase(); return m; }); TC.rosterErr = false; })
      .catch(function(e){ console.warn('TeamChat roster', e); TC.roster = []; TC.rosterErr = true; });
  }
  function loadRecent(){
    var since = new Date(Date.now() - 45 * 864e5).toISOString();
    return Promise.all([
      sb.from('team_chat_messages').select('*').gte('created_at', since).order('created_at', { ascending:false }).limit(400),
      sb.from('team_chat_reads').select('record_id,last_read_at').eq('user_email', TC.me.email)
    ]).then(function(rs){
      if (rs[0].error) throw rs[0].error;
      if (rs[1].error) throw rs[1].error;
      TC.recent = rs[0].data || [];
      TC.reads = {};
      (rs[1].data || []).forEach(function(x){ TC.reads[x.record_id] = x.last_read_at; });
      computeUnread();
    }).catch(function(e){ console.warn('TeamChat recent', e); });
  }
  function mentionsMe(m){
    return !!(TC.me && (m.mentions || []).some(function(n){ return String(n).toLowerCase() === TC.me.display_name.toLowerCase(); }));
  }
  function computeUnread(){
    var un = {}, mention = 0;
    if (TC.me) TC.recent.forEach(function(m){
      if (m.sender_email === TC.me.email) return;
      var lr = TC.reads[m.record_id];
      if (!lr || new Date(m.created_at) > new Date(lr)){
        un[m.record_id] = (un[m.record_id] || 0) + 1;
        if (mentionsMe(m)) mention++;
      }
    });
    TC.unread = un; TC.mentionUnread = mention;
  }
  function loadThread(key){
    if (TC.threadLoading[key]) return Promise.resolve();
    TC.threadLoading[key] = true;
    return sb.from('team_chat_messages').select('*').eq('record_id', key).order('created_at').limit(300)
      .then(function(res){ if (res.error) throw res.error; TC.msgs[key] = res.data || []; delete TC.threadErr[key]; })
      .catch(function(e){ console.warn('TeamChat thread', e); TC.threadErr[key] = true; })
      .then(function(){ TC.threadLoading[key] = false; });
  }
  function markRead(key, force){
    if (!TC.me) return;
    if (!force && !TC.unread[key] && TC.reads[key]) return;
    var now = new Date().toISOString();
    TC.reads[key] = now; computeUnread(); refreshBadges();
    sb.from('team_chat_reads').upsert({ user_email: TC.me.email, record_id:String(key), last_read_at: now })
      .then(function(res){ if (res && res.error) console.warn('TeamChat markRead', res.error); }, function(e){ console.warn('TeamChat markRead', e); });
  }
  function parseMentions(text){
    var out = [];
    TC.roster.forEach(function(m){
      if (new RegExp('@' + reName(m.display_name) + '(\\b|$)', 'i').test(text)) out.push(m.display_name);
    });
    return out;
  }
  /* ---------- attachments (Google Drive via the Apps Script relay) ---------- */
  function attList(m){
    var a = m && m.attachments;
    if (!a) return [];
    if (typeof a === 'string'){ try{ a = JSON.parse(a); }catch(e){ return []; } }
    return Array.isArray(a) ? a : [];
  }
  function attHtml(m){
    var atts = attList(m);
    if (!atts.length) return '';
    return atts.map(function(a){
      var id = String((a && a.file_id) || '').replace(/[^A-Za-z0-9_-]/g, '');
      if (!id) return '';
      var view = 'https://drive.google.com/file/d/' + id + '/view';
      var nm = String((a && a.name) || 'file');
      if (/^image\//i.test(String((a && a.mime_type) || ''))){
        return '<a class="tc-att-img" href="' + view + '" target="_blank" rel="noopener" title="' + escTC(nm) + '"><img src="https://drive.google.com/thumbnail?id=' + id + '&amp;sz=w480" alt="' + escTC(nm) + '" loading="lazy"></a>';
      }
      return '<a class="tc-att" href="' + view + '" target="_blank" rel="noopener">' + CLIP + ' ' + escTC(nm) + '</a>';
    }).join('');
  }
  function readB64(file){
    return new Promise(function(resolve, reject){
      var rd = new FileReader();
      rd.onload = function(){ var v = String(rd.result || ''); resolve(v.slice(v.indexOf(',') + 1)); };
      rd.onerror = function(){ reject(new Error('Could not read the file')); };
      rd.readAsDataURL(file);
    });
  }
  function uploadAttachment(file){
    if (!UPLOAD_URL) return Promise.reject(new Error('Uploads not configured'));
    return readB64(file).then(function(b64){
      return sb.auth.getSession().then(function(res){
        var tok = res && res.data && res.data.session && res.data.session.access_token;
        if (!tok) throw new Error('Chat session expired \u2014 sign in again');
        /* no custom headers = simple CORS request; Apps Script can't answer preflight OPTIONS */
        return fetch(UPLOAD_URL, { method:'POST', body: JSON.stringify({
          chatUpload:true, token:tok, filename:file.name || 'attachment',
          mimeType:file.type || 'application/octet-stream', data:b64
        }) });
      });
    }).then(function(r){
      if (!r.ok) throw new Error('Upload failed (' + r.status + ')');
      return r.text();
    }).then(function(txt){
      var j = null;
      try { j = JSON.parse(txt); }
      catch(e){ throw new Error('The upload endpoint returned a page instead of data \u2014 check the web app is deployed with access set to "Anyone"'); }
      if (j && j.success && !j.attachment) throw new Error('The upload endpoint is running old code \u2014 deploy a New version in Apps Script');
      if (!j || !j.success || !j.attachment) throw new Error((j && j.error) || 'Upload failed');
      return j.attachment;
    });
  }
  function sendMsg(rec, tabId){
    var ta = byId('tcInput'), btn = byId('tcSend');
    if (!ta || !TC.me) return;
    var key0 = String(rec.key);
    var myAttach = (pendAttach && pendKey === key0) ? pendAttach : null;
    if (myAttach && uploading){ notify('Still uploading the previous file \u2014 one at a time', 'err'); return; }
    var body = ta.value.trim();
    if (!body && !myAttach) return;
    function doInsert(atts){
      var row = {
        record_type: tabId === 'tracker' ? 'job' : 'quote',
        record_id: key0,
        record_name: String((rec.cells && rec.cells[1]) || ''),
        sender_name: TC.me.display_name,
        sender_email: TC.me.email,
        body: body,
        mentions: parseMentions(body)
      };
      if (atts && atts.length) row.attachments = atts;
      return sb.from('team_chat_messages').insert(row).select().single().then(function(res){
        if (res.error) throw res.error;
        var m = res.data, k = row.record_id;
        TC.msgs[k] = TC.msgs[k] || [];
        if (!TC.msgs[k].some(function(x){ return x.id === m.id; })) TC.msgs[k].push(m);
        TC.recent.unshift(m);
        if (atts && pendKey === k){ pendAttach = null; pendKey = null; }   /* consume the file — unless a new one was picked elsewhere */
        drafts[k] = '';
        var taNow = byId('tcInput');
        if (taNow && lastRenderKey === k) taNow.value = '';   /* never wipe another record's textarea */
        renderSection(); markRead(k);
      });
    }
    if (myAttach){
      uploading = true;
      renderSection();   /* disabled "Uploading…" state on THIS record; other records stay fully usable */
      uploadAttachment(myAttach.file)
        .then(function(att){ return doInsert([att]); })
        .then(function(){ uploading = false; renderSection(); })
        .catch(function(e){
          uploading = false;
          notify('Message failed: ' + (e.message || e), 'err');
          renderSection();   /* draft text and pending file are kept for retry */
        });
    } else {
      if (btn) btn.disabled = true;
      doInsert(null).catch(function(e){
        notify('Message failed: ' + (e.message || e), 'err');
        var b2 = byId('tcSend'); if (b2) b2.disabled = false;
      });
    }
  }

  /* ---------- realtime ---------- */
  function subscribe(){
    if (TC.channel) return;
    TC.channel = sb.channel('team-chat')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'team_chat_messages' }, function(payload){
        var m = payload["new"]; if (!m || !TC.me) return;
        if (!TC.recent.some(function(x){ return x.id === m.id; })) TC.recent.unshift(m);
        if (TC.msgs[m.record_id] && !TC.msgs[m.record_id].some(function(x){ return x.id === m.id; })) TC.msgs[m.record_id].push(m);
        var dr = byId('drawer');
        if (dr && dr.classList.contains('on') && currentDrawerKey() === m.record_id){
          markRead(m.record_id, true); renderSection();
        } else if (m.sender_email !== TC.me.email){
          computeUnread(); refreshBadges();
          if (mentionsMe(m)) notify('\uD83D\uDCAC ' + m.sender_name + ' mentioned you on #' + m.record_id, 'ok');
        }
      })
      .subscribe();
  }

  /* ---------- UI ---------- */
  function currentDrawerKey(){
    try{
      var r = (window.rowByUid && window.state) ? window.rowByUid(window.state.drawerUid) : null;
      return r ? String(r.key) : null;
    }catch(e){ return null; }
  }
  function findByKey(key, preferTab){
    if (!(window.state && window.state.data)) return null;
    var hit = null;
    var tabs = (window.TABS || []).slice();
    if (preferTab) tabs.sort(function(a, b){ return (b.id === preferTab ? 1 : 0) - (a.id === preferTab ? 1 : 0); });
    tabs.forEach(function(t){
      if (hit) return;
      (window.state.data[t.id] || []).forEach(function(r){ if (!hit && String(r.key) === String(key)) hit = r; });
    });
    return hit;
  }
  function bodyHtml(m){
    var b = escTC(m.body);
    TC.roster.forEach(function(mm){
      b = b.replace(new RegExp('@' + reName(mm.display_name), 'gi'), function(s){ return '<span class="tc-mention">' + escTC(s) + '</span>'; });
    });
    return b;
  }
  function threadHtml(key){
    if (TC.threadErr[key]) return '<div class="tc-note">Couldn\u2019t load messages \u2014 <a href="#" id="tcRetryThread">retry</a></div>';
    var list = TC.msgs[key];
    if (!list){
      loadThread(key).then(function(){ renderSection(); markRead(key); });
      return '<div class="tc-note">Loading\u2026</div>';
    }
    if (!list.length) return '<div class="tc-note">No messages yet \u2014 start the thread. Everyone on the team can see it, and it posts a ping to the ACE Dashboard space in Google Chat.</div>';
    return '<div class="tc-thread" id="tcThread">' + list.map(function(m){
      var mine = TC.me && m.sender_email === TC.me.email;
      return '<div class="tc-b ' + (mine ? 'tc-mine' : 'tc-them') + '">' +
        (mine ? '' : '<div class="tc-meta">' + escTC(m.sender_name) + ' \u00b7 ' + fmtT(m.created_at) + '</div>') +
        bodyHtml(m) + attHtml(m) +
        (mine ? '<div class="tc-meta" style="text-align:right;margin:2px 0 0">' + fmtT(m.created_at) + '</div>' : '') +
        '</div>';
    }).join('') + '</div>';
  }
  function renderSection(){
    var dr = byId('drawer'); if (!dr || !dr.classList.contains('on')) return;
    var body = byId('dBody'); if (!body) return;
    var r = null;
    try{ r = window.rowByUid(window.state.drawerUid); }catch(e){}
    if (!r) return;
    var tab = null;
    try{ tab = window.tabOfUid ? window.tabOfUid(r.uid) : null; }catch(e){}
    var tabId = tab ? tab.id : 'quotes';
    var key = String(r.key);
    var prevTa = byId('tcInput');
    if (prevTa && lastRenderKey) drafts[lastRenderKey] = prevTa.value;
    lastRenderKey = key;
    var draftVal = drafts[key] || '';

    var sec = byId('teamChatSec');
    if (!sec){
      sec = document.createElement('div'); sec.className = 'd-sec'; sec.id = 'teamChatSec';
      var anchor = null;
      body.querySelectorAll('.d-sec h3').forEach(function(h){ if (/^details$/i.test(h.textContent.trim())) anchor = h.closest('.d-sec'); });
      if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(sec, anchor.nextSibling);
      else body.appendChild(sec);
    }

    var n = TC.unread[key] || 0;
    var html = '<h3>\uD83D\uDCAC Team chat' + (n ? ' <span class="badge b-red" style="margin-left:4px">' + n + ' new</span>' : '') + '</h3>';

    if (!TC.session){
      html += '<div class="tc-note" style="margin:0 0 8px">Sign in once to send and read internal team messages on this record.</div><div id="tcGsi"></div>';
      sec.innerHTML = html;
      var g = byId('tcGsi'); if (g) mountGoogleButton(g);
      return;
    }
    if (!TC.me){
      if (TC.rosterErr){
        html += '<div class="tc-note">Couldn\u2019t load the team roster \u2014 <a href="#" id="tcRetryRoster">retry</a></div>';
        sec.innerHTML = html;
        var rr = byId('tcRetryRoster'); if (rr) rr.addEventListener('click', function(ev){ ev.preventDefault(); afterSignIn(); });
        return;
      }
      html += '<div class="tc-note">' + escTC(String((TC.session.user || {}).email || 'This account')) + ' isn\u2019t on the team roster, so chat is hidden. Ask Carlos to add you. <a href="#" id="tcOut">Use a different account</a></div>';
      sec.innerHTML = html;
      var o = byId('tcOut'); if (o) o.addEventListener('click', function(ev){ ev.preventDefault(); sb.auth.signOut(); });
      return;
    }

    html += threadHtml(key);
    var dashEmail = (window.state && window.state.email) ? String(window.state.email).toLowerCase() : '';
    if (dashEmail && dashEmail !== TC.me.email){
      html += '<div class="tc-note" style="color:var(--amber)">Sending is paused: the dashboard is signed in as ' + escTC(dashEmail) + ' but chat is signed in as ' + escTC(TC.me.display_name) + ' (' + escTC(TC.me.email) + '). <a href="#" id="tcOut">Sign out of chat</a>, then sign back in with the matching account.</div>';
    } else {
      html += '<div class="tc-chips">' + TC.roster
        .filter(function(m){ return m.email !== TC.me.email; })
        .map(function(m){ return '<button type="button" class="tc-chip" data-n="' + escTC(m.display_name) + '">@' + escTC(m.display_name) + '</button>'; })
        .join('') + '</div>';
      var upHere = uploading && pendKey === key;
      if (pendAttach && pendKey === key){
        html += '<div class="tc-pend">' + CLIP + ' <span class="tc-pend-n">' + escTC(pendAttach.name) + '</span><span class="tc-pend-s">' + fmtSize(pendAttach.size) + '</span>' + (upHere ? '' : '<button type="button" id="tcPendX" title="Remove attachment">\u2715</button>') + '</div>';
      }
      html += '<div class="tc-send">' +
        (UPLOAD_URL ? '<button type="button" class="tc-attach" id="tcAttach" title="Attach a photo or file" aria-label="Attach a photo or file"' + (upHere ? ' disabled' : '') + '>' + CLIP + '</button><input type="file" id="tcFile" style="display:none">' : '') +
        '<textarea id="tcInput" rows="1" placeholder="Message the team about #' + escTC(key) + '\u2026"' + (upHere ? ' disabled' : '') + '></textarea>' +
        '<button type="button" id="tcSend"' + (upHere ? ' disabled' : '') + '>' + (upHere ? 'Uploading\u2026' : 'Send') + '</button></div>';
      html += '<div class="tc-note" style="display:flex;justify-content:space-between"><span>Pings the ACE Dashboard space in Google Chat.</span><a href="#" id="tcOut">Sign out</a></div>';
    }
    sec.innerHTML = html;
    var taKeep = byId('tcInput');
    if (taKeep && draftVal) taKeep.value = draftVal;

    var out = byId('tcOut');
    if (out) out.addEventListener('click', function(ev){ ev.preventDefault(); sb.auth.signOut(); });
    var rt = byId('tcRetryThread');
    if (rt) rt.addEventListener('click', function(ev){ ev.preventDefault(); delete TC.threadErr[key]; delete TC.msgs[key]; renderSection(); });
    var th = byId('tcThread'); if (th) th.scrollTop = th.scrollHeight;
    sec.querySelectorAll('.tc-chip').forEach(function(c){
      c.addEventListener('click', function(){
        var ta = byId('tcInput'); if (!ta) return;
        ta.value = (ta.value ? ta.value.replace(/\s*$/, ' ') : '') + '@' + c.dataset.n + ' ';
        ta.focus();
      });
    });
    var sendBtn = byId('tcSend');
    if (sendBtn) sendBtn.addEventListener('click', function(){ sendMsg(r, tabId); });
    var ta2 = byId('tcInput');
    if (ta2) ta2.addEventListener('keydown', function(ev){
      if (ev.key === 'Enter' && !ev.shiftKey && !('ontouchstart' in window)){ ev.preventDefault(); sendMsg(r, tabId); }
    });
    if (ta2) ta2.addEventListener('input', function(){ drafts[key] = ta2.value; });   /* draft saved on every keystroke — survives any re-render */
    var ab = byId('tcAttach'), fi = byId('tcFile');
    if (ab && fi){
      ab.addEventListener('click', function(){ fi.click(); });
      fi.addEventListener('change', function(){
        var f = fi.files && fi.files[0];
        if (!f) return;
        if (f.size > MAX_ATTACH_BYTES){ notify('File too large \u2014 15 MB max', 'err'); fi.value = ''; return; }
        pendAttach = { file:f, name:f.name || 'attachment', size:f.size, type:f.type || '' };
        pendKey = key;
        renderSection();
      });
    }
    var px = byId('tcPendX');
    if (px) px.addEventListener('click', function(){ if (uploading) return; pendAttach = null; renderSection(); });
    if (TC.msgs[key]) markRead(key);
  }

  /* ---------- badges (attention bar chip + list-row badge) ---------- */
  var lastBadgeSig = '';
  function refreshBadges(){
    if (typeof window.renderSummary === 'function'){ try{ window.renderSummary(); }catch(e){} }
    var sig = JSON.stringify(TC.unread);
    if (sig !== lastBadgeSig){
      lastBadgeSig = sig;
      if (typeof window.renderContent === 'function'){ try{ window.renderContent(); }catch(e){} }
    }
  }
  var tcSumHooked = false;
  function hookSummary(){
    if (tcSumHooked || typeof window.renderSummary !== 'function') return;
    tcSumHooked = true;
    var orig = window.renderSummary;
    window.renderSummary = function(){
      var out = orig.apply(this, arguments);
      try{
        var tot = totalUnread();
        if (tot){
          var bar = document.querySelector('#summary .attn');
          if (bar){
            var b = document.createElement('button');
            b.type = 'button'; b.className = 'stat';
            b.style.cssText = 'background:var(--blue-bg);color:var(--blue-dk);border:1px solid #CBD9EC';
            b.innerHTML = '<b>' + tot + '</b> team message' + (tot === 1 ? '' : 's') + (TC.mentionUnread ? ' \u00b7 ' + TC.mentionUnread + ' @you' : '');
            b.addEventListener('click', function(){
              var m = TC.recent.find(function(x){ return TC.unread[x.record_id]; });
              var hit = m && findByKey(m.record_id, m.record_type === 'job' ? 'tracker' : 'quotes');
              if (hit && typeof window.openDrawer === 'function') window.openDrawer(hit.uid);
            });
            bar.appendChild(b);
          }
        }
      }catch(e){}
      return out;
    };
  }
  var tcRMHooked = false;
  function hookRowMeta(){
    if (tcRMHooked || typeof window.rowMeta !== 'function') return;
    tcRMHooked = true;
    var orig = window.rowMeta;
    window.rowMeta = function(tab, r){
      var out = orig.apply(this, arguments);
      try{
        var n = r && TC.unread[String(r.key)];
        if (n) out = (out || '') + '<span class="badge b-blue" title="' + n + ' unread team message' + (n === 1 ? '' : 's') + '">\uD83D\uDCAC ' + n + '</span>';
      }catch(e){}
      return out;
    };
  }
  var tcRDHooked = false, tcODHooked = false;
  function hookDrawer(){
    if (!tcRDHooked && typeof window.renderDrawer === 'function'){
      tcRDHooked = true;
      var o1 = window.renderDrawer;
      window.renderDrawer = function(){ var r = o1.apply(this, arguments); try{ renderSection(); }catch(e){ console.warn(e); } return r; };
    }
    if (!tcODHooked && typeof window.openDrawer === 'function'){
      tcODHooked = true;
      var o2 = window.openDrawer;
      window.openDrawer = function(){ var r = o2.apply(this, arguments); try{ renderSection(); }catch(e){ console.warn(e); } return r; };
    }
  }

  function hookSignout(){
    var b = document.getElementById('btnSignout');
    if (!b || b.__tcHooked) return;
    b.__tcHooked = true;
    b.addEventListener('click', function(){
      /* synchronous local clear first, so an immediate page reload can't race the async sign-out */
      try{ Object.keys(localStorage).forEach(function(k){ if (k.indexOf('sb-uqikcjfshbvthkjgdwgr-') === 0) localStorage.removeItem(k); }); }catch(e){}
      try{ sb.auth.signOut(); }catch(e){}
    }, true);
  }

  /* ---------- deep link (?chat=KEY from Google Chat notifications) ---------- */
  function tryDeepLink(){
    if (TC.deepLinked) return;
    var params = new URLSearchParams(location.search);
    var key = params.get('chat');
    if (!key){ TC.deepLinked = true; return; }
    if (!(window.state && window.state.data)) return;
    var loaded = (window.TABS || []).some(function(t){ return (window.state.data[t.id] || []).length; });
    if (!loaded) return;
    TC.deepLinked = true;
    var typ = params.get('type');
    var hit = findByKey(key, typ === 'job' ? 'tracker' : (typ === 'quote' ? 'quotes' : null));
    if (hit && typeof window.openDrawer === 'function'){
      window.openDrawer(hit.uid);
      setTimeout(function(){ var s = byId('teamChatSec'); if (s) s.scrollIntoView({ behavior:'smooth', block:'center' }); }, 400);
    } else {
      notify('Record #' + key + ' not found in the current data', 'err');
    }
  }

  /* ---------- boot ---------- */
  initSession();
  var tries = 0, t = setInterval(function(){
    tries++;
    hookDrawer(); hookSummary(); hookRowMeta(); hookSignout(); tryDeepLink();
    if (tries > 240) clearInterval(t);
  }, 500);
})();
/*TEAMCHAT_END*/
