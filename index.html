/* ---- widgets ---- */
const WIDGET_RENDER = {
  active(rows){
    const w = widgetShell('Active jobs');
    const open = rows.filter(r => !['completed'].includes(low(r.cells[3])) && low(r.cells[6]) !== 'paid');
    w.insertAdjacentHTML('beforeend', `<div class="wg-num">${open.length}</div>`);
    const byStatus = {};
    open.forEach(r => { const s = (r.cells[3]||'').trim() || '—'; byStatus[s] = (byStatus[s]||0) + 1; });
    const chips = Object.entries(byStatus).sort((a,b) => b[1]-a[1]).slice(0, 5)
      .map(([s, n]) => statusBadge(s).replace('</span>', ` ${n}</span>`)).join('');
    w.insertAdjacentHTML('beforeend', `<div class="wg-chips">${chips}</div>`);
    return w;
  },
  completion(rows){
    const w = widgetShell('Completion & payment rate');
    const done = rows.filter(r => low(r.cells[3]) === 'completed').length;
    const pct = rows.length ? Math.round(done / rows.length * 100) : 0;
    const invoiced = rows.filter(r => ['sent','overdue','paid'].includes(low(r.cells[6])));
    const paid = invoiced.filter(r => low(r.cells[6]) === 'paid').length;
    const ppct = invoiced.length ? Math.round(paid / invoiced.length * 100) : 0;
    w.insertAdjacentHTML('beforeend', `
      <div class="wg-pct" style="color:var(--green)">${pct}%</div>
      <div class="wg-sub">${done} of ${rows.length} jobs completed</div>
      <div class="wg-bar"><i style="width:${pct}%;background:var(--green)"></i></div>
      <div class="wg-pct" style="color:var(--blue);font-size:24px">${ppct}%</div>
      <div class="wg-sub">${paid} of ${invoiced.length} invoices paid</div>
      <div class="wg-bar"><i style="width:${ppct}%;background:var(--blue)"></i></div>`);
    return w;
  },
  upcoming(rows){
    const w = widgetShell('Upcoming service');
    const today = startOfDay(new Date());
    const items = rows.map(r => ({ r, d: parseDate(r.cells[7]) }))
      .filter(x => x.d && x.d >= today)
      .sort((a,b) => a.d - b.d).slice(0, 6);
    if (!items.length){
      w.insertAdjacentHTML('beforeend', '<div class="wg-none">Nothing on the calendar yet.</div>');
      return w;
    }
    const list = document.createElement('div');
    list.className = 'wg-list';
    items.forEach(({ r, d }) => list.appendChild(wgItem(fmtMD(d), r, r.cells[8] ? `<span class="badge b-blue">${esc(r.cells[8])}</span>` : '')));
    w.appendChild(list);
    return w;
  },
  aging(rows){
    const w = widgetShell('Past date · not completed');
    const today = startOfDay(new Date());
    const items = rows.map(r => ({ r, d: parseDate(r.cells[7]) }))
      .filter(x => x.d && x.d < today && low(x.r.cells[3]) !== 'completed' && low(x.r.cells[6]) !== 'paid')
      .sort((a,b) => a.d - b.d);
    w.insertAdjacentHTML('beforeend', `<div class="wg-num" style="color:${items.length ? 'var(--amber)' : 'var(--green)'}">${items.length}</div>`);
    if (!items.length){
      w.insertAdjacentHTML('beforeend', '<div class="wg-none">All serviced jobs are wrapped up 🎉</div>');
      return w;
    }
    const list = document.createElement('div');
    list.className = 'wg-list';
    items.slice(0, 5).forEach(({ r, d }) => {
      const days = Math.round((today - d) / DAY);
      list.appendChild(wgItem(days + 'd ago', r, statusBadge(r.cells[3])));
    });
    w.appendChild(list);
    return w;
  },
  invoices(rows){
    const w = widgetShell('Invoice pipeline');
    const c = { notsent:0, sent:0, overdue:0, paid:0 };
    rows.forEach(r => {
      const v = low(r.cells[6]);
      if (v === 'sent') c.sent++;
      else if (v === 'overdue') c.overdue++;
      else if (v === 'paid') c.paid++;
      else c.notsent++;
    });
    const total = rows.length || 1;
    w.insertAdjacentHTML('beforeend', `
      <div class="wg-bar">
        <i style="width:${c.notsent/total*100}%;background:var(--line2)"></i>
        <i style="width:${c.sent/total*100}%;background:var(--blue)"></i>
        <i style="width:${c.overdue/total*100}%;background:var(--red)"></i>
        <i style="width:${c.paid/total*100}%;background:var(--green)"></i>
      </div>
      <div class="wg-legend">
        <span><span class="sw" style="background:var(--line2)"></span>Not sent <b>${c.notsent}</b></span>
        <span><span class="sw" style="background:var(--blue)"></span>Sent <b>${c.sent}</b></span>
        <span><span class="sw" style="background:var(--red)"></span>Overdue <b>${c.overdue}</b></span>
        <span><span class="sw" style="background:var(--green)"></span>Paid <b>${c.paid}</b></span>
      </div>`);
    return w;
  },
  retest(rows){
    const w = widgetShell('Retest & compliance');
    const byL = {};
    rows.forEach(r => { const v = (r.cells[11]||'').trim(); if (v) byL[v] = (byL[v]||0) + 1; });
    const entries = Object.entries(byL).sort((a,b) => b[1]-a[1]);
    if (!entries.length){
      w.insertAdjacentHTML('beforeend', '<div class="wg-none">No retest activity recorded.</div>');
      return w;
    }
    const cls = v => {
      const t = low(v);
      if (['pending','awaiting approval','scheduled'].includes(t)) return 'b-amber';
      if (['approved','completed','passed'].includes(t)) return 'b-green';
      return 'b-gray';
    };
    w.insertAdjacentHTML('beforeend', `<div class="wg-chips">${entries.map(([v, n]) =>
      `<span class="badge ${cls(v)}">${esc(v)} ${n}</span>`).join('')}</div>`);
    const pend = rows.filter(r => ['pending','awaiting approval','scheduled'].includes(low(r.cells[11])));
    if (pend.length){
      const list = document.createElement('div');
      list.className = 'wg-list';
      list.style.marginTop = '8px';
      pend.slice(0, 4).forEach(r => list.appendChild(wgItem('', r, `<span class="badge b-amber">${esc(r.cells[11])}</span>`)));
      w.appendChild(list);
    }
    return w;
  }
};
function widgetShell(title){
  const w = document.createElement('div');
  w.className = 'widget';
  w.innerHTML = `<h4>${esc(title)}</h4>`;
  return w;
}
function wgItem(dTxt, r, badgeHtml){
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'wg-item';
  b.innerHTML = `${dTxt ? `<span class="d">${esc(dTxt)}</span>` : ''}<span class="q">#${esc(r.key)}</span><span class="nm">${esc(r.cells[1])}</span>${badgeHtml || ''}`;
  b.addEventListener('click', () => openDrawer(r.uid));
  return b;
}

/* ---- Gantt ---- */
function renderGantt(rows){
  const today = startOfDay(new Date());
  const start = addDays(today, -CONFIG.GANTT_PAST_DAYS);
  const end = addDays(today, CONFIG.GANTT_FUTURE_DAYS);
  const span = end - start;
  const pct = d => Math.max(0, Math.min(100, (d - start) / span * 100));

  const all = rows.map(r => ({ r, d: parseDate(r.cells[7]) }))
    .filter(x => x.d && low(x.r.cells[6]) !== 'paid')
    .filter(x => x.d <= end && (x.d >= start || low(x.r.cells[3]) !== 'completed'))
    .sort((a,b) => a.d - b.d);
  const shown = all.slice(0, CONFIG.GANTT_MAX_ROWS);

  const box = document.createElement('div');
  box.className = 'gantt';
  if (!shown.length){
    box.innerHTML = '<div class="wg-none">No jobs with Ember dates in this window yet — dates appear here automatically.</div>';
    return box;
  }
  const inner = document.createElement('div');
  inner.className = 'g-inner';

  // weekly axis ticks
  const axis = document.createElement('div');
  axis.className = 'g-axis';
  const firstTick = addDays(start, (7 - start.getDay()) % 7);
  for (let t = firstTick; t <= end; t = addDays(t, 7)){
    axis.insertAdjacentHTML('beforeend', `<span class="tick" style="left:${pct(t)}%">${fmtMD(t)}</span>`);
  }
  inner.appendChild(axis);

  const body = document.createElement('div');
  body.className = 'g-body';
  const overlay = document.createElement('div');
  overlay.className = 'g-overlay';
  for (let t = firstTick; t <= end; t = addDays(t, 7)){
    overlay.insertAdjacentHTML('beforeend', `<span class="vline" style="left:${pct(t)}%"></span>`);
  }
  overlay.insertAdjacentHTML('beforeend', `<span class="todayline" style="left:${pct(today)}%" title="Today"></span>`);
  body.appendChild(overlay);

  shown.forEach(({ r, d }) => {
    const row = document.createElement('div');
    row.className = 'g-row';
    row.setAttribute('role', 'button');
    row.tabIndex = 0;
    row.setAttribute('aria-label', `Quote ${r.key}, ${r.cells[1]} — open details`);
    const done = low(r.cells[3]) === 'completed';
    const track = document.createElement('div');
    track.className = 'g-track';
    if (done){
      track.innerHTML = `<span class="g-dia" style="left:${pct(d)}%" title="Completed ${fmtMD(d)}"></span>`;
    } else if (d > today){
      track.innerHTML = `<span class="g-dia up" style="left:${pct(d)}%" title="Scheduled ${fmtMD(d)}"></span>`;
    } else {
      const st = stageAuto(r);
      const l = pct(d < start ? start : d), rgt = pct(today);
      const days = Math.round((today - d) / DAY);
      track.innerHTML = `<span class="g-bar${st === 'overdue' ? ' gb-red' : ''}" style="left:${l}%;width:${Math.max(rgt - l, 1)}%" title="Open ${days}d since ${fmtMD(d)}"></span>
        <span class="g-age" style="left:${rgt}%">${days}d</span>`;
    }
    row.innerHTML = `<div class="g-lbl"><span class="q">#${esc(r.key)}</span><span class="nm">${esc(r.cells[1])}</span></div>`;
    row.appendChild(track);
    row.addEventListener('click', () => openDrawer(r.uid));
    row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(r.uid); } });
    body.appendChild(row);
  });
  inner.appendChild(body);
  box.appendChild(inner);

  box.insertAdjacentHTML('beforeend', `
    <div class="g-leg">
      <span><span class="sw" style="background:#E0A93E"></span>Open since service date</span>
      <span><span class="sw" style="background:var(--red)"></span>Open + invoice overdue</span>
      <span><span class="sw dm" style="background:var(--blue)"></span>Upcoming service</span>
      <span><span class="sw dm" style="background:var(--green)"></span>Completed</span>
    </div>` +
    (all.length > shown.length ? `<div class="g-note">Showing ${shown.length} of ${all.length} dated jobs (window: last ${CONFIG.GANTT_PAST_DAYS}d → next ${CONFIG.GANTT_FUTURE_DAYS}d). Paid jobs are hidden.</div>` : ''));
  return box;
}

/* =====================================================================
   Drawer
   ===================================================================== */
function openDrawer(uid){
  state.drawerUid = uid;
  state.drawerList = visibleRows(activeTabDef()).map(r => r.uid);
  if (!state.drawerList.includes(uid)) state.drawerList = [uid];
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  $('#drawer').classList.add('on');
  $('#overlay').classList.add('on');
  document.body.classList.add('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'false');
  if (!(activeTabDef().id === 'tracker' && state.view.tracker === 'overview')) renderContent();
}
function closeDrawer(){
  $('#drawer').classList.remove('on');
  $('#overlay').classList.remove('on');
  document.body.classList.remove('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'true');
  renderContent();
}
$('#dClose').addEventListener('click', closeDrawer);
$('#overlay').addEventListener('click', closeDrawer);
$('#dPrev').addEventListener('click', () => stepDrawer(-1));
$('#dNext').addEventListener('click', () => stepDrawer(1));
document.addEventListener('keydown', e => {
  if (!$('#drawer').classList.contains('on')) return;
  const typing = /input|textarea|select/i.test(document.activeElement?.tagName || '');
  if (e.key === 'Escape'){ typing ? document.activeElement.blur() : closeDrawer(); }
  if (typing) return;
  if (e.key === 'ArrowLeft') stepDrawer(-1);
  if (e.key === 'ArrowRight') stepDrawer(1);
});
function stepDrawer(dir){
  const i = state.drawerList.indexOf(state.drawerUid);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= state.drawerList.length) return;
  state.drawerUid = state.drawerList[j];
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  if (!(activeTabDef().id === 'tracker' && state.view.tracker === 'overview')) renderContent();
}

$('#dSearch').addEventListener('input', () => {
  const q = $('#dSearch').value;
  $('#dSearchWrap').classList.toggle('has', !!q);
  q.trim() ? renderDrawerResults(q.trim().toLowerCase()) : renderDrawer();
});
$('#dSearchClr').addEventListener('click', () => {
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
});
function renderDrawerResults(q){
  const tab = activeTabDef();
  const hits = (state.data[tab.id] || []).filter(r => searchText(tab, r).includes(q)).slice(0, 25);
  const body = $('#dBody');
  body.innerHTML = '<div class="d-results"></div>';
  const box = body.firstChild;
  if (!hits.length){ box.innerHTML = '<div class="none">No matches in this tab.</div>'; return; }
  hits.forEach(r => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'rrow';
    b.innerHTML = `<span class="t"><b>#${esc(r.key)}</b> ${esc(r.cells[1])}</span>
                   <span class="s">${esc(tab.id === 'quotes' ? r.cells[4] : r.cells[2])}</span>`;
    b.addEventListener('click', () => {
      state.drawerUid = r.uid;
      $('#dSearch').value = '';
      $('#dSearchWrap').classList.remove('has');
      renderDrawer();
      if (!(tab.id === 'tracker' && state.view.tracker === 'overview')) renderContent();
    });
    box.appendChild(b);
  });
  $('#dFoot').className = 'd-foot';
}

function renderDrawer(){
  const tab = activeTabDef();
  const r = rowByUid(state.drawerUid);
  const body = $('#dBody');
  if (!r){ body.innerHTML = '<div class="empty">Record not found — it may have been removed. Refresh the data.</div>'; syncFoot(null); return; }

  $('#dQuote').textContent = '#' + r.key;
  $('#dName').textContent = r.cells[1];
  const i = state.drawerList.indexOf(r.uid);
  $('#dPrev').disabled = i <= 0;
  $('#dNext').disabled = i < 0 || i >= state.drawerList.length - 1;

  body.innerHTML = '';

  const acts = document.createElement('div');
  acts.className = 'd-actions';
  const email = tab.id === 'quotes' ? (r.cells[2]||'').trim() : '';
  const phone = tab.id === 'quotes' ? (r.cells[3]||'').trim() : '';
  const link  = tab.id === 'quotes' ? (r.cells[5]||'').trim() : '';
  if (phone) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="tel:${esc(phone)}">📞 Call</a>`);
  if (phone) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="sms:${esc(phone)}">💬 Text</a>`);
  if (email) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="mailto:${esc(email)}">✉ Email</a>`);
  if (/^https?:\/\//.test(link)) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="${esc(link)}" target="_blank" rel="noopener">↗ Wix quote</a>`);
  const otherId = tab.id === 'quotes' ? 'tracker' : 'quotes';
  const twin = rowByKey(otherId, r.key);
  if (twin){
    const jb = document.createElement('button');
    jb.className = 'act-btn';
    jb.textContent = (otherId === 'tracker' ? '⇄ Open in Tracker' : '⇄ Open in Quotes');
    jb.addEventListener('click', () => switchToRecord(otherId, twin.uid));
    acts.appendChild(jb);
  }
  if (acts.children.length) body.appendChild(acts);

  const info = document.createElement('div');
  info.className = 'd-sec';
  info.innerHTML = '<h3>Details</h3>';
  const grid = document.createElement('div');
  grid.className = 'info-grid';
  const add = (k, vHtml) => { if (vHtml) grid.insertAdjacentHTML('beforeend', `<div class="k">${k}</div><div class="v">${vHtml}</div>`); };
  const title = tab.id === 'quotes' ? r.cells[4] : r.cells[2];
  add('Job', esc(title));
  if (tab.id === 'quotes'){
    add('Expires', `${daysBadge(r)}${r.cells[6] ? ` <span style="color:var(--muted);font-size:12px">${esc(String(r.cells[6]).slice(0,10))}</span>` : ''}`);
    add('Status', r.cells[9] ? `<span class="badge b-gray">${esc(r.cells[9])}</span>` : '');
    add('Ember', (r.cells[14] || r.cells[15]) ? `${r.cells[15] ? `<span class="badge b-blue">${esc(r.cells[15])}</span> ` : ''}${esc(r.cells[14])}` : '');
    add('Email', email ? `<a href="mailto:${esc(email)}">${esc(email)}</a>` : '');
    add('Phone', phone ? `<a href="tel:${esc(phone)}">${esc(phone)}</a>` : '');
  } else {
    add('Status', statusBadge(r.cells[3]));
    add('Wix', wixBadge(r.cells[4]));
    add('Invoice #', esc(r.cells[5]));
    add('Invoice', invStatusBadge(r.cells[6]));
    add('Ember', (r.cells[7] || r.cells[8]) ? `${r.cells[8] ? `<span class="badge b-blue">${esc(r.cells[8])}</span> ` : ''}${esc(r.cells[7])}` : '');
    const st = stageAuto(r);
    const sdef = STAGES.find(s => s.id === st);
    if (sdef) add('Stage', `<span class="badge b-${sdef.tone === 'gray' ? 'gray' : sdef.tone}">${esc(sdef.label)}</span>`);
  }
  info.appendChild(grid);
  body.appendChild(info);

  const ed = document.createElement('div');
  ed.className = 'd-sec';
  ed.innerHTML = '<h3>Team updates</h3>';
  const hdr = state.headers[tab.id] || [];
  tab.editable.forEach(colIdx => {
    const f = document.createElement('div');
    f.className = 'd-field';
    const lb = document.createElement('label');
    lb.textContent = hdr[colIdx] || colLetter(colIdx);
    lb.htmlFor = 'fld-' + colIdx;
    f.appendChild(lb);
    f.appendChild(buildControl(tab, r, colIdx));
    ed.appendChild(f);
  });
  body.appendChild(ed);

  const related = [];
  const nm = normName(r.cells[1]);
  if (nm){
    TABS.forEach(t => (state.data[t.id]||[]).forEach(x => {
      if (x.uid !== r.uid && normName(x.cells[1]) === nm) related.push({ t, x });
    }));
  }
  if (related.length){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = `<h3>Same customer (${related.length})</h3><div class="d-results"></div>`;
    const box = sec.querySelector('.d-results');
    related.slice(0, 8).forEach(({ t, x }) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'rrow';
      b.innerHTML = `<span class="t"><b>#${esc(x.key)}</b> ${esc(t.label)}</span>
                     <span class="s">${esc(t.id === 'quotes' ? x.cells[4] : x.cells[2])}</span>`;
      b.addEventListener('click', () => switchToRecord(t.id, x.uid));
      box.appendChild(b);
    });
    body.appendChild(sec);
  }

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = '<h3>Recent activity</h3>';
    if (!state.activityLoaded){
      sec.insertAdjacentHTML('beforeend', '<div class="log-none">Loading activity…</div>');
    } else {
      const entries = state.activity.filter(a => String(a[4] ?? '').trim() === r.key).slice(-5).reverse();
      if (!entries.length) sec.insertAdjacentHTML('beforeend', '<div class="log-none">No logged activity for this record yet — edits made here will appear.</div>');
      entries.forEach(a => {
        sec.insertAdjacentHTML('beforeend', `
          <div class="log-item">
            <div class="lt"><span>${esc(a[0] || '')}</span><span>${esc(String(a[1] || '').split('@')[0])}</span>${a[3] ? `<span class="badge b-gray">${esc(a[3])}</span>` : ''}</div>
            <div class="ld">${esc(a[5] || a[2] || '')}</div>
          </div>`);
      });
    }
    body.appendChild(sec);
  }

  syncFoot(r);
}
function switchToRecord(tabId, uid){
  state.activeTab = tabId;
  $$('.tab').forEach((x, i) => {
    const on = TABS[i].id === tabId;
    x.classList.toggle('active', on);
    x.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderAll();
  openDrawer(uid);
}

/* =====================================================================
   Editable controls
   ===================================================================== */
const currentVal = (r, c) => c in r.edits ? r.edits[c] : (r.cells[c] || '');
function setEdit(tab, r, colIdx, val){
  if (val === (r.cells[colIdx] || '')) delete r.edits[colIdx];
  else r.edits[colIdx] = val;
  $$(`#dBody [data-col="${colIdx}"]`).forEach(ct => ct.classList.toggle('changed', colIdx in r.edits));
  syncFoot(r);
  if (!(activeTabDef().id === 'tracker' && state.view.tracker === 'overview')) renderContent();
}
function syncFoot(r){
  const foot = $('#dFoot');
  foot.className = 'd-foot' + (isDirty(r) ? ' dirty' : '');
  const btn = $('#dSave');
  if (!btn.classList.contains('saving')) btn.textContent = isDirty(r) ? 'Save' : 'Saved';
  $('#dSaveNext').textContent = isDirty(r) ? 'Save & Next ›' : 'Next ›';
  const i = state.drawerList.indexOf(r ? r.uid : null);
  $('#dSaveNext').disabled = !isDirty(r) && (i < 0 || i >= state.drawerList.length - 1);
}

function buildControl(tab, r, colIdx){
  const box = document.createElement('div');
  box.className = 'ctl' + (colIdx in r.edits ? ' changed' : '');
  box.dataset.col = colIdx;
  const val = currentVal(r, colIdx);

  if (tab.id === 'quotes'){
    if (colIdx === 13){
      const ta = document.createElement('textarea');
      ta.id = 'fld-' + colIdx;
      ta.value = val;
      ta.placeholder = 'Notes…';
      ta.addEventListener('input', () => setEdit(tab, r, colIdx, ta.value));
      box.appendChild(ta);
      box.appendChild(chipRow([
        { l:'+ ' + todayMD() + ' Sent email', v:() => appendLine(ta, todayMD() + ' Sent email,') },
        { l:'+ ' + todayMD() + ' Sent text',  v:() => appendLine(ta, todayMD() + ' Sent text:') },
        { l:'+ ' + todayMD() + ' Called',     v:() => appendLine(ta, todayMD() + ' Called,') }
      ], () => setEdit(tab, r, colIdx, ta.value)));
      return box;
    }
    const inp = mkInput(val, 'e.g. ' + todayMD());
    inp.id = 'fld-' + colIdx;
    inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
    box.appendChild(inp);
    box.appendChild(chipRow([
      { l: todayMD(),  v:() => inp.value = todayMD() },
      { l:'Not Sent',  v:() => inp.value = 'Not Sent' },
      { l:'X',         v:() => inp.value = 'X' }
    ], () => setEdit(tab, r, colIdx, inp.value)));
    return box;
  }

  const listOpts = state.options[colIdx];
  if (listOpts && listOpts.length){
    buildSelect(box, tab, r, colIdx, listOpts, val);
    return box;
  }
  const inp = mkInput(val, 'Type…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-' + colIdx;
  ensureDatalist(dlId, state.suggest[colIdx] || []);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  return box;
}
function mkInput(val, ph){
  const i = document.createElement('input');
  i.type = 'text'; i.value = val; i.placeholder = ph; i.autocomplete = 'off';
  return i;
}
function buildSelect(box, tab, r, colIdx, opts, val){
  box.innerHTML = '';
  const sel = document.createElement('select');
  sel.id = 'fld-' + colIdx;
  const all = [...opts];
  if (val && !all.includes(val)) all.unshift(val);
  sel.appendChild(new Option('— select —', ''));
  all.forEach(o => sel.appendChild(new Option(o, o)));
  sel.appendChild(new Option('✎ Type a custom answer…', '__custom__'));
  sel.value = all.includes(val) ? val : '';
  sel.addEventListener('change', () => {
    if (sel.value === '__custom__'){ toCustomInput(box, tab, r, colIdx, opts); return; }
    setEdit(tab, r, colIdx, sel.value);
  });
  box.appendChild(sel);
}
function toCustomInput(box, tab, r, colIdx, opts){
  box.innerHTML = '';
  const inp = mkInput('', 'Custom answer…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-custom-' + colIdx;
  ensureDatalist(dlId, [...new Set([...(opts||[]), ...(state.suggest[colIdx]||[])])]);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  const back = document.createElement('button');
  back.className = 'backlist'; back.type = 'button'; back.textContent = '↩ back to list';
  back.addEventListener('click', () => {
    buildSelect(box, tab, r, colIdx, opts, currentVal(r, colIdx));
    box.classList.toggle('changed', colIdx in r.edits);
  });
  box.appendChild(back);
  inp.focus();
}
function ensureDatalist(id, options){
  let dl = document.getElementById(id);
  if (!dl){ dl = document.createElement('datalist'); dl.id = id; document.body.appendChild(dl); }
  dl.innerHTML = options.map(o => `<option value="${esc(o)}">`).join('');
}
function chipRow(chips, after){
  const row = document.createElement('div');
  row.className = 'chips';
  chips.forEach(c => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip'; b.textContent = c.l;
    b.addEventListener('click', () => { c.v(); after(); });
    row.appendChild(b);
  });
  return row;
}
function appendLine(ta, text){
  ta.value = ta.value.trim() ? ta.value.replace(/\s+$/,'') + '\n' + text : text;
}

/* =====================================================================
   Save pipeline (drawer + quick-contact chips)
   ===================================================================== */
async function commitEdits(tab, r, changesObj){
  let target = r.sheetRow;
  const chk = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A${target}`)}`);
  if (String(chk.values?.[0]?.[0] ?? '').trim() !== r.key){
    const colA = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A2:A`)}`);
    const matches = (colA.values || [])
      .map((x, i) => ({ v: String(x[0] ?? '').trim(), i }))
      .filter(x => x.v === r.key);
    if (!matches.length) throw new Error(`Row for quote ${r.key} not found — refresh and try again`);
    if (matches.length > 1) throw new Error(`Quote ${r.key} appears ${matches.length}× and rows shifted — refresh before saving`);
    target = matches[0].i + 2;
  }

  const changes = Object.entries(changesObj);
  await api('/values:batchUpdate', {
    method:'POST',
    body: JSON.stringify({
      valueInputOption:'USER_ENTERED',
      data: changes.map(([c, v]) => ({ range:`'${tab.sheet}'!${colLetter(+c)}${target}`, values:[[v]] }))
    })
  });

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const hdr = state.headers[tab.id] || [];
    const details = changes.map(([c, v]) =>
      `${hdr[+c] || colLetter(+c)}: "${(r.cells[+c]||'').slice(0,60)}" → "${String(v).slice(0,60)}"`).join(' | ');
    const entry = [new Date().toLocaleString(), state.email, 'Edit (Dashboard)', tab.sheet, r.key, details];
    state.activity.push(entry);
    api(`/values/${encodeURIComponent(`'${CONFIG.ACTIVITY_LOG_SHEET}'!A:F`)}:append?valueInputOption=USER_ENTERED`,
      { method:'POST', body: JSON.stringify({ values:[entry] }) }).catch(() => {});
  }

  changes.forEach(([c, v]) => r.cells[+c] = v);
  r.sheetRow = target;
  saveCache();
}

$('#dSave').addEventListener('click', () => saveActive());
$('#dSaveNext').addEventListener('click', async () => {
  const r = rowByUid(state.drawerUid);
  if (isDirty(r)){
    const ok = await saveActive();
    if (!ok) return;
  }
  stepDrawer(1);
});
$('#dRevert').addEventListener('click', () => {
  const r = rowByUid(state.drawerUid);
  if (!r) return;
  r.edits = {};
  renderDrawer();
  if (!(activeTabDef().id === 'tracker' && state.view.tracker === 'overview')) renderContent();
});

async function saveActive(){
  const tab = activeTabDef();
  const r = rowByUid(state.drawerUid);
  if (!r || !isDirty(r) || r.saving) return false;
  r.saving = true;
  const btn = $('#dSave');
  btn.classList.add('saving');
  btn.textContent = 'Saving…';
  let ok = false;
  try {
    await commitEdits(tab, r, r.edits);
    r.edits = {};
    ok = true;
    toast('Saved quote ' + r.key, 'ok');
    renderDrawer();
    renderContent();
    renderSummary();
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    btn.classList.remove('saving');
    syncFoot(rowByUid(state.drawerUid));
  }
  return ok;
}

/* =====================================================================
   Toolbar / lifecycle
   ===================================================================== */
$('#searchBox').addEventListener('input', e => { state.search = e.target.value; renderContent(); });
$('#sortSel').addEventListener('change', e => { state.sort[state.activeTab] = e.target.value; renderContent(); });
$('#statusSel').addEventListener('change', e => { state.trackerStatus = e.target.value; renderContent(); });
$('#btnRefresh').addEventListener('click', async () => {
  if (hasUnsaved() && !confirm('You have unsaved edits — refreshing will discard them. Continue?')) return;
  TABS.forEach(t => (state.data[t.id] || []).forEach(r => r.edits = {}));
  $('#btnRefresh').classList.add('spin');
  await loadAll(true);
  $('#btnRefresh').classList.remove('spin');
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.token && state.lastLoad &&
      Date.now() - state.lastLoad > CONFIG.STALE_MS && !hasUnsaved()){
    loadAll();
  }
});
window.addEventListener('beforeunload', e => {
  if (hasUnsaved()){ e.preventDefault(); e.returnValue = ''; }
});
