<script>
/* =====================================================================
   CONFIG
   ===================================================================== */
const CONFIG = {
  CLIENT_ID: '974411831257-7ov5s0e5lvh5g4tetovdnl45iojibaa2.apps.googleusercontent.com',
  SPREADSHEET_ID: '1cxqn3ZHlIA6CaSHa73C_dCJdFFqd2Pm7uEKiU8n_lnQ',
  SCOPES: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email',
  ACTIVITY_LOG_SHEET: 'Activity Log',
  ACTIVITY_MAX: 1500,
  SHOW_FINANCIALS: false,
  STALE_MS: 5 * 60 * 1000,
  BOARD_CHUNK: 25
};

/* Column maps (0-based, A=0)
   Quotes : A # | B Name | C Email | D Phone | E Title | F Link | G Exp | H Total
            I Days | J Status | K Sent Email | L Text | M Call | N Notes | O EmberDate | P EmberType
   Tracker: A # | B Name | C Title | D Status | E Wix Status | F Invoice # | G Invoice Status
            H EmberDate | I EmberType | J Report | K Notes | L Retest Report | M Retest Inv | N Job Status */
const TABS = [
  { id:'quotes',  label:'Quotes',  sheet:'Quotes',  lastCol:'Q', editable:[10,11,12,13] },
  { id:'tracker', label:'Tracker', sheet:'Tracker', lastCol:'N', editable:[9,10,11,12,13] }
];
const QC_LABEL = { 10:'Emailed', 11:'Texted', 12:'Called' };

/* =====================================================================
   State / helpers
   ===================================================================== */
const state = {
  token:null, email:'', activeTab:'quotes',
  data:{}, headers:{}, dupes:{},
  activity:[], activityLoaded:false,
  options:{}, suggest:{},
  search:'', filter:{quotes:'all', tracker:'all'}, sort:{quotes:'sheet', tracker:'sheet'},
  trackerStatus:'',
  view: JSON.parse(localStorage.getItem('acefire_view') || '{"quotes":"list","tracker":"list"}'),
  density: localStorage.getItem('acefire_density') || 'compact',
  showEmpty: localStorage.getItem('acefire_showempty') === '1',
  expandedCols: { quotes:new Set(), tracker:new Set() },
  boardMore: {},           // `${tabId}:${colId}` -> extra chunks shown
  mobileCol: {},           // tabId -> selected column id (single-column mobile board)
  drawerUid:null, drawerList:[], lastLoad:0
};
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const colLetter = i => String.fromCharCode(65 + i);
const todayMD = () => { const d = new Date(); return (d.getMonth()+1) + '/' + d.getDate(); };
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const activeTabDef = () => TABS.find(t => t.id === state.activeTab);
const rowByUid = uid => { for (const t of TABS){ const r = (state.data[t.id]||[]).find(x => x.uid === uid); if (r) return r; } return null; };
const rowByKey = (tabId, key) => (state.data[tabId] || []).find(r => r.key === key);
const isDirty = r => r && Object.keys(r.edits).length > 0;
const hasUnsaved = () => TABS.some(t => (state.data[t.id] || []).some(isDirty));
const quoteNum = key => { const n = Number(String(key || '').replace(/[^\d]/g, '')); return Number.isFinite(n) ? n : 0; };
const filledVal = v => { const t = String(v||'').trim(); return !!t && !/^not sent$/i.test(t) && t.toUpperCase() !== 'X'; };
const isX = v => String(v||'').trim().toUpperCase() === 'X';
const normName = v => String(v||'').trim().toLowerCase().replace(/\s+/g,' ');
const isMobileBoard = () => window.matchMedia('(max-width:880px)').matches;

function toast(msg, kind){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show' + (kind ? ' ' + kind : '');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.className = '', 3400);
}
function loading(on){ $('#loadbar').classList.toggle('on', !!on); }

/* =====================================================================
   Local cache — instant paint, then background refresh
   ===================================================================== */
function saveCache(){
  try {
    localStorage.setItem('acefire_cache_v1', JSON.stringify({
      ts: state.lastLoad, headers: state.headers, options: state.options,
      suggest: state.suggest, dupes: state.dupes,
      data: Object.fromEntries(TABS.map(t => [t.id, (state.data[t.id]||[]).map(r => r.cells)]))
    }));
  } catch(e){}
}
function hydrateCache(){
  try {
    const p = JSON.parse(localStorage.getItem('acefire_cache_v1') || 'null');
    if (!p || !p.data) return false;
    TABS.forEach(t => {
      state.data[t.id] = (p.data[t.id] || []).map((cells, j) =>
        ({ uid: t.id + ':' + j, key: String(cells[0]||'').trim(), sheetRow: j + 2, cells, edits:{}, saving:false }));
    });
    state.headers = p.headers || {};
    state.options = p.options || {};
    state.suggest = p.suggest || {};
    state.dupes = p.dupes || {};
    state.lastLoad = p.ts || 0;
    return true;
  } catch(e){ return false; }
}

/* =====================================================================
   Auth (Google Identity Services)
   ===================================================================== */
let tokenClient = null, pendingTokenResolve = null;

function gisReady(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: resp => {
      if (resp.access_token){
        state.token = resp.access_token;
        if (pendingTokenResolve){ pendingTokenResolve(true); pendingTokenResolve = null; }
        else onSignedIn();
      }
    },
    error_callback: () => {
      if (pendingTokenResolve){ pendingTokenResolve(false); pendingTokenResolve = null; return; }
      const g = $('#gateErr');
      g.style.display = 'block';
      g.textContent = 'Sign-in was cancelled or blocked. Try again.';
      $('#btnSignin').disabled = false;
    }
  });
  const hint = localStorage.getItem('acefire_hint');
  if (hint) silentToken(hint).then(ok => { if (ok) onSignedIn(); });
}
function silentToken(hint){
  return new Promise(resolve => {
    pendingTokenResolve = resolve;
    try { tokenClient.requestAccessToken({ prompt:'', hint: hint || state.email || undefined }); }
    catch(e){ pendingTokenResolve = null; resolve(false); }
    setTimeout(() => { if (pendingTokenResolve){ pendingTokenResolve = null; resolve(false); } }, 8000);
  });
}
$('#btnSignin').addEventListener('click', () => {
  $('#btnSignin').disabled = true;
  $('#gateErr').style.display = 'none';
  tokenClient.requestAccessToken({ prompt:'' });
  setTimeout(() => $('#btnSignin').disabled = false, 4000);
});
$('#btnSignout').addEventListener('click', () => {
  const tk = state.token;
  state.token = null;
  localStorage.removeItem('acefire_hint');
  localStorage.removeItem('acefire_cache_v1');
  if (tk){ try { google.accounts.oauth2.revoke(tk, () => {}); } catch(e){} }
  location.reload();
});
async function onSignedIn(){
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers:{ Authorization:'Bearer ' + state.token } });
    if (r.ok){ const u = await r.json(); state.email = u.email || ''; localStorage.setItem('acefire_hint', state.email); }
  } catch(e){}
  $('#gate').style.display = 'none';
  $('#app').style.display = 'block';
  $('#hdUser').style.display = 'flex';
  const em = $('#userEmail');
  em.textContent = state.email.split('@')[0];
  em.title = state.email;
  buildTabBar();
  if (hydrateCache()){
    renderAll();
  } else {
    renderSkeleton();
  }
  await loadAll();
}
function renderSkeleton(){
  const main = $('#main');
  main.innerHTML = '<div class="list" aria-hidden="true">' +
    Array.from({length:7}, () => '<div class="skel"><i></i><i></i><i></i></div>').join('') + '</div>';
}

/* =====================================================================
   Sheets API wrapper (401 → silent refresh → retry)
   ===================================================================== */
async function api(path, opts = {}, retry = true){
  const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.SPREADSHEET_ID + path, {
    ...opts,
    headers:{ 'Content-Type':'application/json', ...(opts.headers || {}), Authorization:'Bearer ' + state.token }
  });
  if (r.status === 401 && retry){
    const ok = await silentToken(state.email);
    if (ok) return api(path, opts, false);
    toast('Session expired — sign in again', 'err');
    $('#gate').style.display = 'flex';
    $('#app').style.display = 'none';
    closeDrawer();
    throw new Error('auth');
  }
  if (!r.ok){
    let msg = 'API error ' + r.status;
    try { msg = (await r.json()).error?.message || msg; } catch(e){}
    throw new Error(msg);
  }
  return r.json();
}

/* =====================================================================
   Data loading
   ===================================================================== */
async function loadAll(showToast){
  loading(true);
  const drawerOpen = $('#drawer').classList.contains('on');
  const openKey = drawerOpen ? (rowByUid(state.drawerUid) || {}).key : null;
  try {
    const ranges = TABS.map(t => `'${t.sheet}'!A1:${t.lastCol}`);
    const res = await api('/values:batchGet?valueRenderOption=FORMATTED_VALUE&ranges=' + ranges.map(encodeURIComponent).join('&ranges='));
    TABS.forEach((t, i) => {
      const vals = (res.valueRanges[i] && res.valueRanges[i].values) || [];
      state.headers[t.id] = vals[0] || [];
      const nCols = t.lastCol.charCodeAt(0) - 64;
      state.data[t.id] = vals.slice(1).map((row, j) => {
        const cells = Array.from({ length:nCols }, (_, c) => row[c] !== undefined ? String(row[c]) : '');
        return { uid: t.id + ':' + j, key: cells[0].trim(), sheetRow: j + 2, cells, edits:{}, saving:false };
      }).filter(r => r.cells.some(c => c !== ''));
      const seen = new Set(), dup = new Set();
      state.data[t.id].forEach(r => { if (!r.key) return; if (seen.has(r.key)) dup.add(r.key); seen.add(r.key); });
      state.dupes[t.id] = [...dup];
    });

    await loadTrackerOptions();
    state.lastLoad = Date.now();
    saveCache();
    renderAll();
    if (openKey){
      const nr = rowByKey(state.activeTab, openKey);
      if (nr){
        state.drawerUid = nr.uid;
        state.drawerList = visibleRows(activeTabDef()).map(r => r.uid);
        if (!$('#dSearch').value) renderDrawer();
      } else closeDrawer();
    }
    if (showToast) toast('Data refreshed', 'ok');
    loadActivity();
  } catch(e){
    if (e.message !== 'auth') toast('Load failed: ' + e.message, 'err');
    if (!state.lastLoad) $('#main').innerHTML = '<div class="list"><div class="empty">Could not load data — check your connection and refresh.</div></div>';
  } finally { loading(false); }
}

async function loadActivity(){
  if (!CONFIG.ACTIVITY_LOG_SHEET) return;
  try {
    const res = await api(`/values/${encodeURIComponent(`'${CONFIG.ACTIVITY_LOG_SHEET}'!A2:F`)}`);
    state.activity = (res.values || []).slice(-CONFIG.ACTIVITY_MAX);
  } catch(e){ state.activity = []; }
  state.activityLoaded = true;
  if (state.drawerUid && $('#drawer').classList.contains('on') && !$('#dSearch').value) renderDrawer();
}

/* Live dropdown options + Status list from the sheet's own data validation (Tracker D2:N2). */
async function loadTrackerOptions(){
  state.options = {}; state.suggest = {};
  try {
    const rng = encodeURIComponent("'Tracker'!D2:N2");
    const res = await api(`?ranges=${rng}&fields=${encodeURIComponent('sheets(data(startColumn,rowData(values(dataValidation))))')}`);
    const d = res.sheets?.[0]?.data?.[0];
    const startCol = d?.startColumn ?? 3;
    (d?.rowData?.[0]?.values || []).forEach((v, i) => {
      const cond = v?.dataValidation?.condition;
      if (cond && cond.type === 'ONE_OF_LIST' && cond.values){
        state.options[startCol + i] = cond.values.map(x => x.userEnteredValue).filter(Boolean);
      }
    });
  } catch(e){}
  for (const c of TABS[1].editable){
    const seen = new Map();
    (state.data.tracker || []).forEach(r => {
      const v = (r.cells[c] || '').trim();
      if (v) seen.set(v, (seen.get(v) || 0) + 1);
    });
    state.suggest[c] = [...seen.entries()].sort((a,b) => b[1]-a[1]).map(x => x[0]).slice(0, 12);
  }
}

/* =====================================================================
   Filters / sort / stages
   ===================================================================== */
const daysNum = r => { const n = parseInt(String(r.cells[8]).replace(/[^\-0-9]/g,''),10); return isNaN(n) ? null : n; };
const noFollowUp = r => [10,11,12].every(c => { const v = (r.cells[c]||'').trim().toLowerCase(); return v === '' || v === 'not sent'; });
const low = v => String(v||'').trim().toLowerCase();

function filterDefs(tab){
  if (tab.id === 'quotes'){
    return [
      { id:'all',      label:'All',              fn:() => true },
      { id:'active',   label:'Active',           fn:r => { const d = daysNum(r); return d === null || d >= 0; } },
      { id:'exp7',     label:'Expiring ≤7d',     fn:r => { const d = daysNum(r); return d !== null && d >= 0 && d <= 7; } },
      { id:'expired',  label:'Expired',          fn:r => { const d = daysNum(r); return d !== null && d < 0; } },
      { id:'nofu',     label:'No follow-up',     fn:noFollowUp },
      { id:'notsched', label:'Not scheduled',    fn:r => !(r.cells[14]||'').trim() }
    ];
  }
  return [
    { id:'all',        label:'All',              fn:() => true },
    { id:'needs',      label:'Needs action',     fn:r =>
        !(r.cells[7]||'').trim() || !(r.cells[9]||'').trim() ||
        low(r.cells[6]) === 'overdue' ||
        (low(r.cells[3]) === 'completed' && ['','not sent'].includes(low(r.cells[6]))) },
    { id:'notsched',   label:'To schedule',      fn:r => !(r.cells[7]||'').trim() },
    { id:'noreport',   label:'Reports to send',  fn:r => !(r.cells[9]||'').trim() },
    { id:'compninv',   label:'Ready to invoice', fn:r => low(r.cells[3]) === 'completed' && ['','not sent'].includes(low(r.cells[6])) },
    { id:'awaitpay',   label:'Awaiting payment', fn:r => low(r.cells[6]) === 'sent' },
    { id:'overdueinv', label:'Overdue invoices', fn:r => low(r.cells[6]) === 'overdue' },
    { id:'retest',     label:'Retest / repair',  fn:r => ['pending','awaiting approval','scheduled'].includes(low(r.cells[11])) },
    { id:'paid',       label:'Paid',             fn:r => low(r.cells[6]) === 'paid' },
    { id:'nojob',      label:'No job status',    fn:r => !(r.cells[13]||'').trim() }
  ];
}
function sortDefs(tab){
  const base = [{ id:'sheet', label:'Default order' }, { id:'newest', label:'Newest quote #' }];
  if (tab.id === 'quotes') base.splice(1, 0, { id:'expiring', label:'Expiring first' });
  return base;
}
function visibleRows(tab){
  let rows = state.data[tab.id] || [];
  const fdef = filterDefs(tab).find(f => f.id === state.filter[tab.id]) || filterDefs(tab)[0];
  rows = rows.filter(fdef.fn);
  if (tab.id === 'tracker' && state.trackerStatus){
    rows = rows.filter(r => (r.cells[3]||'').trim() === state.trackerStatus);
  }
  const q = state.search.trim().toLowerCase();
  if (q) rows = rows.filter(r => searchText(tab, r).includes(q));
  const s = state.sort[tab.id];
  if (s === 'newest') rows = [...rows].sort((a,b) => quoteNum(b.key) - quoteNum(a.key));
  else if (s === 'expiring') rows = [...rows].sort((a,b) => (daysNum(a) ?? 9e9) - (daysNum(b) ?? 9e9));
  return rows;
}
function searchText(tab, r){
  const skip = (tab.id === 'quotes' && !CONFIG.SHOW_FINANCIALS) ? [7] : [];
  return r.cells.filter((_, i) => !skip.includes(i)).join(' ').toLowerCase();
}

/* Quotes follow-up stage: furthest action taken. */
function stageOf(r){
  if (isX(r.cells[10]) || isX(r.cells[11]) || isX(r.cells[12]) || isX(r.cells[9])) return 'skipped';
  if (filledVal(r.cells[12])) return 'called';
  if (filledVal(r.cells[11])) return 'texted';
  if (filledVal(r.cells[10])) return 'emailed';
  return 'todo';
}
function boardCols(tab){
  if (tab.id === 'quotes') return [
    { id:'todo',    label:'To contact',  drop:null, hint:'' },
    { id:'emailed', label:'Emailed',     drop:10,   hint:'drop = emailed today' },
    { id:'texted',  label:'Texted',      drop:11,   hint:'drop = texted today' },
    { id:'called',  label:'Called',      drop:12,   hint:'drop = called today' },
    { id:'skipped', label:'Skipped / X', drop:null, hint:'' }
  ];
  const opts = state.options[13] || [];
  return [
    { id:'__none', label:'No status', drop:{ col:13, val:'' }, hint:'' },
    ...opts.map(o => ({ id:'js:' + o, label:o, drop:{ col:13, val:o }, hint:'' }))
  ];
}
function boardColOf(tab, r){
  if (tab.id === 'quotes') return stageOf(r);
  const v = (r.cells[13]||'').trim();
  return v ? 'js:' + v : '__none';
}

/* =====================================================================
   Rendering
   ===================================================================== */
function buildTabBar(){
  const bar = $('#tabbar');
  bar.innerHTML = '';
  TABS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab' + (state.activeTab === t.id ? ' active' : '');
    b.setAttribute('role', 'tab');
    b.setAttribute('aria-selected', state.activeTab === t.id ? 'true' : 'false');
    b.innerHTML = `${t.label} <span class="cnt" data-cnt="${t.id}">–</span>`;
    b.addEventListener('click', () => {
      state.activeTab = t.id;
      $$('.tab').forEach(x => { x.classList.remove('active'); x.setAttribute('aria-selected','false'); });
      b.classList.add('active');
      b.setAttribute('aria-selected','true');
      renderAll();
    });
    bar.appendChild(b);
  });
  $$('#viewTog button').forEach(b => b.addEventListener('click', () => {
    state.view[state.activeTab] = b.dataset.v;
    localStorage.setItem('acefire_view', JSON.stringify(state.view));
    renderAll();
  }));
}

/* Attention bar (Quotes follow-up urgency) + KPI cards (Tracker ops) — all tappable */
const ATTN_STATS = [
  { tab:'quotes', filter:'expired', label:'expired quotes', tone:'s-red' },
  { tab:'quotes', filter:'exp7',    label:'expiring ≤7d',   tone:'s-amber' },
  { tab:'quotes', filter:'nofu',    label:'no follow-up',   tone:'s-amber' }
];
const KPI_TILES = [
  { tab:'tracker', filter:'overdueinv', label:'Overdue invoices', sub:'sent, past due — chase',   tone:'red' },
  { tab:'tracker', filter:'noreport',   label:'Reports to send',  sub:'no report submitted yet',  tone:'amber' },
  { tab:'tracker', filter:'compninv',   label:'Ready to invoice', sub:'work done, not invoiced',  tone:'blue' },
  { tab:'tracker', filter:'notsched',   label:'To schedule',      sub:'no Ember date set',        tone:'amber' }
];
function countFor(tabId, filterId){
  const tab = TABS.find(t => t.id === tabId);
  const def = filterDefs(tab).find(f => f.id === filterId);
  return def ? (state.data[tabId] || []).filter(def.fn).length : 0;
}
function jumpTo(tabId, filterId){
  state.activeTab = tabId;
  state.filter[tabId] = filterId;
  if (tabId === 'tracker') state.trackerStatus = '';
  $$('.tab').forEach((x, i) => {
    const on = TABS[i].id === tabId;
    x.classList.toggle('active', on);
    x.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderAll();
}
function renderSummary(){
  const box = $('#summary');
  box.innerHTML = '';

  const bar = document.createElement('div');
  bar.className = 'attn';
  bar.innerHTML = '<span class="tag"><span class="dot" aria-hidden="true"></span>Needs attention</span>';
  ATTN_STATS.forEach(st => {
    const n = countFor(st.tab, st.filter);
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'stat ' + st.tone;
    b.setAttribute('aria-label', `${n} ${st.label} — show these`);
    b.innerHTML = `<b>${n}</b> ${esc(st.label)}`;
    b.addEventListener('click', () => jumpTo(st.tab, st.filter));
    bar.appendChild(b);
  });
  box.appendChild(bar);

  const grid = document.createElement('div');
  grid.className = 'kpis';
  KPI_TILES.forEach(tl => {
    const n = countFor(tl.tab, tl.filter);
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'kpi t-' + tl.tone + (n === 0 ? ' zero' : '') +
      (state.activeTab === tl.tab && state.filter[tl.tab] === tl.filter ? ' active' : '');
    b.setAttribute('aria-label', `${tl.label}: ${n} — show these`);
    b.innerHTML = `<span class="lbl">${esc(tl.label)}</span><b>${n}</b><span class="sub">${esc(tl.sub)}</span>`;
    b.addEventListener('click', () => jumpTo(tl.tab, tl.filter));
    grid.appendChild(b);
  });
  box.appendChild(grid);
}

function renderAll(){
  const tab = activeTabDef();
  TABS.forEach(t => {
    const el = document.querySelector(`[data-cnt="${t.id}"]`);
    if (el) el.textContent = (state.data[t.id] || []).length;
  });
  updateStale();
  renderSummary();

  $$('#viewTog button').forEach(b => b.classList.toggle('active', state.view[tab.id] === b.dataset.v));

  const sel = $('#sortSel');
  sel.innerHTML = sortDefs(tab).map(s => `<option value="${s.id}">${s.label}</option>`).join('');
  sel.value = state.sort[tab.id];

  const ss = $('#statusSel');
  if (tab.id === 'tracker'){
    const opts = state.options[3] || [];
    const present = [...new Set((state.data.tracker||[]).map(r => (r.cells[3]||'').trim()).filter(Boolean))];
    const all = [...new Set([...opts, ...present])];
    ss.innerHTML = '<option value="">Status: all</option>' + all.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
    ss.value = all.includes(state.trackerStatus) ? state.trackerStatus : '';
    ss.style.display = '';
  } else {
    ss.style.display = 'none';
  }

  const fb = $('#filterBar');
  fb.innerHTML = '';
  const all = state.data[tab.id] || [];
  filterDefs(tab).forEach(f => {
    const n = all.filter(f.fn).length;
    if (f.id !== 'all' && n === 0) return;
    const b = document.createElement('button');
    b.className = 'fchip' + (state.filter[tab.id] === f.id ? ' active' : '');
    b.setAttribute('aria-pressed', state.filter[tab.id] === f.id ? 'true' : 'false');
    b.innerHTML = `${esc(f.label)}<span class="n">${n}</span>`;
    b.addEventListener('click', () => { state.filter[tab.id] = f.id; renderAll(); });
    fb.appendChild(b);
  });

  const dupes = state.dupes[tab.id] || [];
  $('#dupeBanner').classList.toggle('on', dupes.length > 0);
  if (dupes.length){
    $('#dupeText').textContent = `⚠ Duplicate quote #s on ${tab.label}: ${dupes.join(', ')} — saves verify the exact row first, but clean these up in the sheet.`;
  }

  renderContent();
}
function renderContent(){
  state.view[state.activeTab] === 'board' ? renderBoard() : renderList();
}

function updateStale(){
  const el = $('#metaNote');
  if (!state.lastLoad){ el.textContent = '…'; return; }
  const mins = Math.floor((Date.now() - state.lastLoad) / 60000);
  el.className = 'stale' + (mins >= 15 ? ' old' : mins >= 5 ? ' warn' : '');
  el.textContent = mins < 1 ? 'Updated just now'
    : mins < 5 ? `Updated ${mins}m ago`
    : mins < 15 ? `Updated ${mins}m ago — tap to refresh`
    : `⚠ ${mins}m old — refresh`;
}
setInterval(updateStale, 30000);
setInterval(() => {
  if (!document.hidden && state.token && state.lastLoad && !hasUnsaved() &&
      Date.now() - state.lastLoad > CONFIG.STALE_MS){
    loadAll();
  }
}, 60000);
$('#metaNote').addEventListener('click', () => $('#btnRefresh').click());

/* re-render the board when crossing the mobile breakpoint */
let wasMobileBoard = null;
window.addEventListener('resize', () => {
  const m = isMobileBoard();
  if (m !== wasMobileBoard){
    wasMobileBoard = m;
    if (state.view[state.activeTab] === 'board') renderContent();
  }
});

/* ---- list view ---- */
function emptyMsg(tab){
  if (state.search) return 'No matches for your search.';
  if (state.filter[tab.id] !== 'all' || (tab.id === 'tracker' && state.trackerStatus))
    return 'All clear here 🎉 — nothing matches this view.';
  return 'No rows in this tab yet.';
}
function renderList(){
  const tab = activeTabDef();
  const rows = visibleRows(tab);
  const main = $('#main');
  main.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'list';
  if (!rows.length){
    list.innerHTML = `<div class="empty">${emptyMsg(tab)}</div>`;
    main.appendChild(list);
    return;
  }
  rows.forEach(r => {
    const b = document.createElement('div');
    b.setAttribute('role', 'button');
    b.tabIndex = 0;
    let urgency = '';
    if (tab.id === 'quotes'){
      const d = daysNum(r);
      if (d !== null && d < 0) urgency = ' u-exp';
      else if (d !== null && d <= 7) urgency = ' u-soon';
      else if (noFollowUp(r)) urgency = ' u-warn';
    }
    b.className = 'row' + urgency + (state.drawerUid === r.uid && $('#drawer').classList.contains('on') ? ' sel' : '');
    b.setAttribute('aria-label', `Quote ${r.key}, ${r.cells[1]} — open details`);
    b.innerHTML = `
      <div class="r-main">
        <div class="r-top">
          <span class="r-q">#${esc(r.key)}</span>
          <span class="r-nm">${esc(r.cells[1])}</span>
          ${isDirty(r) ? '<span class="r-dot" title="Unsaved edits"></span>' : ''}
        </div>
        <div class="r-ttl">${esc(tab.id === 'quotes' ? r.cells[4] : r.cells[2])}</div>
        <div class="r-meta">${rowMeta(tab, r)}</div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>`;
    b.addEventListener('click', () => openDrawer(r.uid));
    b.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(r.uid); }
    });
    b.querySelectorAll('[data-qc]').forEach(ch => {
      ch.addEventListener('click', e => {
        e.stopPropagation();
        quickContact(tab, r, +ch.dataset.qc, ch);
      });
      ch.addEventListener('keydown', e => e.stopPropagation());
    });
    list.appendChild(b);
  });
  main.appendChild(list);
}

function rowMeta(tab, r){
  if (tab.id === 'quotes'){
    const parts = [ daysBadge(r) ];
    if (r.cells[9]) parts.push(`<span class="badge b-gray">${esc(r.cells[9])}</span>`);
    parts.push(fuTag(r, 10, '✉'), fuTag(r, 11, '💬'), fuTag(r, 12, '📞'));
    if (r.cells[15]) parts.push(`<span class="badge b-blue">${esc(r.cells[15])}${r.cells[14] ? ' · ' + esc(r.cells[14]) : ''}</span>`);
    return parts.filter(Boolean).join('');
  }
  const parts = [ statusBadge(r.cells[3]), wixBadge(r.cells[4]) ];
  if (r.cells[13]) parts.push(`<span class="badge b-amber">${esc(r.cells[13])}</span>`);
  parts.push(invStatusBadge(r.cells[6]));
  if (r.cells[8]) parts.push(`<span class="badge b-blue">${esc(r.cells[8])}${r.cells[7] ? ' · ' + esc(r.cells[7]) : ''}</span>`);
  return parts.filter(Boolean).join('');
}
function fuTag(r, col, icon){
  const verb = QC_LABEL[col];
  const t = (r.cells[col] || '').trim();
  if (!t || /^not sent$/i.test(t)){
    return `<button type="button" class="fu off" data-qc="${col}" title="Mark ${verb.toLowerCase()} today" aria-label="Mark ${verb.toLowerCase()} today">${icon} —</button>`;
  }
  const short = t.length > 10 ? t.slice(0,10) + '…' : t;
  return `<button type="button" class="fu" data-qc="${col}" title="${verb} ${esc(t)} — tap to set today" aria-label="${verb} ${esc(t)}">${icon} ${esc(short)}</button>`;
}
async function quickContact(tab, r, col, chipEl){
  if (r.saving) return;
  const cur = (r.cells[col] || '').trim();
  const verb = QC_LABEL[col];
  if (isX(cur)) { openDrawer(r.uid); return; }
  if (filledVal(cur) && !confirm(`${verb} already set to "${cur}" — replace with today (${todayMD()})?`)) return;
  r.saving = true;
  if (chipEl) chipEl.classList.add('busy');
  try {
    await commitEdits(tab, r, { [col]: todayMD() });
    toast(`#${r.key} — ${verb.toLowerCase()} ${todayMD()}`, 'ok');
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    renderContent();
    renderSummary();
    if (state.drawerUid === r.uid && $('#drawer').classList.contains('on')) renderDrawer();
  }
}

function daysBadge(r){
  const n = daysNum(r);
  if (n === null) return r.cells[8] ? `<span class="badge b-gray">${esc(r.cells[8])}</span>` : '';
  if (n < 0)  return `<span class="badge b-red">Expired ${Math.abs(n)}d</span>`;
  if (n <= 7) return `<span class="badge b-amber">${n}d left</span>`;
  return `<span class="badge b-green">${n}d left</span>`;
}
function statusBadge(v){
  if (!v) return '';
  const m = { 'Completed':'b-green','Confirmed':'b-blue','Scheduled':'b-blue','In Progress':'b-amber','Unconfirmed':'b-gray','Cancelled':'b-red' };
  return `<span class="badge ${m[v]||'b-gray'}">${esc(v)}</span>`;
}
function wixBadge(v){
  if (!v) return '';
  const m = { 'Paid':'b-green','Invoiced':'b-amber','Accepted':'b-blue' };
  return `<span class="badge ${m[v]||'b-gray'}">${esc(v)}</span>`;
}
function invStatusBadge(v){
  if (!v) return '';
  const m = { 'Paid':'b-green','Sent':'b-blue','Overdue':'b-red','Not Sent':'b-gray' };
  return `<span class="badge ${m[v]||'b-gray'}">Inv: ${esc(v)}</span>`;
}
function invShort(v){
  if (!v) return '';
  const m = { 'Paid':'b-green','Sent':'b-blue','Overdue':'b-red','Not Sent':'b-gray' };
  return `<span class="badge ${m[v]||'b-gray'}">${esc(v)}</span>`;
}

/* =====================================================================
   Board view (kanban)
   ===================================================================== */
function groupBoard(tab, rows, cols){
  const grouped = {};
  cols.forEach(c => grouped[c.id] = []);
  rows.forEach(r => {
    const cid = boardColOf(tab, r);
    (grouped[cid] || (grouped[cid] = [])).push(r);
  });
  // off-list job statuses become their own columns
  Object.keys(grouped).forEach(cid => {
    if (!cols.some(c => c.id === cid)){
      cols.push({ id:cid, label:cid.replace(/^js:/,''), drop:{ col:13, val:cid.replace(/^js:/,'') }, hint:'' });
    }
  });
  return grouped;
}

function renderBoard(){
  const tab = activeTabDef();
  const rows = visibleRows(tab);
  const cols = boardCols(tab);
  const grouped = groupBoard(tab, rows, cols);
  const main = $('#main');
  main.innerHTML = '';
  wasMobileBoard = isMobileBoard();

  if (wasMobileBoard){
    renderBoardMobile(main, tab, cols, grouped);
  } else {
    renderBoardDesktop(main, tab, cols, grouped);
  }
}

/* ---- desktop board: populated columns + one rail of empty-status stubs ---- */
function renderBoardDesktop(main, tab, cols, grouped){
  const isOpen = c => (grouped[c.id]||[]).length > 0 || state.showEmpty || state.expandedCols[tab.id].has(c.id);
  const openCols = cols.filter(isOpen);
  const railCols = cols.filter(c => !isOpen(c));

  // "Go to" strip — navigation only; never filters, never expands
  const strip = document.createElement('div');
  strip.className = 'bjump';
  if (openCols.length > 1 || railCols.length){
    strip.insertAdjacentHTML('beforeend', '<span class="glabel">Go to:</span>');
    openCols.forEach(cdef => {
      const n = (grouped[cdef.id] || []).length;
      const j = document.createElement('button');
      j.type = 'button';
      j.className = 'jchip';
      j.setAttribute('aria-label', `Scroll to ${cdef.label} column (${n})`);
      j.innerHTML = `${esc(cdef.label)}<span class="n">${n}</span>`;
      j.addEventListener('click', () => scrollToCol(cdef.id));
      strip.appendChild(j);
    });
    if (railCols.length){
      const j = document.createElement('button');
      j.type = 'button';
      j.className = 'jchip dim';
      j.setAttribute('aria-label', `Scroll to empty statuses (${railCols.length})`);
      j.innerHTML = `Empty<span class="n">${railCols.length}</span>`;
      j.addEventListener('click', () => scrollToCol('__rail'));
      strip.appendChild(j);
    }
  }
  const tEmpty = document.createElement('button');
  tEmpty.type = 'button';
  tEmpty.className = 'jtog';
  tEmpty.setAttribute('aria-pressed', state.showEmpty ? 'true' : 'false');
  tEmpty.textContent = state.showEmpty ? 'Tuck empty into rail' : 'Open all empty';
  tEmpty.addEventListener('click', () => {
    state.showEmpty = !state.showEmpty;
    localStorage.setItem('acefire_showempty', state.showEmpty ? '1' : '0');
    renderContent();
  });
  strip.appendChild(tEmpty);
  strip.appendChild(densityToggle());
  main.appendChild(strip);

  const board = document.createElement('div');
  board.className = 'board ' + state.density;
  openCols.forEach(cdef => board.appendChild(buildColumn(tab, cdef, grouped[cdef.id] || [])));
  if (railCols.length) board.appendChild(buildRail(tab, railCols));
  main.appendChild(board);
  markScrollableCols(board);
}
function scrollToCol(id){
  const el = document.querySelector(`[data-colid="${CSS.escape(id)}"]`);
  if (el){
    el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'start' });
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 1200);
  }
}
function buildRail(tab, railCols){
  const rail = document.createElement('div');
  rail.className = 'bcol rail';
  rail.dataset.colid = '__rail';
  rail.innerHTML = `<div class="bcol-h"><span class="lbl">Empty statuses</span><span class="n">${railCols.length}</span></div>`;
  const list = document.createElement('div');
  list.className = 'rail-list';
  railCols.forEach(cdef => {
    const stub = document.createElement('div');
    stub.className = 'stub';
    stub.setAttribute('role', 'button');
    stub.tabIndex = 0;
    stub.dataset.colid = cdef.id;
    stub.title = 'Drop a card here to set this status · click to open as a column';
    stub.setAttribute('aria-label', `${cdef.label}, empty — drop a card to set this status, or open as a column`);
    stub.innerHTML = `<span class="lbl">${esc(cdef.label)}</span><span class="n">0</span><span class="plus" aria-hidden="true">＋</span>`;
    if (cdef.drop !== null && cdef.drop !== undefined){
      stub.addEventListener('dragover', e => { e.preventDefault(); stub.classList.add('dropok'); e.dataTransfer.dropEffect = 'move'; });
      stub.addEventListener('dragleave', () => stub.classList.remove('dropok'));
      stub.addEventListener('drop', e => {
        e.preventDefault();
        stub.classList.remove('dropok');
        handleDrop(tab, cdef, e.dataTransfer.getData('text/plain'));
      });
    }
    const expand = () => {
      state.expandedCols[tab.id].add(cdef.id);
      renderContent();
      requestAnimationFrame(() => scrollToCol(cdef.id));
    };
    stub.addEventListener('click', expand);
    stub.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); expand(); } });
    list.appendChild(stub);
  });
  rail.appendChild(list);
  return rail;
}

/* ---- mobile board: one column at a time + stepper ---- */
function renderBoardMobile(main, tab, cols, grouped){
  const ids = cols.map(c => c.id);
  let cur = state.mobileCol[tab.id];
  if (!cur || !ids.includes(cur)){
    cur = (cols.find(c => (grouped[c.id] || []).length > 0) || cols[0]).id;
    state.mobileCol[tab.id] = cur;
  }
  const idx = ids.indexOf(cur);

  const nav = document.createElement('div');
  nav.className = 'mnav';
  const prev = document.createElement('button');
  prev.className = 'icon-btn';
  prev.setAttribute('aria-label', 'Previous status column');
  prev.textContent = '‹';
  prev.disabled = idx <= 0;
  prev.addEventListener('click', () => { state.mobileCol[tab.id] = ids[idx - 1]; renderContent(); });
  const next = document.createElement('button');
  next.className = 'icon-btn';
  next.setAttribute('aria-label', 'Next status column');
  next.textContent = '›';
  next.disabled = idx >= ids.length - 1;
  next.addEventListener('click', () => { state.mobileCol[tab.id] = ids[idx + 1]; renderContent(); });
  const sel = document.createElement('select');
  sel.setAttribute('aria-label', 'Choose status column');
  cols.forEach(c => sel.appendChild(new Option(`${c.label} (${(grouped[c.id]||[]).length})`, c.id)));
  sel.value = cur;
  sel.addEventListener('change', () => { state.mobileCol[tab.id] = sel.value; renderContent(); });
  nav.appendChild(prev);
  nav.appendChild(sel);
  nav.appendChild(next);
  nav.appendChild(densityToggle(true));
  main.appendChild(nav);

  const board = document.createElement('div');
  board.className = 'board mobile1 ' + state.density;
  const cdef = cols[idx];
  board.appendChild(buildColumn(tab, cdef, grouped[cdef.id] || []));
  main.appendChild(board);
  markScrollableCols(board);
}

function densityToggle(compactBtn){
  const d = document.createElement('button');
  d.type = 'button';
  d.className = compactBtn ? 'icon-btn' : 'jtog';
  const roomy = state.density === 'comfortable';
  if (compactBtn){
    d.textContent = roomy ? '▤' : '▢';
    d.setAttribute('aria-label', roomy ? 'Switch to compact cards' : 'Switch to roomier cards');
    d.title = roomy ? 'Compact cards' : 'Roomier cards';
  } else {
    d.textContent = roomy ? 'Compact cards' : 'Roomier cards';
  }
  d.addEventListener('click', () => {
    state.density = roomy ? 'compact' : 'comfortable';
    localStorage.setItem('acefire_density', state.density);
    renderContent();
  });
  return d;
}

function buildColumn(tab, cdef, items){
  const col = document.createElement('div');
  col.dataset.colid = cdef.id;
  col.className = 'bcol';

  const droppable = cdef.drop !== null && cdef.drop !== undefined;
  if (droppable){
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('dropok'); e.dataTransfer.dropEffect = 'move'; });
    col.addEventListener('dragleave', () => col.classList.remove('dropok'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('dropok');
      handleDrop(tab, cdef, e.dataTransfer.getData('text/plain'));
    });
  }

  const head = document.createElement('div');
  head.className = 'bcol-h';
  head.innerHTML = `<span class="lbl">${esc(cdef.label)}</span><span class="n">${items.length}</span>` +
    (cdef.hint ? `<span class="hint">${esc(cdef.hint)}</span>` : '');
  if (cdef.hint) head.title = cdef.hint;
  // an empty column opened from the rail gets a tuck-back button
  if (!items.length && !state.showEmpty && state.expandedCols[tab.id].has(cdef.id)){
    const x = document.createElement('button');
    x.type = 'button';
    x.className = 'colx';
    x.textContent = '−';
    x.title = 'Tuck back into the empty rail';
    x.setAttribute('aria-label', `Collapse ${cdef.label} back into the empty rail`);
    x.addEventListener('click', () => { state.expandedCols[tab.id].delete(cdef.id); renderContent(); });
    head.appendChild(x);
  }
  col.appendChild(head);

  const box = document.createElement('div');
  box.className = 'bcol-cards';
  if (!items.length){
    box.innerHTML = '<div class="bempty">— drop a card here —</div>';
  } else {
    const moreKey = tab.id + ':' + cdef.id;
    const shown = CONFIG.BOARD_CHUNK * (1 + (state.boardMore[moreKey] || 0));
    items.slice(0, shown).forEach(r => box.appendChild(boardCard(tab, r)));
    if (items.length > shown){
      const lm = document.createElement('button');
      lm.type = 'button';
      lm.className = 'loadmore';
      lm.textContent = `Show ${Math.min(CONFIG.BOARD_CHUNK, items.length - shown)} more (${items.length - shown} left)`;
      lm.addEventListener('click', () => {
        state.boardMore[moreKey] = (state.boardMore[moreKey] || 0) + 1;
        renderContent();
      });
      box.appendChild(lm);
    }
  }
  col.appendChild(box);

  const fade = document.createElement('div');
  fade.className = 'bfade';
  col.appendChild(fade);
  return col;
}

function markScrollableCols(board){
  requestAnimationFrame(() => {
    board.querySelectorAll('.bcol').forEach(col => {
      const box = col.querySelector('.bcol-cards');
      if (box && box.scrollHeight > box.clientHeight + 4) col.classList.add('can-scroll');
    });
  });
}

function boardCard(tab, r){
  const c = document.createElement('div');
  c.className = 'bcard' + (r.saving ? ' saving' : '');
  c.draggable = true;
  c.tabIndex = 0;
  c.setAttribute('role', 'button');
  c.setAttribute('aria-label', `Quote ${r.key}, ${r.cells[1]} — open details`);
  c.dataset.uid = r.uid;
  const title = tab.id === 'quotes' ? r.cells[4] : r.cells[2];
  // one inline mini-chip on line 1; full meta row only in comfortable density
  const mini = tab.id === 'quotes'
    ? daysBadge(r)
    : (statusBadge(r.cells[3]) || invShort(r.cells[6]));
  const meta = tab.id === 'quotes'
    ? [r.cells[9] ? `<span class="badge b-gray">${esc(r.cells[9])}</span>` : '', r.cells[15] ? `<span class="badge b-blue">${esc(r.cells[15])}</span>` : '']
    : [wixBadge(r.cells[4]), invStatusBadge(r.cells[6]), r.cells[7] ? `<span class="badge b-blue">${esc(r.cells[7])}</span>` : ''];
  c.innerHTML = `
    <div class="t"><b>#${esc(r.key)}</b><span class="nm">${esc(r.cells[1])}</span>${isDirty(r) ? '<span class="r-dot"></span>' : ''}${mini || ''}</div>
    <div class="s">${esc(title)}</div>
    ${state.density === 'comfortable' ? `<div class="m">${meta.filter(Boolean).join('')}</div>` : ''}`;
  c.addEventListener('click', () => openDrawer(r.uid));
  c.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(r.uid); }
  });
  c.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', r.uid);
    e.dataTransfer.effectAllowed = 'move';
    c.classList.add('dragging');
  });
  c.addEventListener('dragend', () => c.classList.remove('dragging'));
  return c;
}

async function handleDrop(tab, cdef, uid){
  const r = rowByUid(uid);
  if (!r || r.saving) return;
  let col, val, label;
  if (tab.id === 'quotes'){
    col = cdef.drop; val = todayMD();
    label = `#${r.key} → ${cdef.label} ${val}`;
    if (boardColOf(tab, r) === cdef.id && filledVal(r.cells[col])) return;
  } else {
    col = cdef.drop.col; val = cdef.drop.val;
    label = `#${r.key} → ${cdef.label === 'No status' ? 'no job status' : cdef.label}`;
    if ((r.cells[col]||'').trim() === val) return;
  }
  r.saving = true;
  renderContent();
  try {
    await commitEdits(tab, r, { [col]: val });
    toast(label, 'ok');
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    renderContent();
    renderSummary();
    if (state.drawerUid === r.uid && $('#drawer').classList.contains('on')) renderDrawer();
  }
}

/* =====================================================================
   Drawer
   ===================================================================== */
function openDrawer(uid){
  state.drawerUid = uid;
  state.drawerList = visibleRows(activeTabDef()).map(r => r.uid);
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  $('#drawer').classList.add('on');
  $('#overlay').classList.add('on');
  document.body.classList.add('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'false');
  renderContent();
}
function closeDrawer(){
  $('#drawer').classList.remove('on');
  $('#overlay').classList.remove('on');
  document.body.classList.remove('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'true');
  renderContent();
}
$('#dClose').addEventListener('click', closeDrawer);
$('#overlay').addEventListener('click', closeDrawer);
$('#dPrev').addEventListener('click', () => stepDrawer(-1));
$('#dNext').addEventListener('click', () => stepDrawer(1));
document.addEventListener('keydown', e => {
  if (!$('#drawer').classList.contains('on')) return;
  const typing = /input|textarea|select/i.test(document.activeElement?.tagName || '');
  if (e.key === 'Escape'){ typing ? document.activeElement.blur() : closeDrawer(); }
  if (typing) return;
  if (e.key === 'ArrowLeft') stepDrawer(-1);
  if (e.key === 'ArrowRight') stepDrawer(1);
});
function stepDrawer(dir){
  const i = state.drawerList.indexOf(state.drawerUid);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= state.drawerList.length) return;
  state.drawerUid = state.drawerList[j];
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  renderContent();
}

$('#dSearch').addEventListener('input', () => {
  const q = $('#dSearch').value;
  $('#dSearchWrap').classList.toggle('has', !!q);
  q.trim() ? renderDrawerResults(q.trim().toLowerCase()) : renderDrawer();
});
$('#dSearchClr').addEventListener('click', () => {
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
});
function renderDrawerResults(q){
  const tab = activeTabDef();
  const hits = (state.data[tab.id] || []).filter(r => searchText(tab, r).includes(q)).slice(0, 25);
  const body = $('#dBody');
  body.innerHTML = '<div class="d-results"></div>';
  const box = body.firstChild;
  if (!hits.length){ box.innerHTML = '<div class="none">No matches in this tab.</div>'; return; }
  hits.forEach(r => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'rrow';
    b.innerHTML = `<span class="t"><b>#${esc(r.key)}</b> ${esc(r.cells[1])}</span>
                   <span class="s">${esc(tab.id === 'quotes' ? r.cells[4] : r.cells[2])}</span>`;
    b.addEventListener('click', () => {
      state.drawerUid = r.uid;
      $('#dSearch').value = '';
      $('#dSearchWrap').classList.remove('has');
      renderDrawer();
      renderContent();
    });
    box.appendChild(b);
  });
  $('#dFoot').className = 'd-foot';
}

function renderDrawer(){
  const tab = activeTabDef();
  const r = rowByUid(state.drawerUid);
  const body = $('#dBody');
  if (!r){ body.innerHTML = '<div class="empty">Record not found — it may have been removed. Refresh the data.</div>'; syncFoot(null); return; }

  $('#dQuote').textContent = '#' + r.key;
  $('#dName').textContent = r.cells[1];
  const i = state.drawerList.indexOf(r.uid);
  $('#dPrev').disabled = i <= 0;
  $('#dNext').disabled = i < 0 || i >= state.drawerList.length - 1;

  body.innerHTML = '';

  const acts = document.createElement('div');
  acts.className = 'd-actions';
  const email = tab.id === 'quotes' ? (r.cells[2]||'').trim() : '';
  const phone = tab.id === 'quotes' ? (r.cells[3]||'').trim() : '';
  const link  = tab.id === 'quotes' ? (r.cells[5]||'').trim() : '';
  if (phone) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="tel:${esc(phone)}">📞 Call</a>`);
  if (phone) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="sms:${esc(phone)}">💬 Text</a>`);
  if (email) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="mailto:${esc(email)}">✉ Email</a>`);
  if (/^https?:\/\//.test(link)) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="${esc(link)}" target="_blank" rel="noopener">↗ Wix quote</a>`);
  const otherId = tab.id === 'quotes' ? 'tracker' : 'quotes';
  const twin = rowByKey(otherId, r.key);
  if (twin){
    const jb = document.createElement('button');
    jb.className = 'act-btn';
    jb.textContent = (otherId === 'tracker' ? '⇄ Open in Tracker' : '⇄ Open in Quotes');
    jb.addEventListener('click', () => switchToRecord(otherId, twin.uid));
    acts.appendChild(jb);
  }
  if (acts.children.length) body.appendChild(acts);

  const info = document.createElement('div');
  info.className = 'd-sec';
  info.innerHTML = '<h3>Details</h3>';
  const grid = document.createElement('div');
  grid.className = 'info-grid';
  const add = (k, vHtml) => { if (vHtml) grid.insertAdjacentHTML('beforeend', `<div class="k">${k}</div><div class="v">${vHtml}</div>`); };
  const title = tab.id === 'quotes' ? r.cells[4] : r.cells[2];
  add('Job', esc(title));
  if (tab.id === 'quotes'){
    add('Expires', `${daysBadge(r)}${r.cells[6] ? ` <span style="color:var(--muted);font-size:12px">${esc(String(r.cells[6]).slice(0,10))}</span>` : ''}`);
    add('Status', r.cells[9] ? `<span class="badge b-gray">${esc(r.cells[9])}</span>` : '');
    add('Ember', (r.cells[14] || r.cells[15]) ? `${r.cells[15] ? `<span class="badge b-blue">${esc(r.cells[15])}</span> ` : ''}${esc(r.cells[14])}` : '');
    add('Email', email ? `<a href="mailto:${esc(email)}">${esc(email)}</a>` : '');
    add('Phone', phone ? `<a href="tel:${esc(phone)}">${esc(phone)}</a>` : '');
  } else {
    add('Status', statusBadge(r.cells[3]));
    add('Wix', wixBadge(r.cells[4]));
    add('Invoice #', esc(r.cells[5]));
    add('Invoice', invStatusBadge(r.cells[6]));
    add('Ember', (r.cells[7] || r.cells[8]) ? `${r.cells[8] ? `<span class="badge b-blue">${esc(r.cells[8])}</span> ` : ''}${esc(r.cells[7])}` : '');
  }
  info.appendChild(grid);
  body.appendChild(info);

  const ed = document.createElement('div');
  ed.className = 'd-sec';
  ed.innerHTML = '<h3>Team updates</h3>';
  const hdr = state.headers[tab.id] || [];
  tab.editable.forEach(colIdx => {
    const f = document.createElement('div');
    f.className = 'd-field';
    const lb = document.createElement('label');
    lb.textContent = hdr[colIdx] || colLetter(colIdx);
    lb.htmlFor = 'fld-' + colIdx;
    f.appendChild(lb);
    f.appendChild(buildControl(tab, r, colIdx));
    ed.appendChild(f);
  });
  body.appendChild(ed);

  const related = [];
  const nm = normName(r.cells[1]);
  if (nm){
    TABS.forEach(t => (state.data[t.id]||[]).forEach(x => {
      if (x.uid !== r.uid && normName(x.cells[1]) === nm) related.push({ t, x });
    }));
  }
  if (related.length){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = `<h3>Same customer (${related.length})</h3><div class="d-results"></div>`;
    const box = sec.querySelector('.d-results');
    related.slice(0, 8).forEach(({ t, x }) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'rrow';
      b.innerHTML = `<span class="t"><b>#${esc(x.key)}</b> ${esc(t.label)}</span>
                     <span class="s">${esc(t.id === 'quotes' ? x.cells[4] : x.cells[2])}</span>`;
      b.addEventListener('click', () => switchToRecord(t.id, x.uid));
      box.appendChild(b);
    });
    body.appendChild(sec);
  }

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = '<h3>Recent activity</h3>';
    if (!state.activityLoaded){
      sec.insertAdjacentHTML('beforeend', '<div class="log-none">Loading activity…</div>');
    } else {
      const entries = state.activity.filter(a => String(a[4] ?? '').trim() === r.key).slice(-5).reverse();
      if (!entries.length) sec.insertAdjacentHTML('beforeend', '<div class="log-none">No logged activity for this record yet — edits made here will appear.</div>');
      entries.forEach(a => {
        sec.insertAdjacentHTML('beforeend', `
          <div class="log-item">
            <div class="lt"><span>${esc(a[0] || '')}</span><span>${esc(String(a[1] || '').split('@')[0])}</span>${a[3] ? `<span class="badge b-gray">${esc(a[3])}</span>` : ''}</div>
            <div class="ld">${esc(a[5] || a[2] || '')}</div>
          </div>`);
      });
    }
    body.appendChild(sec);
  }

  syncFoot(r);
}
function switchToRecord(tabId, uid){
  state.activeTab = tabId;
  $$('.tab').forEach((x, i) => {
    const on = TABS[i].id === tabId;
    x.classList.toggle('active', on);
    x.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderAll();
  openDrawer(uid);
}

/* =====================================================================
   Editable controls
   ===================================================================== */
const currentVal = (r, c) => c in r.edits ? r.edits[c] : (r.cells[c] || '');
function setEdit(tab, r, colIdx, val){
  if (val === (r.cells[colIdx] || '')) delete r.edits[colIdx];
  else r.edits[colIdx] = val;
  $$(`#dBody [data-col="${colIdx}"]`).forEach(ct => ct.classList.toggle('changed', colIdx in r.edits));
  syncFoot(r);
  renderContent();
}
function syncFoot(r){
  const foot = $('#dFoot');
  foot.className = 'd-foot' + (isDirty(r) ? ' dirty' : '');
  const btn = $('#dSave');
  if (!btn.classList.contains('saving')) btn.textContent = isDirty(r) ? 'Save' : 'Saved';
  $('#dSaveNext').textContent = isDirty(r) ? 'Save & Next ›' : 'Next ›';
  const i = state.drawerList.indexOf(r ? r.uid : null);
  $('#dSaveNext').disabled = !isDirty(r) && (i < 0 || i >= state.drawerList.length - 1);
}

function buildControl(tab, r, colIdx){
  const box = document.createElement('div');
  box.className = 'ctl' + (colIdx in r.edits ? ' changed' : '');
  box.dataset.col = colIdx;
  const val = currentVal(r, colIdx);

  if (tab.id === 'quotes'){
    if (colIdx === 13){
      const ta = document.createElement('textarea');
      ta.id = 'fld-' + colIdx;
      ta.value = val;
      ta.placeholder = 'Notes…';
      ta.addEventListener('input', () => setEdit(tab, r, colIdx, ta.value));
      box.appendChild(ta);
      box.appendChild(chipRow([
        { l:'+ ' + todayMD() + ' Sent email', v:() => appendLine(ta, todayMD() + ' Sent email,') },
        { l:'+ ' + todayMD() + ' Sent text',  v:() => appendLine(ta, todayMD() + ' Sent text:') },
        { l:'+ ' + todayMD() + ' Called',     v:() => appendLine(ta, todayMD() + ' Called,') }
      ], () => setEdit(tab, r, colIdx, ta.value)));
      return box;
    }
    const inp = mkInput(val, 'e.g. ' + todayMD());
    inp.id = 'fld-' + colIdx;
    inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
    box.appendChild(inp);
    box.appendChild(chipRow([
      { l: todayMD(),  v:() => inp.value = todayMD() },
      { l:'Not Sent',  v:() => inp.value = 'Not Sent' },
      { l:'X',         v:() => inp.value = 'X' }
    ], () => setEdit(tab, r, colIdx, inp.value)));
    return box;
  }

  const listOpts = state.options[colIdx];
  if (listOpts && listOpts.length){
    buildSelect(box, tab, r, colIdx, listOpts, val);
    return box;
  }
  const inp = mkInput(val, 'Type…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-' + colIdx;
  ensureDatalist(dlId, state.suggest[colIdx] || []);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  return box;
}
function mkInput(val, ph){
  const i = document.createElement('input');
  i.type = 'text'; i.value = val; i.placeholder = ph; i.autocomplete = 'off';
  return i;
}
function buildSelect(box, tab, r, colIdx, opts, val){
  box.innerHTML = '';
  const sel = document.createElement('select');
  sel.id = 'fld-' + colIdx;
  const all = [...opts];
  if (val && !all.includes(val)) all.unshift(val);
  sel.appendChild(new Option('— select —', ''));
  all.forEach(o => sel.appendChild(new Option(o, o)));
  sel.appendChild(new Option('✎ Type a custom answer…', '__custom__'));
  sel.value = all.includes(val) ? val : '';
  sel.addEventListener('change', () => {
    if (sel.value === '__custom__'){ toCustomInput(box, tab, r, colIdx, opts); return; }
    setEdit(tab, r, colIdx, sel.value);
  });
  box.appendChild(sel);
}
function toCustomInput(box, tab, r, colIdx, opts){
  box.innerHTML = '';
  const inp = mkInput('', 'Custom answer…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-custom-' + colIdx;
  ensureDatalist(dlId, [...new Set([...(opts||[]), ...(state.suggest[colIdx]||[])])]);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  const back = document.createElement('button');
  back.className = 'backlist'; back.type = 'button'; back.textContent = '↩ back to list';
  back.addEventListener('click', () => {
    buildSelect(box, tab, r, colIdx, opts, currentVal(r, colIdx));
    box.classList.toggle('changed', colIdx in r.edits);
  });
  box.appendChild(back);
  inp.focus();
}
function ensureDatalist(id, options){
  let dl = document.getElementById(id);
  if (!dl){ dl = document.createElement('datalist'); dl.id = id; document.body.appendChild(dl); }
  dl.innerHTML = options.map(o => `<option value="${esc(o)}">`).join('');
}
function chipRow(chips, after){
  const row = document.createElement('div');
  row.className = 'chips';
  chips.forEach(c => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip'; b.textContent = c.l;
    b.addEventListener('click', () => { c.v(); after(); });
    row.appendChild(b);
  });
  return row;
}
function appendLine(ta, text){
  ta.value = ta.value.trim() ? ta.value.replace(/\s+$/,'') + '\n' + text : text;
}

/* =====================================================================
   Save pipeline (drawer, board drops, quick-contact chips)
   ===================================================================== */
async function commitEdits(tab, r, changesObj){
  let target = r.sheetRow;
  const chk = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A${target}`)}`);
  if (String(chk.values?.[0]?.[0] ?? '').trim() !== r.key){
    const colA = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A2:A`)}`);
    const matches = (colA.values || [])
      .map((x, i) => ({ v: String(x[0] ?? '').trim(), i }))
      .filter(x => x.v === r.key);
    if (!matches.length) throw new Error(`Row for quote ${r.key} not found — refresh and try again`);
    if (matches.length > 1) throw new Error(`Quote ${r.key} appears ${matches.length}× and rows shifted — refresh before saving`);
    target = matches[0].i + 2;
  }

  const changes = Object.entries(changesObj);
  await api('/values:batchUpdate', {
    method:'POST',
    body: JSON.stringify({
      valueInputOption:'USER_ENTERED',
      data: changes.map(([c, v]) => ({ range:`'${tab.sheet}'!${colLetter(+c)}${target}`, values:[[v]] }))
    })
  });

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const hdr = state.headers[tab.id] || [];
    const details = changes.map(([c, v]) =>
      `${hdr[+c] || colLetter(+c)}: "${(r.cells[+c]||'').slice(0,60)}" → "${String(v).slice(0,60)}"`).join(' | ');
    const entry = [new Date().toLocaleString(), state.email, 'Edit (Dashboard)', tab.sheet, r.key, details];
    state.activity.push(entry);
    api(`/values/${encodeURIComponent(`'${CONFIG.ACTIVITY_LOG_SHEET}'!A:F`)}:append?valueInputOption=USER_ENTERED`,
      { method:'POST', body: JSON.stringify({ values:[entry] }) }).catch(() => {});
  }

  changes.forEach(([c, v]) => r.cells[+c] = v);
  r.sheetRow = target;
  saveCache();
}

$('#dSave').addEventListener('click', () => saveActive());
$('#dSaveNext').addEventListener('click', async () => {
  const r = rowByUid(state.drawerUid);
  if (isDirty(r)){
    const ok = await saveActive();
    if (!ok) return;
  }
  stepDrawer(1);
});
$('#dRevert').addEventListener('click', () => {
  const r = rowByUid(state.drawerUid);
  if (!r) return;
  r.edits = {};
  renderDrawer();
  renderContent();
});

async function saveActive(){
  const tab = activeTabDef();
  const r = rowByUid(state.drawerUid);
  if (!r || !isDirty(r) || r.saving) return false;
  r.saving = true;
  const btn = $('#dSave');
  btn.classList.add('saving');
  btn.textContent = 'Saving…';
  let ok = false;
  try {
    await commitEdits(tab, r, r.edits);
    r.edits = {};
    ok = true;
    toast('Saved quote ' + r.key, 'ok');
    renderDrawer();
    renderContent();
    renderSummary();
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    btn.classList.remove('saving');
    syncFoot(rowByUid(state.drawerUid));
  }
  return ok;
}

/* =====================================================================
   Toolbar / lifecycle
   ===================================================================== */
$('#searchBox').addEventListener('input', e => { state.search = e.target.value; renderContent(); });
$('#sortSel').addEventListener('change', e => { state.sort[state.activeTab] = e.target.value; renderContent(); });
$('#statusSel').addEventListener('change', e => { state.trackerStatus = e.target.value; renderContent(); });
$('#btnRefresh').addEventListener('click', async () => {
  if (hasUnsaved() && !confirm('You have unsaved edits — refreshing will discard them. Continue?')) return;
  TABS.forEach(t => (state.data[t.id] || []).forEach(r => r.edits = {}));
  $('#btnRefresh').classList.add('spin');
  await loadAll(true);
  $('#btnRefresh').classList.remove('spin');
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.token && state.lastLoad &&
      Date.now() - state.lastLoad > CONFIG.STALE_MS && !hasUnsaved()){
    loadAll();
  }
});
window.addEventListener('beforeunload', e => {
  if (hasUnsaved()){ e.preventDefault(); e.returnValue = ''; }
});
</script>
