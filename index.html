<!DOCTYPE html>
<!-- ACE Fire LA — Job Dashboard · v0.11 — defense-in-depth role guards inside actions -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ACE Fire LA — Job Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#181A1F; --ink2:#3C4048; --muted:#767B85;
  --paper:#F5F4F1; --card:#FFFFFF; --line:#E4E2DC; --line2:#D5D2CA;
  --red:#C4322E; --red-dk:#9E2724; --red-bg:#FBEDEC;
  --amber:#B26A00; --amber-bg:#FCF3E3;
  --green:#2E7D4F; --green-bg:#EAF4EE;
  --blue:#2B5FA3; --blue-dk:#234E87; --blue-bg:#EBF1F9;
  --radius:10px;
  --shadow:0 1px 2px rgba(20,22,26,.06), 0 4px 14px rgba(20,22,26,.05);
  --drawer-w:460px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--paper); color:var(--ink); font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
body.drawer-open{overflow:hidden}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue)}
:focus-visible{outline:2px solid var(--blue); outline-offset:2px; border-radius:4px}
.row:focus-visible{outline-offset:-2px}
.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap}

/* ============ Header (scrolls away; tabs stay sticky) ============ */
header{background:var(--ink); color:#fff}
.hd-inner{
  max-width:none; margin:0 auto; padding:10px 16px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.brand{display:flex; align-items:baseline; gap:8px; margin-right:auto}
h1.ace{font-family:'Barlow Condensed'; font-weight:700; font-size:24px; letter-spacing:.04em; text-transform:uppercase; margin:0}
h1.ace b{color:#E8534E; font-weight:700}
.brand .sub{font-family:'Barlow Condensed'; font-weight:500; font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:#9BA0AB}
.hd-user{display:flex; align-items:center; gap:10px; font-size:12.5px; color:#C6CAD2}
.hd-inner .email{max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#C6CAD2; font-size:12.5px; align-self:center}
.hd-inner .email.switchable{cursor:pointer; text-decoration:underline dotted 1px; text-underline-offset:3px}
.hd-btn{
  background:transparent; border:1px solid #464B55; color:#E8EAEE;
  border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; min-height:38px;
}
.hd-btn:hover{background:#262A31; border-color:#5A5F6A}
.hd-btn.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.brand .ver{font-family:'Inter'; font-size:10.5px; font-weight:600; color:#9BA0AB; border:1px solid #464B55; border-radius:99px; padding:2px 8px; align-self:center}
.gate-card .ver{display:block; font-size:11px; color:var(--muted); margin-top:4px}
.stripe{height:6px; background:repeating-linear-gradient(-45deg, var(--red) 0 14px, var(--ink) 14px 28px)}

/* ============ Attention bar + KPI cards ============ */
.summary{max-width:none; margin:0 auto; padding:12px 16px 4px}
.attn{
  background:var(--ink); color:#DDE0E6; border-radius:12px;
  padding:10px 16px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.attn .tag{
  display:flex; align-items:center; gap:8px; font-family:'Barlow Condensed';
  font-weight:700; font-size:14.5px; letter-spacing:.13em; text-transform:uppercase; color:#fff;
}
.attn .dot{width:8px; height:8px; border-radius:50%; background:#E8534E; box-shadow:0 0 0 3px rgba(232,83,78,.25)}
.attn button.stat{
  appearance:none; border:none; background:none; color:#C9CDD5; font:inherit; font-size:13px;
  display:flex; align-items:baseline; gap:6px; cursor:pointer; padding:2px 0;
}
.attn button.stat b{font-family:'Barlow Condensed'; font-weight:700; font-size:19px; line-height:1}
.attn button.stat:hover{color:#fff; text-decoration:underline}
.attn .s-red b{color:#F0716C}
.attn .s-amber b{color:#EFB35A}
.kpis{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:10px; margin-top:10px}
.statsbtn{
  display:none; appearance:none; border:1px solid #464B55; background:transparent; color:#C9CDD5;
  border-radius:8px; padding:5px 10px; font-size:11.5px; font-weight:700; cursor:pointer;
  margin-left:auto; white-space:nowrap; flex:none;
}
.kpi{
  appearance:none; font:inherit; cursor:pointer; text-align:left;
  background:var(--card); border:1px solid var(--line); border-left-width:4px; border-radius:12px;
  padding:12px 14px 11px; box-shadow:var(--shadow);
}
.kpi .lbl{font-family:'Barlow Condensed'; font-weight:700; font-size:13.5px; letter-spacing:.12em; text-transform:uppercase}
.kpi b{display:block; font-family:'Barlow Condensed'; font-weight:700; font-size:34px; line-height:1.05; margin:2px 0 1px}
.kpi .sub{font-size:11.5px; color:var(--muted)}
.kpi.t-red{border-left-color:var(--red)} .kpi.t-red .lbl, .kpi.t-red b{color:var(--red-dk)}
.kpi.t-amber{border-left-color:#E0A93E} .kpi.t-amber .lbl, .kpi.t-amber b{color:var(--amber)}
.kpi.t-blue{border-left-color:var(--blue)} .kpi.t-blue .lbl, .kpi.t-blue b{color:var(--blue)}
.kpi.zero{opacity:.6}
.kpi.zero b{color:var(--muted)}
.kpi.active{outline:2px solid var(--ink); outline-offset:-1px}

/* ============ Tabs (sticky) ============ */
nav.tabs{background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:45}
.tabs-inner{max-width:none; margin:0 auto; padding:0 8px; display:flex; gap:2px; align-items:center}
.tab{
  appearance:none; background:none; border:none; cursor:pointer;
  font-family:'Barlow Condensed'; font-weight:600; font-size:19px; letter-spacing:.09em;
  text-transform:uppercase; color:var(--muted);
  padding:13px 18px 11px; border-bottom:3px solid transparent;
  display:flex; align-items:center; gap:8px; min-height:50px;
}
.tab .cnt{
  font-family:'Inter'; font-size:11px; font-weight:700; letter-spacing:0;
  background:var(--paper); color:var(--muted); border:1px solid var(--line);
  border-radius:99px; padding:1px 8px;
}
.tab.active{color:var(--ink); border-bottom-color:var(--red)}
.tab.active .cnt{background:var(--red-bg); color:var(--red-dk); border-color:#EFD2D1}
/* ============ Toolbar / filters ============ */
.toolbar{
  max-width:none; margin:0 auto; padding:12px 16px 0;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.search{flex:1; min-width:170px; max-width:420px; position:relative}
.search input{
  width:100%; padding:10px 12px 10px 36px; border:1px solid var(--line2); border-radius:var(--radius);
  background:var(--card); font-size:14px; outline:none;
}
.search input:focus{border-color:var(--ink2)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none}
select.sortsel{
  border:1px solid var(--line2); border-radius:var(--radius); background:var(--card);
  padding:9px 10px; font-size:13px; color:var(--ink2); outline:none; min-height:40px; max-width:170px;
}
.stale{
  margin-left:auto; appearance:none; border:1px solid var(--line2); background:var(--card);
  border-radius:99px; padding:6px 12px; font-size:11.5px; font-weight:600; color:var(--muted);
  cursor:pointer; white-space:nowrap; min-height:34px;
}
.stale.warn{border-color:#E7C87B; background:var(--amber-bg); color:var(--amber)}
.stale.old{border-color:#EFD2D1; background:var(--red-bg); color:var(--red-dk)}
.filters{
  max-width:none; margin:0 auto; padding:10px 16px 2px;
  display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.fchip{
  appearance:none; border:1px solid var(--line2); background:var(--card); color:var(--ink2);
  font-size:12.5px; font-weight:600; border-radius:99px; padding:8px 14px; cursor:pointer;
  white-space:nowrap; min-height:38px; display:inline-flex; align-items:center;
}
.fchip.active{background:var(--ink); border-color:var(--ink); color:#fff}
.fchip .n{
  font-weight:700; margin-left:7px; font-size:10.5px;
  background:#F0EFEA; color:var(--muted); border-radius:99px; padding:1px 7px;
}
.fchip.active .n{background:#3A3E46; color:#E8EAEE}
.banner{max-width:none; margin:10px auto 0; padding:0 16px; display:none}
.banner.on{display:block}
.banner .inner{
  background:var(--amber-bg); border:1px solid #E7C87B; color:var(--amber);
  border-radius:var(--radius); padding:9px 13px; font-size:12.5px; font-weight:600;
}

/* ============ List ============ */
main{max-width:none; margin:0 auto; padding:12px 16px 90px}
.list{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
}
.row{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:none; border:none; border-bottom:1px solid var(--line);
  padding:12px 14px; cursor:pointer; font:inherit; color:inherit;
}
.row:last-child{border-bottom:none}
.row:hover{background:#FAFAF8}
.row.sel{background:var(--red-bg)}
.row.u-exp{box-shadow:inset 4px 0 0 var(--red)}
.row.u-soon{box-shadow:inset 4px 0 0 #E0A93E}
.row.u-warn{box-shadow:inset 4px 0 0 #E0A93E}
.r-main{flex:1; min-width:0}
.r-top{display:flex; align-items:baseline; gap:8px; min-width:0}
.r-top .r-side{margin-left:auto; flex:none; padding-left:8px}
.r-q{font-family:'Barlow Condensed'; font-weight:700; font-size:16.5px; color:var(--ink); white-space:nowrap}
.row.u-exp .r-q{color:var(--red-dk)}
.row.u-soon .r-q{color:var(--amber)}
.row.u-closed .r-q{color:var(--muted)}
.r-nm{font-weight:650; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.r-dot{width:8px; height:8px; border-radius:50%; background:var(--amber); flex:none; align-self:center}
.r-ttl{color:var(--muted); font-size:12.5px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.r-meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center}
.fu{
  appearance:none; font:inherit; cursor:pointer;
  font-size:11.5px; font-weight:600; color:var(--ink2); background:#F2F1ED;
  border:1px solid transparent; border-radius:6px; padding:3px 8px;
  white-space:nowrap; font-variant-numeric:tabular-nums; min-height:26px;
}
.fu:hover{border-color:var(--line2); background:#ECEBE5}
.fu.off{color:var(--muted); background:transparent; border:1px dashed var(--line2)}
.fu.off:hover{color:var(--blue); border-color:var(--blue); border-style:solid}
.fu.busy{opacity:.5; pointer-events:none}
.fu.draft{border:1px solid #CBD9EC; border-style:solid; background:var(--blue-bg); color:var(--blue)}
.fu.draft:hover{border-color:var(--blue); background:#DEE9F6}
a.fu{text-decoration:none; display:inline-flex; align-items:center; gap:4px}
.chev{color:var(--line2); flex:none}
.row:hover .chev{color:var(--muted)}
.badge{
  display:inline-block; font-size:11.5px; font-weight:700; border-radius:6px;
  padding:2px 8px; white-space:nowrap; font-variant-numeric:tabular-nums;
}
.b-red{background:var(--red-bg); color:var(--red-dk)}
.b-amber{background:var(--amber-bg); color:var(--amber)}
.b-green{background:var(--green-bg); color:var(--green)}
.b-blue{background:var(--blue-bg); color:var(--blue)}
.b-gray{background:#EFEEEA; color:var(--ink2)}
.empty{padding:48px 20px; text-align:center; color:var(--muted); font-size:14px}

/* skeleton loading */
.skel{padding:12px 14px; border-bottom:1px solid var(--line)}
.skel i{
  display:block; height:12px; border-radius:6px; margin:6px 0;
  background:linear-gradient(90deg, #EEEDE8 25%, #F7F6F2 50%, #EEEDE8 75%);
  background-size:200% 100%; animation:shim 1.2s infinite;
}
.skel i:nth-child(1){width:45%} .skel i:nth-child(2){width:70%} .skel i:nth-child(3){width:30%}
@keyframes shim{to{background-position:-200% 0}}
@media (prefers-reduced-motion: reduce){ .skel i,.loading-bar i,#drawer{animation:none; transition:none} }

/* ============ Drawer ============ */
#overlay{
  position:fixed; inset:0; background:rgba(20,22,26,.45); z-index:60;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
#overlay.on{opacity:1; pointer-events:auto}
#drawer{
  position:fixed; top:0; right:0; bottom:0; width:var(--drawer-w); max-width:100vw;
  background:var(--card); z-index:70; display:flex; flex-direction:column;
  box-shadow:-12px 0 40px rgba(0,0,0,.18);
  transform:translateX(105%); transition:transform .22s ease;
}
#drawer.on{transform:translateX(0)}
.d-head{
  display:flex; align-items:center; gap:8px; padding:12px 14px;
  border-bottom:1px solid var(--line); background:#FAFAF8;
}
.d-nav{display:flex; gap:4px}
.icon-btn{
  appearance:none; border:1px solid var(--line2); background:var(--card); color:var(--ink2);
  border-radius:8px; width:40px; height:40px; cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
}
.icon-btn:hover{border-color:var(--ink2)}
.icon-btn:disabled{opacity:.35; cursor:default}
.d-title{flex:1; min-width:0; text-align:center}
.d-title .q{font-family:'Barlow Condensed'; font-weight:700; font-size:21px; color:var(--ink)}
.d-title .q.u-exp{color:var(--red-dk)}
.d-title .q.u-soon{color:var(--amber)}
.d-title .q.u-closed{color:var(--muted)}
.d-title .n{font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.d-search{padding:10px 14px; border-bottom:1px solid var(--line); position:relative}
.d-search input{
  width:100%; padding:9px 30px 9px 34px; border:1px solid var(--line2); border-radius:8px;
  outline:none; font-size:13.5px; background:var(--paper);
}
.d-search input:focus{border-color:var(--ink2); background:#fff}
.d-search .mag{position:absolute; left:25px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none}
.d-search .clr{
  position:absolute; right:22px; top:50%; transform:translateY(-50%);
  appearance:none; border:none; background:none; color:var(--muted); cursor:pointer; font-size:15px;
  display:none; padding:6px;
}
.d-search.has .clr{display:block}
.d-body{flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch}
.d-results .rrow{
  display:flex; flex-direction:column; gap:1px; width:100%; text-align:left;
  appearance:none; background:none; border:none; border-bottom:1px solid var(--line);
  padding:10px 6px; cursor:pointer; font:inherit; color:inherit;
}
.d-results .rrow:hover{background:#FAFAF8}
.d-results .t{font-weight:600; font-size:13.5px}
.d-results .t b{color:var(--red-dk); font-family:'Barlow Condensed'; font-size:15px}
.d-results .s{font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.d-results .none{padding:18px 6px; color:var(--muted); font-size:13px; text-align:center}
.d-actions{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
.act-btn{
  appearance:none; border:1px solid var(--line2); background:var(--card); color:var(--ink);
  border-radius:8px; padding:8px 13px; font-size:12.5px; font-weight:600; cursor:pointer;
  text-decoration:none; display:inline-flex; align-items:center; gap:6px; min-height:40px;
}
.act-btn:hover{border-color:var(--blue); color:var(--blue)}
.d-sec{margin-bottom:18px}
.d-sec h3{
  font-family:'Barlow Condensed'; font-weight:600; font-size:15px; letter-spacing:.11em;
  text-transform:uppercase; color:var(--muted); margin:0 0 8px;
  border-bottom:1px solid var(--line); padding-bottom:5px;
}
.info-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:13.5px}
.info-grid .k{color:var(--muted); white-space:nowrap}
.info-grid .v{min-width:0; word-break:break-word}
.d-field{margin-bottom:13px}
.d-field label{
  display:block; font-family:'Barlow Condensed'; font-weight:600; font-size:14px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--red-dk); margin-bottom:5px;
}
.ctl input[type=text], .ctl select, .ctl textarea{
  width:100%; padding:10px; border:1px solid var(--line2); border-radius:8px; background:#fff; outline:none;
}
.ctl textarea{min-height:74px; resize:vertical; line-height:1.4}
.ctl input:focus, .ctl select:focus, .ctl textarea:focus{border-color:var(--blue); box-shadow:0 0 0 2px rgba(43,95,163,.14)}
.ctl.changed input, .ctl.changed select, .ctl.changed textarea{border-color:var(--amber); background:#FFFDF4}
.chips{display:flex; gap:5px; margin-top:6px; flex-wrap:wrap}
.chip{
  appearance:none; border:1px solid var(--line2); background:var(--card); color:var(--ink2);
  font-size:11.5px; font-weight:600; border-radius:99px; padding:6px 11px; cursor:pointer; min-height:32px;
}
.chip:hover{border-color:var(--blue); color:var(--blue)}
.backlist{appearance:none; border:none; background:none; color:var(--blue); font-size:12px; cursor:pointer; padding:4px 2px; margin-top:3px}
.log-item{border-bottom:1px dashed var(--line); padding:7px 0; font-size:12.5px}
.log-item:last-child{border-bottom:none}
.log-item .lt{color:var(--muted); font-size:11.5px; display:flex; gap:8px; flex-wrap:wrap}
.log-item .ld{color:var(--ink2); margin-top:2px; word-break:break-word}
.log-none{color:var(--muted); font-size:12.5px}
.d-foot{
  border-top:1px solid var(--line); background:#FAFAF8; padding:11px 14px;
  display:flex; align-items:center; gap:10px; justify-content:flex-end;
  padding-bottom:calc(11px + env(safe-area-inset-bottom));
}
.revert{
  appearance:none; border:none; background:none; color:var(--muted); font-size:12.5px;
  cursor:pointer; text-decoration:underline; display:none; margin-right:auto;
}
.d-foot.dirty .revert{display:block}
.savebtn{
  appearance:none; border:1px solid var(--line2); background:var(--card); color:var(--muted);
  border-radius:9px; padding:11px 20px; font-size:14px; font-weight:700; cursor:default; min-height:46px;
}
.d-foot.dirty .savebtn{background:var(--blue); border-color:var(--blue); color:#fff; cursor:pointer}
.d-foot.dirty .savebtn:hover{background:var(--blue-dk)}
.savebtn.saving{opacity:.6; pointer-events:none}
.nextbtn{
  appearance:none; border:1px solid var(--ink); background:var(--ink); color:#fff;
  border-radius:9px; padding:11px 18px; font-size:14px; font-weight:700; cursor:pointer; min-height:46px;
}
.nextbtn:hover{background:#000}
.nextbtn:disabled{opacity:.4; cursor:default}

@media (max-width:880px){
  .summary{padding:10px 10px 0}
}
@media (max-width:640px){
  :root{--drawer-w:100vw}
  .brand .sub{display:none}
  .hd-inner .email{max-width:128px; font-size:11px}
  main{padding:10px 10px 90px}
  .toolbar{padding:10px 10px 0}
  .filters{padding:10px 10px 2px}
  .banner{padding:0 10px}
  /* tab bar: compact + scrolls within itself — never breaks page width */
  .tabs-inner{overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .tabs-inner::-webkit-scrollbar{display:none}
  .tab{font-size:16.5px; padding:11px 12px 9px; gap:6px; min-height:46px; flex:none; white-space:nowrap}
  .tab .cnt{font-size:10px; padding:1px 6px}
  /* compact attention bar: one scrollable line + All stats toggle */
  .attn{flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; gap:14px; padding:9px 12px}
  .attn .tag{font-size:13px; letter-spacing:.1em}
  .attn button.stat{font-size:12px; white-space:nowrap}
  .attn button.stat b{font-size:17px}
  .statsbtn{display:inline-flex}
  .kpis{display:none; grid-template-columns:repeat(2, 1fr)}
  .kpis.open{display:grid}
  .kpi.zero{display:none}
  /* search full width, compact controls */
  .search{flex:1 1 100%; max-width:none}
  select.sortsel{padding:7px 8px; font-size:12px; min-height:36px}
  .stale{font-size:10.5px; padding:5px 9px; min-height:28px}
  .fchip{padding:6px 11px; min-height:32px; font-size:12px}
  .fchip .n{font-size:10px}
  /* job cards */
  .row{padding:14px}
  .r-q{font-size:18px}
  .r-nm{font-size:15.5px}
  .r-ttl{

.gate-card p{color:var(--muted); font-size:13.5px; margin:10px 0 24px}
.gbtn{
  appearance:none; width:100%; padding:13px 16px; border-radius:10px; border:none;
  background:var(--ink); color:#fff; font-size:15px; font-weight:700; cursor:pointer;

#mailWrap, #smsWrap, #threadWrap{

.bub.out{align-self:flex-end; background:var(--ink); color:#fff; border-bottom-right-radius:4px}

const DAY = 86400000;
const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());

function parseDate(v){
  const t = String(v || '').trim();
  if (!t) return null;
  const m = t.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
  if (m){
    let y = m[3] ? +m[3] : new Date().getFullYear();
    if (y < 100) y += 2000;
    const d = new Date(y, +m[1] - 1, +m[2]);
    return isNaN(d) ? null : d;
  }
  const d = new Date(t);
  return isNaN(d) ? null : startOfDay(d);
}

/* =====================================================================
   Local cache — instant paint, then background refresh
   ===================================================================== */
function saveCache(){
  try {
    localStorage.setItem('acefire_cache_v1', JSON.stringify({
      ts: state.lastLoad, headers: state.headers, options: state.options,
      suggest: state.suggest, dupes: state.dupes,
      archive: state.archive.map(r => r.cells),
      qarchive: state.qarchive.map(r => r.cells),
      customers: state.customers,
      prefs: state.prefs, threadDone: state.threadDone, replyGroups: state.replyGroups, roles: state.roles,
      data: Object.fromEntries(TABS.map(t => [t.id, (state.data[t.id]||[]).map(r => r.cells)]))
    }));
  } catch(e){}
}
function hydrateCache(){
  try {
    const p = JSON.parse(localStorage.getItem('acefire_cache_v1') || 'null');
    if (!p || !p.data) return false;
    /* customer data shouldn't linger on shared computers — stale caches are discarded */
    if (!p.ts || Date.now() - p.ts > 4 * 3600 * 1000){ localStorage.removeItem('acefire_cache_v1'); return false; }
    TABS.forEach(t => {
      state.data[t.id] = (p.data[t.id] || []).map((cells, j) =>
        ({ uid: t.id + ':' + j, key: String(cells[0]||'').trim(), sheetRow: j + 2, cells, edits:{}, saving:false }));
    });
    state.headers = p.headers || {};
    state.options = p.options || {};
    state.suggest = p.suggest || {};
    state.dupes = p.dupes || {};
    state.archive = (p.archive || []).map(cells => ({ cells }));
    state.qarchive = (p.qarchive || []).map(cells => ({ cells }));
    state.customers = p.customers || {};
    state.prefs = p.prefs || {};
    state.threadDone = p.threadDone || {};
    state.replyGroups = p.replyGroups || [];
    state.roles = p.roles || {};
    state.lastLoad = p.ts || 0;
    return true;
  } catch(e){ return false; }
}

/* =====================================================================
   Auth (Google Identity Services)
   ===================================================================== */
let tokenClient = null, pendingTokenResolve = null;

function gisReady(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: resp => {
      if (resp.access_token){
        state.token = resp.access_token;
        if (pendingTokenResolve){ pendingTokenResolve(true); pendingTokenResolve = null; }
        else onSignedIn();
      }
    },
    error_callback: () => {
      if (pendingTokenResolve){ pendingTokenResolve(false); pendingTokenResolve = null; return; }
      const g = $('#gateErr');
      g.style.display = 'block';
      g.textContent = 'Sign-in was cancelled or blocked. Try again.';
      $('#btnSignin').disabled = false;
    }
  });
  const hint = localStorage.getItem('acefire_hint');
  if (hint) silentToken(hint).then(ok => { if (ok) onSignedIn(); });
}
function silentToken(hint){
  return new Promise(resolve => {
    pendingTokenResolve = resolve;
    try { tokenClient.requestAccessToken({ prompt:'', hint: hint || state.email || undefined }); }
    catch(e){ pendingTokenResolve = null; resolve(false); }
    setTimeout(() => { if (pendingTokenResolve){ pendingTokenResolve = null; resolve(false); } }, 8000);
  });
}
$('#btnSignin').addEventListener('click', () => {
  $('#btnSignin').disabled = true;
  $('#gateErr').style.display = 'none';
  tokenClient.requestAccessToken({ prompt:'' });
  setTimeout(() => $('#btnSignin').disabled = false, 4000);
});
$('#btnSignout').addEventListener('click', () => {
  const tk = state.token;
  state.token = null;
  localStorage.removeItem('acefire_hint');
  localStorage.removeItem('acefire_cache_v1');
  if (tk){ try { google.accounts.oauth2.revoke(tk, () => {}); } catch(e){} }
  location.reload();
});
async function onSignedIn(){
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers:{ Authorization:'Bearer ' + state.token } });
    if (r.ok){ const u = await r.json(); state.email = u.email || ''; localStorage.setItem('acefire_hint', state.email); }
  } catch(e){}
  $('#gate').style.display = 'none';
  $('#app').style.display = 'block';
  $('#hdUser').style.display = 'flex';
  const em = $('#userEmail');
  em.style.display = 'inline-block';

  } else {
    renderSkeleton();
  }
  await loadAll();
}

/* =====================================================================
   Sheets API wrapper (401 → silent refresh → retry)
   ===================================================================== */
async function api(path, opts = {}, retry = true){
  const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.SPREADSHEET_ID + path, {
    ...opts,
    headers:{ 'Content-Type':'application/json', ...(opts.headers || {}), Authorization:'Bearer ' + state.token }
  });
  if (r.status === 401 && retry){
    const ok = await silentToken(state.email);
    if (ok) return api(path, opts, false);
    localStorage.removeItem('acefire_cache_v1');   // don't leave customer data behind on a signed-out browser
    toast('Session expired — sign in again', 'err');
    $('#gate').style.display = 'flex';
    $('#app').style.display = 'none';
    closeDrawer();
    throw new Error('auth');
  }
  if (!r.ok){
    let msg = 'API error ' + r.status;
    try { msg = (await r.json()).error?.message || msg; } catch(e){}
    throw new Error(msg);
  }
  return r.json();
}

      }).filter(r => r.cells.some(c => c !== ''));
      const seen = new Set(), dup = new Set();
      state.data[t.id].forEach(r => { if (!r.key) return; if (seen.has(r.key)) dup.add(r.key); seen.add(r.key); });

    try {
      const si = await api(`/values/${encodeURIComponent(`'SMS Inbox'!A2:F`)}`);
      state.smsIn = (si.values || []).map((row, i) =>
        ({ sheetRow:i + 2, cells: Array.from({ length:6 }, (_, c) => row[c] !== undefined ? String(row[c]) : '') }));

    // reply-to groups for the email composer — Settings!D2:E20 (address | label)
    try {

        .filter(g => g.addr.includes('@'));

/* Live dropdown options + Status list from the sheet's own data validation (Tracker D2:N2). */
async function loadTrackerOptions(){
  state.options = {}; state.suggest = {};
  try {
    const rng = encodeURIComponent("'Tracker'!D2:N2");
    const res = await api(`?ranges=${rng}&fields=${encodeURIComponent('sheets(data(startColumn,rowData(values(dataValidation))))')}`);
    const d = res.sheets?.[0]?.data?.[0];
    const startCol = d?.startColumn ?? 3;
    (d?.rowData?.[0]?.values || []).forEach((v, i) => {
      const cond = v?.dataValidation?.condition;
      if (cond && cond.type === 'ONE_OF_LIST' && cond.values){
        state.options[startCol + i] = cond.values.map(x => x.userEnteredValue).filter(Boolean);
      }
    });
  } catch(e){}
  for (const c of TABS[1].editable){
    const seen = new Map();
    (state.data.tracker || []).forEach(r => {
      const v = (r.cells[c] || '').trim();
      if (v) seen.set(v, (seen.get(v) || 0) + 1);
    });
    state.suggest[c] = [...seen.entries()].sort((a,b) => b[1]-a[1]).map(x => x[0]).slice(0, 12);
  }
}

async function savePref(name, pref, viaKey){
  const k = normName(name);

      method:'POST',
      body: JSON.stringify({ valueInputOption:'USER_ENTERED',
        data:[{ range:`'${CONFIG.PREFS_SHEET}'!A${hit.row}:D${hit.row}`, values:[[name, pref, who, when]] }] })
    });
    hit.pref = pref;
  } else {
    const res = await api(`/values/${encodeURIComponent(`'${CONFIG.PREFS_SHEET}'!A:D`)}:append?valueInputOption=USER_ENTERED`, {
      method:'POST', body: JSON.stringify({ values:[[name, pref, who, when]] })
    });
    const m = String(res.updates ? res.updates.updatedRange : '').match(/![A-Z]+(\d+):/);
    state.prefs[k] = { pref, row: m ? +m[1] : 0 };
  }
  saveCache();
  if (CONFIG.ACTIVITY_LOG_SHEET){
    const entry = [when, state.email, 'Contact preference', CONFIG.PREFS_SHEET, viaKey || '',
      name + ' → ' + (pref || '(cleared)'), ''];

      { method:'POST', body: JSON.stringify({ values:[entry] }) }).catch(() => {});

    return [
      { id:'all',      label:'All',              fn:() => true },
      { id:'active',   label:'Active',           fn:r => { if (isClosed(r)) return false; const d = daysNum(r); return d === null || d >= 0; } },
      { id:'exp7',     label:'Expiring ≤7d',     fn:r => { if (isClosed(r)) return false; const d = daysNum(r); return d !== null && d >= 0 && d <= 7; } },
      { id:'expired',  label:'Expired',          fn:r => { if (isClosed(r)) return false; const d = daysNum(r); return d !== null && d < 0; } },
      { id:'nofu',     label:'No follow-up',     fn:r => !isClosed(r) && noFollowUp(r) },
      { id:'closed',   label:'Closed',           fn:isClosed }
    ];
  }
  return [
    { id:'all',        label:'All',              fn:() => true },
    { id:'needs',      label:'Needs action',     fn:r =>
        !(r.cells[7]||'').trim() || !(r.cells[9]||'').trim() ||
        low(r.cells[6]) === 'overdue' ||
        (low(r.cells[3]) === 'completed' && ['','not sent'].includes(low(r.cells[6]))) },
    { id:'notsched',   label:'To schedule',      fn:r => !(r.cells[7]||'').trim() },
    { id:'noreport',   label:'Reports not sent', fn:r => !(r.cells[9]||'').trim() },
    { id:'compninv',   label:'Ready to invoice', fn:r => low(r.cells[3]) === 'completed' && ['','not sent'].includes(low(r.cells[6])) },
    { id:'awaitpay',   label:'Awaiting payment', fn:r => low(r.cells[6]) === 'sent' },
    { id:'overdueinv', label:'Overdue invoices', fn:r => low(r.cells[6]) === 'overdue' },
    { id:'retest',     label:'Retest / repair',  fn:r => ['pending','awaiting approval','scheduled'].includes(low(r.cells[11])) },
    { id:'paid',       label:'Paid',             fn:r => low(r.cells[6]) === 'paid' },
    { id:'nojob',      label:'Unassigned',       fn:r => !(r.cells[13]||'').trim() }
  ];
}
function sortDefs(tab){
  const base = [{ id:'sheet', label:'Default order' }, { id:'newest', label:'Newest quote #' }];
  if (tab.id === 'quotes') base.splice(1, 0, { id:'expiring', label:'Expiring first' });
  return base;
}
function visibleRows(tab){
  let rows = state.data[tab.id] || [];
  const fdef = filterDefs(tab).find(f => f.id === state.filter[tab.id]) || filterDefs(tab)[0];
  rows = rows.filter(fdef.fn);
  if (tab.id === 'tracker' && state.trackerStatus){
    rows = rows.filter(r => (r.cells[3]||'').trim() === state.trackerStatus);
  }
  if (tab.id === 'quotes' && state.filter.quotes === 'closed' && state.quotesOutcome){
    rows = rows.filter(r => outcomeOf(r) === state.quotesOutcome);
  }
  const q = state.search.trim().toLowerCase();
  if (q) rows = rows.filter(r => searchText(tab, r).includes(q));
  const s = state.sort[tab.id];
  if (s === 'newest') rows = [...rows].sort((a,b) => quoteNum(b.key) - quoteNum(a.key));
  else if (s === 'expiring') rows = [...rows].sort((a,b) => (daysNum(a) ?? 9e9) - (daysNum(b) ?? 9e9));
  return rows;
}

function searchText(tab, r){
  const skip = (tab.id === 'quotes' && !(CONFIG.SHOW_FINANCIALS || isAdmin())) ? [7] : [];
  return r.cells.filter((_, i) => !skip.includes(i)).join(' ').toLowerCase();
}

function buildTabBar(){
  const bar = $('#tabbar');
  bar.innerHTML = '';
  visibleTabs().forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab' + (state.activeTab === t.id ? ' active' : '');
    b.setAttribute('role', 'tab');

/* Attention bar (4 most urgent) + KPI cards — all tappable */
const ATTN_STATS = [
  { tab:'quotes',  filter:'expired',    label:'expired quotes',   tone:'s-red' },
  { tab:'tracker', filter:'overdueinv', label:'overdue invoices', tone:'s-red' },
  { tab:'tracker', filter:'noreport',   label:'reports not sent', tone:'s-amber' },
  { tab:'tracker', filter:'notsched',   label:'to schedule',      tone:'s-amber' }
];
const KPI_TILES = [
  { tab:'quotes',  filter:'exp7',       label:'Expiring soon',    sub:'Quotes expiring ≤7 days',  tone:'amber' },
  { tab:'quotes',  filter:'nofu',       label:'No follow-up',     sub:'Quotes missing follow-up', tone:'amber' },
  { tab:'tracker', filter:'overdueinv', label:'Overdue invoices', sub:'Need payment follow-up',   tone:'red' },
  { tab:'tracker', filter:'noreport',   label:'Reports not sent', sub:'Jobs missing reports',     tone:'amber' },
  { tab:'tracker', filter:'notsched',   label:'Needs scheduling', sub:'Missing Ember date',       tone:'amber' },
  { tab:'tracker', filter:'compninv',   label:'Ready to invoice', sub:'Work done, not invoiced',  tone:'blue' }
];
function countFor(tabId, filterId){
  const tab = TABS.find(t => t.id === tabId);
  const def = filterDefs(tab).find(f => f.id === filterId);
  return def ? (state.data[tabId] || []).filter(def.fn).length : 0;
}
function jumpTo(tabId, filterId){
  state.activeTab = tabId;
  state.filter[tabId] = filterId;
  if (tabId === 'tracker') state.trackerStatus = '';
  $$('.tab').forEach((x, i) => {
    const on = (visibleTabs()[i] || {}).id === tabId;
    x.classList.toggle('active', on);
    x.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderAll();
}
function renderSummary(){

  if (isField()) return;   // field view keeps the header lean — no office KPIs

  const bar = document.createElement('div');

    const n = countFor(st.tab, st.filter);

    b.className = 'stat ' + st.tone;

function renderAll(){
  TABS.forEach(t => {
    const el = document.querySelector(`[data-cnt="${t.id}"]`);
    if (el) el.textContent = (state.data[t.id] || []).length;
  });
  const rc = document.querySelector('[data-cnt="renewals"]');
  if (rc){
    const R = computeRenewals();
    rc.textContent = R.filter(x => x.days <= 30 && !x.upcoming).length;
  }
  const xc = document.querySelector('[data-cnt="texts"]');
  if (xc) xc.textContent = computeThreads().reduce((s, t) => s + t.unread, 0);
  updateStale();
  renderSummary();

  /* ---- Renewals radar (computed, not a sheet) ---- */
  if (state.activeTab === 'renewals'){
    $('#sortSel').style.display = 'none';
    $('#statusSel').style.display = 'none';
    $('#dupeBanner').classList.remove('on');
    const fb = $('#filterBar');
    fb.innerHTML = '';
    const R = computeRenewals();
    const buckets = [
      { id:'overdue', label:'Overdue',  fn:x => x.days < 0 },
      { id:'d30',     label:'Due ≤30d', fn:x => x.days >= 0 && x.days <= 30 },
      { id:'d90',     label:'31–90d',   fn:x => x.days > 30 && x.days <= 90 },
      { id:'later',   label:'Later',    fn:x => x.days > 90 },
      { id:'all',     label:'All',      fn:() => true }
    ];
    buckets.forEach(bk => {
      const n = R.filter(bk.fn).length;
      const b = document.createElement('button');
      b.className = 'fchip' + (state.renBucket === bk.id ? ' active' : '');
      b.setAttribute('aria-pressed', state.renBucket === bk.id ? 'true' : 'false');
      b.innerHTML = `${esc(bk.label)}<span class="n">${n}</span>`;
      b.addEventListener('click', () => { state.renBucket = bk.id; renderAll(); });
      fb.appendChild(b);
    });
    renderContent();
    return;
  }

  /* ---- Texts (computed from SMS Outbox + SMS Inbox) ---- */
  if (state.activeTab === 'texts'){
    $('#sortSel').style.display = 'none';
    $('#statusSel').style.display = 'none';
    $('#dupeBanner').classList.remove('on');
    const fb = $('#filterBar');
    fb.innerHTML = '';
    const T = computeThreads();
    const chips = [
      { id:'open',   label:'Open',   n:T.filter(t => !t.done).length },
      { id:'unread', label:'Unread', n:T.filter(t => t.unread > 0).length },
      { id:'done',   label:'Done',   n:T.filter(t => t.done).length },
      { id:'all',    label:'All',    n:T.length }
    ];
    chips.forEach(f => {
      const b = document.createElement('button');
      b.className = 'fchip' + ((state.textsFilter || 'open') === f.id ? ' active' : '');
      b.setAttribute('aria-pressed', (state.textsFilter || 'open') === f.id ? 'true' : 'false');
      b.innerHTML = `${esc(f.label)}<span class="n">${f.n}</span>`;
      b.addEventListener('click', () => { state.textsFilter = f.id; renderAll(); });
      fb.appendChild(b);
    });
    renderContent();
    return;
  }

  const tab = activeTabDef();
  const sel = $('#sortSel');
  sel.innerHTML = sortDefs(tab).map(s => `<option value="${s.id}">${s.label}</option>`).join('');
  sel.value = state.sort[tab.id];
  sel.style.display = '';

  const ss = $('#statusSel');
  if (tab.id === 'tracker'){
    const opts = state.options[3] || [];
    const present = [...new Set((state.data.tracker||[]).map(r => (r.cells[3]||'').trim()).filter(Boolean))];
    const all = [...new Set([...opts, ...present])];
    ss.innerHTML = '<option value="">Status: all</option>' + all.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
    ss.value = all.includes(state.trackerStatus) ? state.trackerStatus : '';
    ss.style.display = '';
  } else if (tab.id === 'quotes' && state.filter.quotes === 'closed'){
    const present = [...new Set((state.data.quotes||[]).map(outcomeOf).filter(Boolean))];
    ss.innerHTML = '<option value="">Reason: all</option>' + present.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
    if (!present.includes(state.quotesOutcome)) state.quotesOutcome = '';
    ss.value = state.quotesOutcome || '';
    ss.style.display = '';
  } else {
    if (tab.id === 'quotes') state.quotesOutcome = '';
    ss.style.display = 'none';
  }

  const fb = $('#filterBar');
  fb.innerHTML = '';
  const all = state.data[tab.id] || [];
  filterDefs(tab).forEach(f => {
    const n = all.filter(f.fn).length;
    if (f.id !== 'all' && n === 0) return;
    const b = document.createElement('button');
    b.className = 'fchip' + (state.filter[tab.id] === f.id ? ' active' : '');
    b.setAttribute('aria-pressed', state.filter[tab.id] === f.id ? 'true' : 'false');
    b.innerHTML = `${esc(f.label)}<span class="n">${n}</span>`;
    b.addEventListener('click', () => { state.filter[tab.id] = f.id; renderAll(); });
    fb.appendChild(b);
  });

  const dupes = state.dupes[tab.id] || [];
  $('#dupeBanner').classList.toggle('on', dupes.length > 0);
  if (dupes.length){
    $('#dupeText').textContent = `⚠ Duplicate quote #s on ${tab.label}: ${dupes.join(', ')} — saves verify the exact row first, but clean these up in the sheet.`;
  }

  renderContent();
}
function renderContent(){
  if (state.activeTab === 'renewals'){ renderRenewals(); return; }
  if (state.activeTab === 'texts'){ renderTexts(); return; }
  renderList();
}

function updateStale(){
  const el = $('#metaNote');
  if (!state.lastLoad){ el.textContent = '…'; return; }
  const mins = Math.floor((Date.now() - state.lastLoad) / 60000);
  el.className = 'stale' + (mins >= 15 ? ' old' : mins >= 5 ? ' warn' : '');
  el.textContent = mins < 1 ? 'Updated just now'
    : mins < 5 ? `Updated ${mins}m ago`
    : mins < 15 ? `Updated ${mins}m ago — tap to refresh`
    : `⚠ ${mins}m old — refresh`;
}
setInterval(updateStale, 30000);
setInterval(() => {
  if (!document.hidden && state.token && state.lastLoad && !hasUnsaved() &&
      Date.now() - state.lastLoad > CONFIG.STALE_MS){
    loadAll();
  }
}, 60000);
$('#metaNote').addEventListener('click', () => $('#btnRefresh').click());

/* ---- list view ---- */
function emptyMsg(tab){
  if (state.search) return 'No matches for your search.';
  if (state.filter[tab.id] !== 'all' || (tab.id === 'tracker' && state.trackerStatus))
    return 'All clear here 🎉 — nothing matches this view.';
  return 'No rows in this tab yet.';
}
function renderList(){
  const tab = activeTabDef();
  const rows = visibleRows(tab);
  const main = $('#main');
  main.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'list';
  if (!rows.length){

  rows.forEach(r => {

      else if (d !== null && d <= 7) urgency = ' u-soon';
      else if (noFollowUp(r)) urgency = ' u-warn';
    }
    b.className = 'row' + urgency + (state.drawerUid === r.uid && $('#drawer').classList.contains('on') ? ' sel' : '');
    b.setAttribute('aria-label', `Quote ${r.key}, ${r.cells[1]} — open details`);
    b.innerHTML = `
      <div class="r-main">
        <div class="r-top">
          <span class="r-q">#${esc(r.key)}</span>
          <span class="r-nm">${esc(r.cells[1])}</span>
          ${isDirty(r) ? '<span class="r-dot" title="Unsaved edits"></span>' : ''}
          <span class="r-side">${rowSide(tab, r)}</span>
        </div>
        <div class="r-ttl">${esc(tab.id === 'quotes' ? r.cells[4] : r.cells[2])}</div>
        <div class="r-meta">${rowMeta(tab, r)}</div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>`;
    b.addEventListener('click', () => openDrawer(r.uid));
    b.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(r.uid); }
    });
    b.querySelectorAll('[data-act="qdraft"]').forEach(ch => {
      ch.addEventListener('click', e => { e.stopPropagation(); draftQuoteEmail(r, ch); });
      ch.addEventListener('keydown', e => e.stopPropagation());
    });
    b.querySelectorAll('[data-act="qtext"]').forEach(ch => {
      ch.addEventListener('click', e => { e.stopPropagation(); draftQuoteText(r); });
      ch.addEventListener('keydown', e => e.stopPropagation());
    });
    b.querySelectorAll('[data-qc]').forEach(ch => {
      ch.addEventListener('click', e => {
        e.stopPropagation();
        quickContact(tab, r, +ch.dataset.qc, ch);
      });
      ch.addEventListener('keydown', e => e.stopPropagation());

    list.appendChild(b);

  main.appendChild(list);

/* primary badge shown right-aligned on the card's first line */
function rowSide(tab, r){
  if (tab.id === 'quotes'){
    const o = outcomeOf(r);
    if (o) return `<span class="badge ${o === 'Won' ? 'b-green' : 'b-gray'}">${esc(o)}</span>`;
    return daysBadge(r);
  }
  return invStatusBadge(r.cells[6]) || jobBadge(r.cells[13]) || '';
}
function rowMeta(tab, r){
  if (tab.id === 'quotes'){
    const parts = [];
    if (isAdmin() && (r.cells[7]||'').trim()) parts.push(`<span class="badge b-gray" title="Quote total">${esc(r.cells[7])}</span>`);
    if (r.cells[9]) parts.push(`<span class="badge b-gray">${esc(r.cells[9])}</span>`);
    const pb = prefBadge(r.cells[1]);
    if (pb) parts.push(pb);
    parts.push(fuTag(r, 10, '✉'), fuTag(r, 11, '💬'), fuTag(r, 12, '📞'));
    if (canContact() && !prefNoContact(r.cells[1])) parts.push('<button type="button" class="fu draft" data-act="qdraft" title="Draft & send a follow-up email">✉ Draft</button>');
    if (canContact() && (r.cells[3]||'').trim() && !prefNoText(r.cells[1])) parts.push('<button type="button" class="fu draft" data-act="qtext" title="Draft & send a follow-up text">💬 Text</button>');
    if (r.cells[15]) parts.push(`<span class="badge b-blue">${esc(r.cells[15])}${r.cells[14] ? ' · ' + esc(r.cells[14]) : ''}</span>`);
    return parts.filter(Boolean).join('');
  }
  const parts = [ statusBadge(r.cells[3]), wixBadge(r.cells[4]) ];
  const pb2 = prefBadge(r.cells[1]);
  if (pb2) parts.push(pb2);
  if (r.cells[13]) parts.push(jobBadge(r.cells[13]));
  if (r.cells[8]) parts.push(`<span class="badge b-blue">${esc(r.cells[8])}${r.cells[7] ? ' · ' + esc(r.cells[7]) : ''}</span>`);
  return parts.filter(Boolean).join('');
}
/* consistent status colors: red=overdue, amber=in progress/awaiting, blue=new/sent, green=done, gray=neutral */
function jobBadge(v){
  if (!v) return '';
  const t = low(v);
  let cls = 'b-gray';
  if (t === 'completed') cls = 'b-green';
  else if (t === 'new') cls = 'b-blue';
  else if (t === 'in progress' || t.startsWith('awaiting')) cls = 'b-amber';
  return `<span class="badge ${cls}">${esc(v)}</span>`;
}
function fuTag(r, col, icon){
  const verb = QC_LABEL[col];
  const t = (r.cells[col] || '').trim();
  if (!canContact()){
    if (!t || /^not sent$/i.test(t) || isX(t)) return '';
    const short = t.length > 10 ? t.slice(0,10) + '…' : t;
    return `<span class="badge b-gray" title="${verb} ${esc(t)}">${icon} ${verb} ${esc(short)}</span>`;
  }
  if (!t || /^not sent$/i.test(t)){
    return `<button type="button" class="fu off" data-qc="${col}" title="Not ${verb.toLowerCase()} yet — tap to mark ${verb.toLowerCase()} today" aria-label="Mark ${verb.toLowerCase()} today">${icon} ${QC_ACTION[col]}</button>`;
  }
  const short = t.length > 10 ? t.slice(0,10) + '…' : t;
  return `<button type="button" class="fu" data-qc="${col}" title="${verb} ${esc(t)} — tap to set today" aria-label="${verb} ${esc(t)}">${icon} ${verb} ${esc(short)}</button>`;
}
async function quickContact(tab, r, col, chipEl){
  if (r.saving) return;
  const cur = (r.cells[col] || '').trim();
  const verb = QC_LABEL[col];
  if (isX(cur)) { openDrawer(r.uid); return; }
  if (filledVal(cur) && !confirm(`${verb} already set to "${cur}" — replace with today (${todayMD()})?`)) return;
  r.saving = true;
  if (chipEl) chipEl.classList.add('busy');
  try {
    await commitEdits(tab, r, { [col]: todayMD() });
    toast(`#${r.key} — ${verb.toLowerCase()} ${todayMD()}`, 'ok');
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    renderContent();
    renderSummary();
    if (state.drawerUid === r.uid && $('#drawer').classList.contains('on')) renderDrawer();
  }
}

function daysBadge(r){
  const n = daysNum(r);
  if (n === null) return r.cells[8] ? `<span class="badge b-gray">${esc(r.cells[8])}</span>` : '';
  if (n < 0)  return `<span class="badge b-red">Expired ${Math.abs(n)}d</span>`;
  if (n <= 7) return `<span class="badge b-amber">${n}d left</span>`;
  return `<span class="badge b-green">${n}d left</span>`;
}
function statusBadge(v){
  if (!v) return '';
  const m = { 'Completed':'b-green','Confirmed':'b-blue','Scheduled':'b-blue','In Progress':'b-amber','Unconfirmed':'b-gray','Cancelled':'b-red' };
  return `<span class="badge ${m[v]||'b-gray'}">${esc(v)}</span>`;
}
function wixBadge(v){
  if (!v) return '';
  const m = { 'Paid':'b-green','Invoiced':'b-amber','Accepted':'b-blue' };
  return `<span class="badge ${m[v]||'b-gray'}">${esc(v)}</span>`;
}
function invStatusBadge(v){
  if (!v) return '';
  const m = { 'Paid':'b-green','Sent':'b-blue','Overdue':'b-red','Not Sent':'b-gray' };
  return `<span class="badge ${m[v]||'b-gray'}">Inv: ${esc(v)}</span>`;
}

/* =====================================================================
   Drawer
   ===================================================================== */
function openDrawer(uid){
  state.drawerUid = uid;
  const t = tabOfUid(uid);
  state.drawerList = (t && t.id === state.activeTab) ? visibleRows(t).map(r => r.uid) : [uid];
  if (!state.drawerList.includes(uid)) state.drawerList = [uid];
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  $('#drawer').classList.add('on');
  $('#overlay').classList.add('on');
  document.body.classList.add('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'false');
  renderContent();
}
function closeDrawer(){
  $('#drawer').classList.remove('on');
  $('#overlay').classList.remove('on');
  document.body.classList.remove('drawer-open');
  $('#drawer').setAttribute('aria-hidden', 'true');
  renderContent();
}
$('#dClose').addEventListener('click', closeDrawer);
$('#overlay').addEventListener('click', closeDrawer);
$('#dPrev').addEventListener('click', () => stepDrawer(-1));
$('#dNext').addEventListener('click', () => stepDrawer(1));
document.addEventListener('keydown', e => {
  if (!$('#drawer').classList.contains('on')) return;
  const typing = /input|textarea|select/i.test(document.activeElement?.tagName || '');
  if (e.key === 'Escape'){ typing ? document.activeElement.blur() : closeDrawer(); }
  if (typing) return;
  if (e.key === 'ArrowLeft') stepDrawer(-1);
  if (e.key === 'ArrowRight') stepDrawer(1);
});
function stepDrawer(dir){
  const i = state.drawerList.indexOf(state.drawerUid);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= state.drawerList.length) return;
  state.drawerUid = state.drawerList[j];
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
  renderContent();
}

$('#dSearch').addEventListener('input', () => {
  const q = $('#dSearch').value;
  $('#dSearchWrap').classList.toggle('has', !!q);
  q.trim() ? renderDrawerResults(q.trim().toLowerCase()) : renderDrawer();
});
$('#dSearchClr').addEventListener('click', () => {
  $('#dSearch').value = '';
  $('#dSearchWrap').classList.remove('has');
  renderDrawer();
});
function renderDrawerResults(q){
  const tab = tabOfUid(state.drawerUid) || activeTabDef() || TABS[0];
  const hits = (state.data[tab.id] || []).filter(r => searchText(tab, r).includes(q)).slice(0, 25);
  const body = $('#dBody');
  body.innerHTML = '<div class="d-results"></div>';
  const box = body.firstChild;
  if (!hits.length){ box.innerHTML = '<div class="none">No matches in this tab.</div>'; return; }
  hits.forEach(r => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'rrow';
    b.innerHTML = `<span class="t"><b>#${esc(r.key)}</b> ${esc(r.cells[1])}</span>
                   <span class="s">${esc(tab.id === 'quotes' ? r.cells[4] : r.cells[2])}</span>`;
    b.addEventListener('click', () => {
      state.drawerUid = r.uid;
      $('#dSearch').value = '';
      $('#dSearchWrap').classList.remove('has');
      renderDrawer();
      renderContent();
    });
    box.appendChild(b);
  });
  $('#dFoot').className = 'd-foot';
}

function renderDrawer(){
  const r = rowByUid(state.drawerUid);
  const tab = tabOfUid(state.drawerUid) || TABS[0];
  const body = $('#dBody');
  if (!r){ body.innerHTML = '<div class="empty">Record not found — it may have been removed. Refresh the data.</div>'; syncFoot(null); return; }

  $('#dQuote').textContent = '#' + r.key;
  let dq = '';
  if (tab.id === 'quotes'){
    if (isClosed(r)) dq = 'u-closed';
    else {
      const d = daysNum(r);
      if (d !== null && d < 0) dq = 'u-exp';
      else if (d !== null && d <= 7) dq = 'u-soon';
    }
  }
  $('#dQuote').className = 'q' + (dq ? ' ' + dq : '');
  $('#dName').textContent = r.cells[1];
  const i = state.drawerList.indexOf(r.uid);
  $('#dPrev').disabled = i <= 0;
  $('#dNext').disabled = i < 0 || i >= state.drawerList.length - 1;

  body.innerHTML = '';

  const acts = document.createElement('div');
  acts.className = 'd-actions';
  const email = tab.id === 'quotes' ? (r.cells[2]||'').trim() : '';
  const phone = tab.id === 'quotes' ? (r.cells[3]||'').trim() : '';
  const link  = tab.id === 'quotes' ? (r.cells[5]||'').trim() : '';
  if (phone) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="tel:${esc(phone)}">📞 Call</a>`);
  const dPhone = phone || (state.customers[normName(r.cells[1])] || {}).phone || '';
  if (canContact() && dPhone && !prefNoText(r.cells[1])){
    const tb = document.createElement('button');
    tb.className = 'act-btn';
    tb.textContent = '💬 Text';
    tb.addEventListener('click', () => {
      if (tab.id === 'quotes') draftQuoteText(r);
      else openTexter({ phone:dPhone, name:r.cells[1], srcKey:r.key },
        `Hi ${String(r.cells[1]||'').split(',')[0].trim() || 'there'}, this is ACE Fire LA regarding job #${r.key}${r.cells[2] ? ' — ' + r.cells[2] : ''}. Call or text us at ${CONFIG.COMPANY_PHONE} with any questions.`, 'job');
    });
    acts.appendChild(tb);
  }
  if (canContact() && tab.id === 'quotes' && !prefNoContact(r.cells[1])){
    const db = document.createElement('button');
    db.className = 'act-btn';
    db.textContent = '✉ Draft email';
    db.addEventListener('click', () => draftQuoteEmail(r));
    acts.appendChild(db);
  } else if (email && canContact()) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="mailto:${esc(email)}">✉ Email</a>`);
  if (/^https?:\/\//.test(link)) acts.insertAdjacentHTML('beforeend', `<a class="act-btn" href="${esc(link)}" target="_blank" rel="noopener">↗ Wix quote</a>`);
  const otherId = tab.id === 'quotes' ? 'tracker' : 'quotes';
  const twin = rowByKey(otherId, r.key);
  if (twin){
    const jb = document.createElement('button');
    jb.className = 'act-btn';
    jb.textContent = (otherId === 'tracker' ? '⇄ Open in Tracker' : '⇄ Open in Quotes');
    jb.addEventListener('click', () => switchToRecord(otherId, twin.uid));
    acts.appendChild(jb);
  }
  /* compact client history: one button, full timeline lives in the popup */
  if (canContact()) {
    const nmK = normName(r.cells[1]);
    const thr = computeThreads().find(x =>
      (dPhone && x.key === phoneKey(dPhone)) || (x.name && normName(x.name) === nmK));
    const nMail = emailsForCustomer(r.cells[1]).length;
    const nAll = nMail + (thr ? thr.msgs.length : 0);
    if (nAll || (dPhone && phoneKey(dPhone).length === 10)){
      const hb = document.createElement('button');
      hb.className = 'act-btn';
      const unread = thr ? thr.unread : 0;
      hb.innerHTML = '🗨 History' + (nAll
        ? ` <span class="badge ${unread ? 'b-red' : 'b-gray'}" style="margin-left:4px">${unread ? unread + ' new' : nAll}</span>` : '');
      hb.addEventListener('click', () =>
        openThread(thr ? thr.key : phoneKey(dPhone), { name:r.cells[1], phone:dPhone }));
      acts.appendChild(hb);
    }
  }
  if (acts.children.length) body.appendChild(acts);

  const info = document.createElement('div');
  info.className = 'd-sec';
  info.innerHTML = '<h3>Details</h3>';
  const grid = document.createElement('div');
  grid.className = 'info-grid';
  const add = (k, vHtml) => { if (vHtml) grid.insertAdjacentHTML('beforeend', `<div class="k">${k}</div><div class="v">${vHtml}</div>`); };
  const title = tab.id === 'quotes' ? r.cells[4] : r.cells[2];
  add('Job', esc(title));
  add('Contact', prefBadge(r.cells[1]));
  if (tab.id === 'quotes'){
    if (isAdmin()) add('Total', esc(r.cells[7]));
    add('Expires', `${daysBadge(r)}${r.cells[6] ? ` <span style="color:var(--muted);font-size:12px">${esc(String(r.cells[6]).slice(0,10))}</span>` : ''}`);
    add('Status', r.cells[9] ? `<span class="badge b-gray">${esc(r.cells[9])}</span>` : '');
    add('Ember', (r.cells[14] || r.cells[15]) ? `${r.cells[15] ? `<span class="badge b-blue">${esc(r.cells[15])}</span> ` : ''}${esc(r.cells[14])}` : '');
    add('Email', email ? `<a href="mailto:${esc(email)}">${esc(email)}</a>` : '');
    add('Phone', phone ? `<a href="tel:${esc(phone)}">${esc(phone)}</a>` : '');
  } else {
    add('Status', statusBadge(r.cells[3]));
    add('Wix', wixBadge(r.cells[4]));
    add('Invoice #', esc(r.cells[5]));
    add('Invoice', invStatusBadge(r.cells[6]));
    add('Ember', (r.cells[7] || r.cells[8]) ? `${r.cells[8] ? `<span class="badge b-blue">${esc(r.cells[8])}</span> ` : ''}${esc(r.cells[7])}` : '');
  }
  info.appendChild(grid);
  body.appendChild(info);

  const ed = document.createElement('div');
  ed.className = 'd-sec';
  ed.innerHTML = '<h3>Team updates</h3>';
  /* contact preference — per customer, saved instantly, applies to every record with this name */
  if (canContact()) {
    const f = document.createElement('div');
    f.className = 'd-field';
    f.innerHTML = '<label for="fld-pref">Contact preference</label>';
    const box = document.createElement('div');
    box.className = 'ctl';
    const sel = document.createElement('select');
    sel.id = 'fld-pref';
    sel.appendChild(new Option('— none —', ''));
    PREF_OPTIONS.forEach(o => sel.appendChild(new Option(o, o)));
    sel.value = PREF_OPTIONS.includes(prefOf(r.cells[1])) ? prefOf(r.cells[1]) : '';
    sel.addEventListener('change', async () => {
      sel.disabled = true;
      try {
        await savePref(r.cells[1], sel.value, r.key);
        toast(sel.value ? 'Contact preference saved: ' + sel.value : 'Contact preference cleared', 'ok');
        renderDrawer();
        renderContent();
      } catch(e){
        if (e.message !== 'auth') toast('Could not save — run installSmsTriggers() in Apps Script to create the Contact Prefs tab', 'err');
        sel.disabled = false;
      }
    });
    box.appendChild(sel);
    f.appendChild(box);
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11.5px;color:var(--muted);margin-top:4px';
    note.textContent = 'Saves instantly for this customer everywhere. "No text" and "Do not contact" also block auto-reminders.';
    f.appendChild(note);
    ed.appendChild(f);
  }
  const hdr = state.headers[tab.id] || [];
  const editCols = (isField() && tab.id === 'quotes') ? tab.editable.filter(c => c === 13) : tab.editable;   // field techs: job-walk notes only on quotes
  editCols.forEach(colIdx => {
    const f = document.createElement('div');
    f.className = 'd-field';
    const lb = document.createElement('label');
    lb.textContent = hdr[colIdx] || colLetter(colIdx);
    lb.htmlFor = 'fld-' + colIdx;
    f.appendChild(lb);
    f.appendChild(buildControl(tab, r, colIdx));
    ed.appendChild(f);
  });
  body.appendChild(ed);

  const related = [];
  const nm = normName(r.cells[1]);
  if (nm){
    TABS.forEach(t => (state.data[t.id]||[]).forEach(x => {
      if (x.uid !== r.uid && normName(x.cells[1]) === nm) related.push({ t, x });
    }));
  }
  if (related.length){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = `<h3>Same customer (${related.length})</h3><div class="d-results"></div>`;
    const box = sec.querySelector('.d-results');
    related.slice(0, 8).forEach(({ t, x }) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'rrow';
      b.innerHTML = `<span class="t"><b>#${esc(x.key)}</b> ${esc(t.label)}</span>
                     <span class="s">${esc(t.id === 'quotes' ? x.cells[4] : x.cells[2])}</span>`;
      b.addEventListener('click', () => switchToRecord(t.id, x.uid));
      box.appendChild(b);
    });
    body.appendChild(sec);
  }

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const sec = document.createElement('div');
    sec.className = 'd-sec';
    sec.innerHTML = '<h3>Recent activity</h3>';
    if (!state.activityLoaded){
      sec.insertAdjacentHTML('beforeend', '<div class="log-none">Loading activity…</div>');
    } else {
      const entries = state.activity.filter(a => String(a[4] ?? '').trim() === r.key).slice(-5).reverse();
      if (!entries.length) sec.insertAdjacentHTML('beforeend', '<div class="log-none">No logged activity for this record yet — edits made here will appear.</div>');
      entries.forEach(a => sec.appendChild(logItemNode(a, { after: () => renderDrawer() })));
    }
    body.appendChild(sec);
  }

  syncFoot(r);
}
function switchToRecord(tabId, uid){
  if (!visibleTabs().some(t => t.id === tabId)){ openDrawer(uid); return; }
  state.activeTab = tabId;
  $$('.tab').forEach((x, i) => {
    const on = (visibleTabs()[i] || {}).id === tabId;
    x.classList.toggle('active', on);
    x.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderAll();
  openDrawer(uid);
}

/* =====================================================================
   Editable controls
   ===================================================================== */
const currentVal = (r, c) => c in r.edits ? r.edits[c] : (r.cells[c] || '');
function setEdit(tab, r, colIdx, val){
  if (val === (r.cells[colIdx] || '')) delete r.edits[colIdx];
  else r.edits[colIdx] = val;
  $$(`#dBody [data-col="${colIdx}"]`).forEach(ct => ct.classList.toggle('changed', colIdx in r.edits));
  syncFoot(r);
  renderContent();
}
function syncFoot(r){
  const foot = $('#dFoot');
  foot.className = 'd-foot' + (isDirty(r) ? ' dirty' : '');
  const btn = $('#dSave');
  if (!btn.classList.contains('saving')) btn.textContent = isDirty(r) ? 'Save' : 'Saved';
  $('#dSaveNext').textContent = isDirty(r) ? 'Save & Next ›' : 'Next ›';
  const i = state.drawerList.indexOf(r ? r.uid : null);
  $('#dSaveNext').disabled = !isDirty(r) && (i < 0 || i >= state.drawerList.length - 1);
}

function buildControl(tab, r, colIdx){
  const box = document.createElement('div');
  box.className = 'ctl' + (colIdx in r.edits ? ' changed' : '');
  box.dataset.col = colIdx;
  const val = currentVal(r, colIdx);

  if (tab.id === 'quotes'){
    if (colIdx === 16){
      buildSelect(box, tab, r, colIdx, OUTCOME_OPTIONS, val);
      return box;
    }
    if (colIdx === 13){
      const ta = document.createElement('textarea');
      ta.id = 'fld-' + colIdx;
      ta.value = val;
      ta.placeholder = 'Notes…';
      ta.addEventListener('input', () => setEdit(tab, r, colIdx, ta.value));
      box.appendChild(ta);
      box.appendChild(chipRow(canContact() ? [
        { l:'+ ' + todayMD() + ' Sent email', v:() => appendLine(ta, todayMD() + ' Sent email,') },
        { l:'+ ' + todayMD() + ' Sent text',  v:() => appendLine(ta, todayMD() + ' Sent text:') },
        { l:'+ ' + todayMD() + ' Called',     v:() => appendLine(ta, todayMD() + ' Called,') }
      ] : [
        { l:'+ ' + todayMD() + ' Job walk',   v:() => appendLine(ta, todayMD() + ' Job walk:') },
        { l:'+ ' + todayMD() + ' Site note',  v:() => appendLine(ta, todayMD() + ' Site note:') }
      ], () => setEdit(tab, r, colIdx, ta.value)));
      return box;
    }
    const inp = mkInput(val, 'e.g. ' + todayMD());
    inp.id = 'fld-' + colIdx;
    inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
    box.appendChild(inp);
    box.appendChild(chipRow([
      { l: todayMD(),  v:() => inp.value = todayMD() },
      { l:'Not Sent',  v:() => inp.value = 'Not Sent' },
      { l:'X',         v:() => inp.value = 'X' }
    ], () => setEdit(tab, r, colIdx, inp.value)));
    return box;
  }

  const listOpts = state.options[colIdx];
  if (listOpts && listOpts.length){
    buildSelect(box, tab, r, colIdx, listOpts, val);
    return box;
  }
  const inp = mkInput(val, 'Type…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-' + colIdx;
  ensureDatalist(dlId, state.suggest[colIdx] || []);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  return box;
}
function mkInput(val, ph){
  const i = document.createElement('input');
  i.type = 'text'; i.value = val; i.placeholder = ph; i.autocomplete = 'off';
  return i;
}
function buildSelect(box, tab, r, colIdx, opts, val){
  box.innerHTML = '';
  const sel = document.createElement('select');
  sel.id = 'fld-' + colIdx;
  const all = [...opts];
  if (val && !all.includes(val)) all.unshift(val);
  sel.appendChild(new Option('— select —', ''));
  all.forEach(o => sel.appendChild(new Option(o, o)));
  sel.appendChild(new Option('✎ Type a custom answer…', '__custom__'));
  sel.value = all.includes(val) ? val : '';
  sel.addEventListener('change', () => {
    if (sel.value === '__custom__'){ toCustomInput(box, tab, r, colIdx, opts); return; }
    setEdit(tab, r, colIdx, sel.value);
  });
  box.appendChild(sel);
}
function toCustomInput(box, tab, r, colIdx, opts){
  box.innerHTML = '';
  const inp = mkInput('', 'Custom answer…');
  inp.id = 'fld-' + colIdx;
  const dlId = 'dl-custom-' + colIdx;
  ensureDatalist(dlId, [...new Set([...(opts||[]), ...(state.suggest[colIdx]||[])])]);
  inp.setAttribute('list', dlId);
  inp.addEventListener('input', () => setEdit(tab, r, colIdx, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveActive(); });
  box.appendChild(inp);
  const back = document.createElement('button');
  back.className = 'backlist'; back.type = 'button'; back.textContent = '↩ back to list';
  back.addEventListener('click', () => {
    buildSelect(box, tab, r, colIdx, opts, currentVal(r, colIdx));
    box.classList.toggle('changed', colIdx in r.edits);
  });
  box.appendChild(back);
  inp.focus();
}
function ensureDatalist(id, options){
  let dl = document.getElementById(id);
  if (!dl){ dl = document.createElement('datalist'); dl.id = id; document.body.appendChild(dl); }
  dl.innerHTML = options.map(o => `<option value="${esc(o)}">`).join('');
}
function chipRow(chips, after){
  const row = document.createElement('div');
  row.className = 'chips';
  chips.forEach(c => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip'; b.textContent = c.l;
    b.addEventListener('click', () => { c.v(); after(); });
    row.appendChild(b);
  });
  return row;
}
function appendLine(ta, text){
  ta.value = ta.value.trim() ? ta.value.replace(/\s+$/,'') + '\n' + text : text;
}

/* =====================================================================
   Save pipeline (drawer + quick-contact chips)
   ===================================================================== */
async function commitEdits(tab, r, changesObj, action = 'Edit (Dashboard)'){
  if (isField() && tab.id === 'quotes' && Object.keys(changesObj).some(c => +c !== 13)){
    throw new Error('Field accounts can only update notes on quotes');
  }
  let target = r.sheetRow;
  const chk = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A${target}`)}`);
  if (String(chk.values?.[0]?.[0] ?? '').trim() !== r.key){
    const colA = await api(`/values/${encodeURIComponent(`'${tab.sheet}'!A2:A`)}`);
    const matches = (colA.values || [])
      .map((x, i) => ({ v: String(x[0] ?? '').trim(), i }))
      .filter(x => x.v === r.key);
    if (!matches.length) throw new Error(`Row for quote ${r.key} not found — refresh and try again`);
    if (matches.length > 1) throw new Error(`Quote ${r.key} appears ${matches.length}× and rows shifted — refresh before saving`);
    target = matches[0].i + 2;
  }

  const changes = Object.entries(changesObj);
  await api('/values:batchUpdate', {
    method:'POST',
    body: JSON.stringify({
      valueInputOption:'USER_ENTERED',
      data: changes.map(([c, v]) => ({ range:`'${tab.sheet}'!${colLetter(+c)}${target}`, values:[[v]] }))
    })
  });

  if (CONFIG.ACTIVITY_LOG_SHEET){
    const hdr = state.headers[tab.id] || [];
    const details = changes.map(([c, v]) =>
      `${hdr[+c] || colLetter(+c)}: "${(r.cells[+c]||'').slice(0,60)}" → "${String(v).slice(0,60)}"`).join(' | ');
    const undoData = { t: tab.id, c: Object.fromEntries(changes.map(([c, v]) => [c, { o: r.cells[+c] || '', n: String(v) }])) };
    const entry = [new Date().toLocaleString(), state.email, action, tab.sheet, r.key, details, JSON.stringify(undoData)];
    state.activity.push(entry);
    api(`/values/${encodeURIComponent(`'${CONFIG.ACTIVITY_LOG_SHEET}'!A:G`)}:append?valueInputOption=USER_ENTERED`,
      { method:'POST', body: JSON.stringify({ values:[entry] }) }).catch(() => {});
  }

  changes.forEach(([c, v]) => r.cells[+c] = v);
  r.sheetRow = target;
  saveCache();
}

$('#dSave').addEventListener('click', () => saveActive());
$('#dSaveNext').addEventListener('click', async () => {
  const r = rowByUid(state.drawerUid);
  if (isDirty(r)){
    const ok = await saveActive();
    if (!ok) return;
  }
  stepDrawer(1);
});
$('#dRevert').addEventListener('click', () => {
  const r = rowByUid(state.drawerUid);
  if (!r) return;
  r.edits = {};
  renderDrawer();
  renderContent();
});

async function saveActive(){
  const r = rowByUid(state.drawerUid);
  const tab = tabOfUid(state.drawerUid);
  if (!r || !tab || !isDirty(r) || r.saving) return false;
  r.saving = true;
  const btn = $('#dSave');
  btn.classList.add('saving');
  btn.textContent = 'Saving…';
  let ok = false;
  try {
    await commitEdits(tab, r, r.edits);
    r.edits = {};
    ok = true;
    toast('Saved quote ' + r.key, 'ok');
    renderDrawer();
    renderContent();
    renderSummary();
  } catch(e){
    if (e.message !== 'auth') toast(e.message, 'err');
  } finally {
    r.saving = false;
    btn.classList.remove('saving');
    syncFoot(rowByUid(state.drawerUid));
  }
  return ok;
}

/* =====================================================================
   Renewals radar — recurring Reg 4 service, computed from completed jobs
   ===================================================================== */
/* order matters: specific periods before 'annual' (which would match 'semi-annual') */
const CYCLES = [
  { re:/5[\s-]?(year|yr)/i,      months:60, label:'5-Year' },
  { re:/3[\s-]?(year|yr)/i,      months:36, label:'3-Year' },
  { re:/semi[\s-]?annual/i,      months:6,  label:'Semi-Annual' },
  { re:/quarter/i,               months:3,  label:'Quarterly' },
  { re:/month/i,                 months:1,  label:'Monthly' },
  { re:/annual|yearly|title\s*19/i, months:12, label:'Annual' }
];
const CATS = [
  ['Fire Alarm',          /alarm|supervising/i],
  ['Fire Sprinkler',      /sprinkler|title\s*19/i],
  ['Standpipe',           /standpipe|class\s+(i{1,3})\b/i],
  ['Fire Pump',           /fire\s*pump|pump\s*run/i],
  ['Backflow',            /backflow/i],
  ['Emergency Lighting',  /emergency\s*light|exit\s*(light|sign)/i]
];
function addMonths(d, m){
  const x = new Date(d.getFullYear(), d.getMonth() + m, d.getDate());
  return x;
}
const fmtFull = d => (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
function cycleOf(text){
  const hits = CYCLES.filter(c => c.re.test(text));
  if (!hits.length) return null;
  return hits.reduce((a, b) => a.months <= b.months ? a : b);   // shortest period = next touchpoint
}
function catOf(text){
  for (const [name, re] of CATS) if (re.test(text)) return name;
  return 'Fire Protection';
}

let _ren = { ts:-1, list:[] };
function computeRenewals(){
  if (_ren.ts === state.lastLoad) return _ren.list;
  const today = startOfDay(new Date());
  const tracker = state.data.tracker || [];
  const quotes = state.data.quotes || [];

  // latest service per customer + category + cycle — from live completed jobs AND archived (paid) history
  const sources = [];
  tracker.forEach(r => { if (low(r.cells[3]) === 'completed') sources.push({ cells:r.cells, src:r }); });
  (state.archive || []).forEach(r => sources.push({ cells:r.cells, src:null }));

  const best = new Map();
  sources.forEach(({ cells, src }) => {
    const d = parseDate(cells[7]);
    if (!d) return;
    const text = (cells[2] || '') + ' ' + (cells[8] || '');
    const cyc = cycleOf(text);
    if (!cyc) return;                       // repairs / service calls have no cycle keyword
    const cat = catOf(text);
    const key = normName(cells[1]) + '|' + cat + '|' + cyc.months;
    const prev = best.get(key);
    if (!prev || d > prev.last) best.set(key, { src, srcKey:String(cells[0]||'').trim(), name:cells[1], last:d, cyc, cat });
  });

  const list = [...best.values()].map(({ src, srcKey, name, last, cyc, cat }) => {
    const nm = normName(name);
    const due = addMonths(last, cyc.months);
    const days = Math.round((due - today) / DAY);

    // already scheduled again? (future tracker job, same customer + category)
    const upcoming = tracker.some(r => {
      if ((src && r.uid === src.uid) || low(r.cells[3]) === 'cancelled') return false;
      const d2 = parseDate(r.cells[7]);
      return d2 && d2 > today && normName(r.cells[1]) === nm &&
             catOf((r.cells[2]||'') + ' ' + (r.cells[8]||'')) === cat;
    });

    // active quote already out? (same customer + category, not expired)
    let quote = null;
    quotes.forEach(q => {
      if (normName(q.cells[1]) !== nm) return;
      if (catOf(q.cells[4] || '') !== cat) return;
      if (outcomeOf(q)) return;   // quote closed (declined / no longer needed / …)
      const dn = daysNum(q);
      if (dn !== null && dn < 0) return;    // expired
      if (!quote || quoteNum(q.key) > quoteNum(quote.key)) quote = q;
    });

    // contact info: Customers directory first, then newest live quote, then archived quotes
    let email = '', phone = '';
    const hit = state.customers[nm];
    if (hit){ email = hit.email || ''; phone = hit.phone || ''; }
    const contactScan = rows => {
      for (let i = rows.length - 1; i >= 0; i--){
        const q = rows[i];
        if (normName(q.cells[1]) !== nm) continue;
        if (!email && (q.cells[2]||'').includes('@')) email = q.cells[2].trim();
        if (!phone && (q.cells[3]||'').trim()) phone = q.cells[3].trim();
        if (email && phone) break;
      }
    };
    if (!email || !phone) contactScan(quotes);
    if (!email || !phone) contactScan(state.qarchive || []);

    return { name, cat, cyc, last, due, days, src, srcKey, upcoming, quote, email, phone };
  }).sort((a, b) => a.due - b.due);

  _ren = { ts: state.lastLoad, list };
  return list;
}

function renderRenewals(){
  const main = $('#main');
  main.innerHTML = '';
  const buckets = {
    overdue: x => x.days < 0,
    d30:     x => x.days >= 0 && x.days <= 30,
    d90:     x => x.days > 30 && x.days <= 90,
    later:   x => x.days > 90,
    all:     () => true
  };
  const fn = buckets[state.renBucket] || buckets.d30;
  let items = computeRenewals().filter(fn);
  const q = state.search.trim().toLowerCase();
  if (q) items = items.filter(x => (x.name + ' ' + x.cat + ' ' + x.cyc.label + ' ' + x.srcKey).toLowerCase().includes(q));

  const list = document.createElement('div');
  list.className = 'list';
  if (!items.length){
    list.innerHTML = `<div class="empty">${q ? 'No renewals match your search.' :
      'Nothing in this window — renewals appear automatically from completed jobs with a service cycle (annual, 5-year, monthly…).'}</div>`;

  }
  items.forEach(x => {
    const row = document.createElement('div');
    row.setAttribute('role', 'button');
    row.tabIndex = 0;
    row.className = 'row' + (x.days < 0 ? ' u-exp' : x.days <= 30 ? ' u-soon' : '');
    const dueBadge = x.days < 0
      ? `<span class="badge b-red">${Math.abs(x.days)}d overdue</span>`
      : x.days <= 30
        ? `<span class="badge b-amber">due in ${x.days}d</span>`
        : `<span class="badge ${x.days <= 90 ? 'b-blue' : 'b-gray'}">due ${fmtMD(x.due)}</span>`;
    row.setAttribute('aria-label', `${x.name} — ${x.cyc.label} ${x.cat} due ${fmtFull(x.due)}`);
    row.innerHTML = `
      <div class="r-main">
        <div class="r-top">
          <span class="r-nm">${esc(x.name)}</span>
          <span class="badge b-gray">${esc(x.cyc.label)}</span>
          <span class="r-side">${dueBadge}</span>
        </div>
        <div class="r-ttl">${esc(x.cat)} — last serviced ${fmtFull(x.last)} · job #${esc(x.srcKey)}${x.src ? '' : ' (archived)'}</div>
        <div class="r-meta">
          ${prefBadge(x.name)}
          ${prefNoContact(x.name) ? '' : '<button type="button" class="fu draft" data-act="draft">✉ Draft outreach</button>'}
          ${x.phone ? `<a class="fu" href="tel:${esc(x.phone)}" data-act="tel">📞 Call</a>` : ''}
          ${x.phone && !prefNoText(x.name) ? `<button type="button" class="fu draft" data-act="rentext" title="Draft & send a renewal text">💬 Text</button>` : ''}
          ${x.quote ? `<span class="badge b-blue">Quote #${esc(x.quote.key)} out</span>` : ''}
          ${x.upcoming ? `<span class="badge b-green">Already scheduled</span>` : ''}
        </div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>`;
    if (x.src){
      row.addEventListener('click', () => openDrawer(x.src.uid));
      row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(x.src.uid); } });
    } else {
      row.removeAttribute('role');
      row.removeAttribute('tabindex');
      row.style.cursor = 'default';
      const ch = row.querySelector('.chev');
      if (ch) ch.remove();
    }
    row.querySelectorAll('[data-act]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        if (el.dataset.act === 'draft') draftOutreach(x, el);
        if (el.dataset.act === 'rentext') openTexter({ phone:x.phone, name:x.name, srcKey:x.srcKey }, smsRenewalTemplate(x), 'renewal');
      });
      el.addEventListener('keydown', e => e.stopPropagation());
    });
    list.appendChild(row);
  });
  main.appendChild(list);
}

function b64url(str){
  return btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
async function gmailSend(to, subject, body, from, replyTo, retry = true){
  /* strip CR/LF from header values — a pasted address can't inject extra headers
     (the subject is already neutralized by its base64 encoding below) */
  const hdr = v => String(v || '').replace(/[\r\n]+/g, ' ').trim();
  to = hdr(to); from = hdr(from); replyTo = hdr(replyTo);
  const encSubj = '=?UTF-8?B?' + btoa(unescape(encodeURIComponent(subject))) + '?=';
  const raw = 'To: ' + to + '\r\n' +
    (from ? 'From: ' + from + '\r\n' : '') +
    (replyTo ? 'Reply-To: ' + replyTo + '\r\n' : '') +
    'Subject: ' + encSubj +
    '\r\nMIME-Version: 1.0\r\nContent-Type: text/plain; charset="UTF-8"\r\n\r\n' + body;
  const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
    method:'POST',
    headers:{ Authorization:'Bearer ' + state.token, 'Content-Type':'application/json' },
    body: JSON.stringify({ raw: b64url(raw) })
  });
  if (r.status === 401 && retry){
    const ok = await silentToken(state.email);
    if (ok) return gmailSend(to, subject, body, from, replyTo, false);
    throw new Error('Session expired — sign in again, then retry');
  }
  if (r.status === 403){
    throw new Error('Gmail permission missing — sign out & back in to approve email sending (and confirm the Gmail API is enabled in the Google Cloud project)');
  }
  if (!r.ok){
    let msg = 'Send failed (' + r.status + ')';
    try { msg = (await r.json()).error?.message || msg; } catch(e){}
    throw new Error(msg);
  }
}

    }).catch(() => {});

    state.activity.push(entry);

      { method:'POST', body: JSON.stringify({ values:[entry] }) }).catch(() => {});
  }
}

      new Date().toLocaleString(), person || state.email.split('@')[0], to, name, key, smsType, body,
      'QUEUED', '', '', '', ''
    ]] })
  });
  return res.updates ? res.updates.updatedRange : '';
}
function logSmsActivity(person, to){
